<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT Alfabetização 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#f0f2f5;}
  #mynetwork{width:100%;height:100vh;}
  .glass{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.5);border-radius:1.5rem;box-shadow:0 10px 25px -3px rgba(0,0,0,0.1);}
  #panel.min{width:52px;height:44px;overflow:hidden;}
  #panel.min #pb{display:none;}
  .tsw{position:relative;display:inline-block;width:34px;height:18px;}
  .tsw input{opacity:0;width:0;height:0;}
  .sl{position:absolute;cursor:pointer;inset:0;background:#cbd5e1;border-radius:20px;transition:.2s;}
  .sl:before{position:absolute;content:"";height:12px;width:12px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
  input:checked+.sl{background:#4f46e5;}
  input:checked+.sl:before{transform:translateX(16px);}
  @media(max-width:640px){#legend,#panel{display:none;}}
</style>
</head>
<body>

<div class="absolute top-4 left-0 w-full z-10 flex justify-center pointer-events-none">
  <div class="bg-white/80 backdrop-blur-md px-6 py-3 rounded-2xl shadow-lg border border-white text-center pointer-events-auto">
    <h1 class="text-lg font-bold text-slate-800">Árvore de Problemas</h1>
    <p class="text-indigo-600 font-bold text-[10px] uppercase tracking-widest">GT Alfabetização 2026 — Processamento via CSV</p>
  </div>
</div>

<div id="loading" class="absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
  <div class="animate-spin h-10 w-10 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
  <p id="load-text" class="text-slate-600 font-bold">Lendo planilha CSV...</p>
</div>

<div id="mynetwork"></div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/50 z-[1050] hidden items-center justify-center p-4">
  <div id="modal-box" class="bg-white rounded-3xl shadow-2xl w-full max-w-lg transform transition-all duration-200 scale-95 opacity-0 overflow-hidden">
    <div class="p-6 border-b flex justify-between items-start">
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-2 text-[10px] font-bold uppercase tracking-widest">
          <span id="m-nivel" class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded"></span>
          <span id="m-eixo" class="text-white px-2.5 py-0.5 rounded-full shadow-sm"></span>
        </div>
        <h3 id="m-causa" class="text-sm font-bold text-slate-800 leading-relaxed"></h3>
      </div>
      <button onclick="closeModal()" class="text-slate-300 hover:text-slate-600 text-3xl ml-4">&times;</button>
    </div>
    <div id="m-cat-wrap" class="p-6 bg-slate-50 border-b">
      <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Conexão Temática</p>
      <div id="m-cat" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs font-semibold bg-white border text-indigo-700 shadow-sm"></div>
    </div>
    <div class="p-4 bg-white text-right"><button onclick="closeModal()" class="px-6 py-2 bg-indigo-600 text-white text-xs font-bold rounded-xl shadow-md">Fechar</button></div>
  </div>
</div>

<!-- Legenda -->
<div id="legend" class="absolute bottom-6 left-6 glass p-5 z-10 w-56">
  <p class="font-extrabold text-slate-800 text-[10px] mb-3 uppercase tracking-widest border-b pb-2">Hierarquia</p>
  <div class="space-y-2 text-[10px] font-bold text-slate-600">
    <div class="flex items-center gap-3"><span class="w-3.5 h-3.5 rounded-full bg-[#f43f5e]"></span> PROBLEMA MACRO</div>
    <div class="flex items-center gap-3"><span class="w-3.5 h-3.5 rounded-full bg-slate-400"></span> EIXO / CAUSA</div>
    <div class="flex items-center gap-3"><span class="w-4 h-4 rotate-45 border-2 border-indigo-600 bg-white inline-block"></span> TEMA TRANSVERSAL</div>
  </div>
</div>

<!-- Filtros -->
<div id="panel" class="absolute bottom-6 right-6 glass z-10 w-64 transition-all duration-300">
  <button id="toggle-panel" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
    <svg id="ic-down" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
  </button>
  <div id="pb" class="p-5 space-y-4">
    <input id="search" type="text" placeholder="🔍 Pesquisar..." class="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-400">
    <div class="flex items-center justify-between text-[10px] text-slate-700 font-bold uppercase">
      <span>Versão de 1 minuto</span>
      <label class="tsw"><input type="checkbox" id="f-summary" onchange="applyFilters()"><span class="sl"></span></label>
    </div>
    <div>
      <p class="text-[10px] font-extrabold uppercase text-slate-400 mb-2">Priorização ⭐</p>
      <div class="flex gap-1">
        <button data-val="0" class="star-btn flex-1 py-1.5 text-[10px] rounded-lg bg-indigo-600 text-white font-bold">Todas</button>
        <button data-val="1" class="star-btn flex-1 py-1.5 text-[10px] rounded-lg bg-slate-100 text-slate-500 font-bold">1+</button>
        <button data-val="4" class="star-btn flex-1 py-1.5 text-[10px] rounded-lg bg-slate-100 text-slate-500 font-bold">4+</button>
      </div>
    </div>
    <div>
      <p class="text-[10px] font-extrabold uppercase text-slate-400 mb-1">Eixos</p>
      <ul id="eixo-list" class="space-y-0.5 max-h-24 overflow-y-auto text-[10px]"></ul>
    </div>
    <div>
      <p class="text-[10px] font-extrabold uppercase text-slate-400 mb-1">Transversais</p>
      <ul id="cat-list" class="space-y-0.5 max-h-32 overflow-y-auto text-[10px]"></ul>
    </div>
  </div>
</div>

<script>
// CONFIGURAÇÕES
const CSV_URL = 'https://github.com/sme-upge/sme-upge.github.io/raw/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/%C3%81rvore%20de%20Problemas%20-%20Alfabetiza%C3%A7%C3%A3o%20(3).csv'; 

const EIXO_COLORS = {
  "Eixo 1": "#2563eb", "Eixo 2": "#16a34a", "Eixo 4": "#ea580c", 
  "Eixo 5": "#9333ea", "Eixo 6": "#0891b2", "Eixo 7": "#be123c"
};

let network, nodesDS, edgesDS, rawData = [];
let activeStars = 0, selCat = "__ALL__", activeEixos = new Set();

// FUNÇÃO PARA PROCESSAR CSV E CRIAR NODES/EDGES
function processData(csvData) {
    const nodes = new Map();
    const edges = [];
    const macroId = "Baixa aprendizagem na alfabetização";
    
    // Node Root
    nodes.set(macroId, { id: macroId, label: "BAIXA APRENDIZAGEM\nNA ALFABETIZAÇÃO", group: 'macro', value: 50, level: 0, causa_real: macroId });

    csvData.forEach(row => {
        const eixo = row["Nome do Eixo"]?.trim();
        const prob = row["Problema central do eixo"]?.trim();
        const c1 = row["Causa Primária"]?.trim();
        const cat1 = row["Categoria Causa Primária"]?.trim();
        const c2 = row["Causa Secundária"]?.trim();
        const cat2 = row["Categoria Secundária"]?.trim();
        const v2 = parseInt(row["Votos causa secundária"]) || 0;
        const c3 = row["Causa Terciária"]?.trim();

        if (!eixo) return;

        // Criar Eixo
        if (!nodes.has(eixo)) {
            nodes.set(eixo, { id: eixo, label: eixo.split('-')[0].trim(), group: 'eixo', value: 35, level: 1, eixo: eixo, causa_real: eixo });
            edges.push({ from: macroId, to: eixo });
            activeEixos.add(eixo);
        }

        // Criar Problema Central
        if (prob && !nodes.has(prob)) {
            nodes.set(prob, { id: prob, label: prob.substring(0, 30) + "...", group: 'problema', value: 30, level: 2, eixo: eixo, causa_real: prob });
            edges.push({ from: eixo, to: prob });
        }

        // Causa Primária
        if (c1 && !nodes.has(c1)) {
            nodes.set(c1, { id: c1, label: c1.substring(0, 25) + "...", group: 'causa1', value: 20, level: 3, eixo: eixo, causa_real: c1, cat: cat1 });
            edges.push({ from: prob, to: c1 });
        }

        // Causa Secundária
        if (c2 && !nodes.has(c2)) {
            nodes.set(c2, { id: c2, label: c2.substring(0, 25) + "...", group: 'causa2', value: 15 + (v2 * 10), level: 4, eixo: eixo, causa_real: c2, votos: v2, cat: cat2 });
            edges.push({ from: c1, to: c2 });
        }

        // Hub Transversal (Diamante)
        const cat = cat2 || cat1;
        if (cat && cat !== " ") {
            const hubId = "__hub__" + cat;
            if (!nodes.has(hubId)) {
                nodes.set(hubId, { id: hubId, label: cat, group: 'hub', shape: 'diamond', value: 25, level: 99, cat: cat, causa_real: "Tema Transversal: " + cat });
            }
            if (c2) edges.push({ from: c2, to: hubId, dashes: true, color: "#A78BFA", transversal: true });
        }
    });

    return { nodes: Array.from(nodes.values()), edges: edges };
}

// INICIALIZAÇÃO
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    complete: function(results) {
        const processed = processData(results.data);
        initNetwork(processed);
        setupUI(processed.nodes);
    }
});

function initNetwork(data) {
    nodesDS = new vis.DataSet(data.nodes.map(n => ({
        ...n,
        color: n.group === 'hub' ? {background:'#fff', border:'#6366f1'} : {background: EIXO_COLORS[n.eixo] || "#f43f5e", border: EIXO_COLORS[n.eixo] || "#f43f5e"},
        font: { color: "#1e293b", size: 14, strokeWidth: 5, strokeColor: "#ffffff", face: 'Inter', weight: n.group === 'macro' ? '800' : '600' }
    })));
    edgesDS = new vis.DataSet(data.edges);

    network = new vis.Network(document.getElementById("mynetwork"), { nodes: nodesDS, edges: edgesDS }, {
        nodes: { scaling: { min: 10, max: 100 } },
        edges: { color: "#cbd5e1", arrows: "to", smooth: { type: "continuous" } },
        physics: { barnesHut: { gravitationalConstant: -20000, springLength: 200 }, stabilization: { iterations: 150 } }
    });

    network.once("stabilizationIterationsDone", () => {
        document.getElementById("loading").style.display = "none";
        network.setOptions({ physics: false });
    });
    network.on("click", p => p.nodes.length && openModal(p.nodes[0]));
}

function setupUI(nodes) {
    const eixoUl = document.getElementById("eixo-list");
    const catUl = document.getElementById("cat-list");
    const eixos = [...new Set(nodes.filter(n => n.eixo).map(n => n.eixo))];
    const cats = [...new Set(nodes.filter(n => n.group === 'hub').map(n => n.cat))];

    eixos.forEach(e => {
        const li = document.createElement("li");
        li.innerHTML = `<label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked value="${e}" class="eixo-chk"> <span>${e.split('-')[0]}</span></label>`;
        li.querySelector('input').onchange = (ev) => { ev.target.checked ? activeEixos.add(e) : activeEixos.delete(e); applyFilters(); };
        eixoUl.appendChild(li);
    });

    const addCatBtn = (id, label) => {
        const li = document.createElement("li");
        li.className = "px-2 py-1 rounded cursor-pointer hover:bg-white text-slate-600 truncate";
        li.textContent = label;
        li.onclick = () => { selCat = id; applyFilters(); };
        catUl.appendChild(li);
    };
    addCatBtn("__ALL__", "Todos");
    cats.forEach(c => addCatBtn(c, c));
}

function setStars(v, btn) {
    activeStars = v;
    document.querySelectorAll('.star-btn').forEach(b => b.className = "star-btn flex-1 py-1.5 text-[10px] rounded-lg bg-slate-100 text-slate-500 font-bold");
    btn.className = "star-btn flex-1 py-1.5 text-[10px] rounded-lg bg-indigo-600 text-white font-bold shadow-sm";
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById("search").value.toLowerCase();
    const sum = document.getElementById("f-summary").checked;
    
    nodesDS.update(nodesDS.get().map(n => {
        let vis = true;
        let op = 1;
        if (sum && n.level > 2 && n.group !== 'hub') vis = false;
        if (vis && n.eixo && !activeEixos.has(n.eixo)) vis = false;
        if (vis && n.group === 'causa2' && n.votos < activeStars) vis = false;
        if (vis && selCat !== "__ALL__" && n.cat !== selCat) op = 0.05;
        if (vis && q && !n.causa_real.toLowerCase().includes(q)) vis = false;
        if (n.group === 'macro') vis = true;
        return { id: n.id, hidden: !vis, opacity: op };
    }));
}

function toggleAllEixos(s) {
    document.querySelectorAll('.eixo-chk').forEach(c => { c.checked = s; s ? activeEixos.add(c.value) : activeEixos.delete(c.value); });
    applyFilters();
}

function openModal(id) {
    const n = nodesDS.get(id);
    document.getElementById("m-nivel").textContent = n.group;
    document.getElementById("m-eixo").textContent = n.eixo || "GERAL";
    document.getElementById("m-eixo").style.backgroundColor = EIXO_COLORS[n.eixo] || '#f43f5e';
    document.getElementById("m-causa").textContent = n.causa_real;
    document.getElementById("m-cat-wrap").style.display = n.cat ? "block" : "none";
    if(n.cat) document.getElementById("m-cat").textContent = n.cat;
    document.getElementById("modal").style.display = "flex";
    setTimeout(() => document.getElementById("modal-box").classList.remove("opacity-0", "scale-95"), 10);
}

function closeModal() {
    document.getElementById("modal-box").classList.add("opacity-0", "scale-95");
    setTimeout(() => document.getElementById("modal").style.display = "none", 200);
}

document.getElementById("toggle-panel").onclick = () => document.getElementById("panel").classList.toggle("min");
</script>
</body>
</html>
