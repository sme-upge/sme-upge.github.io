<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Evidências — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F8FAFC}
#net{position:absolute;top:0;left:280px;right:0;bottom:0;background:#F8FAFC;transition:right .25s ease}
#sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:white;border-right:1px solid #E2E8F0;z-index:30;display:flex;flex-direction:column}
#sidebar-list{flex:1;overflow-y:auto;padding:12px 8px}
#painel{position:fixed;top:0;right:0;width:480px;height:100vh;background:white;border-left:1px solid #E2E8F0;z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-12px 0 30px rgba(0,0,0,0.03)}
#painel.open{transform:translateX(0)}
#painel-body{flex:1;overflow-y:auto;padding:24px 28px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:5px}
</style>
</head>
<body>

<div id="sidebar">
  <div class="px-5 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-700">Matriz Diagnóstica</p>
    <p class="text-[11px] text-gray-400 mt-1 font-medium">GT Alfabetização · SME-SP</p>
  </div>
  <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<div style="position:fixed;top:0;left:280px;right:0;z-index:20;pointer-events:none;background:linear-gradient(rgba(248,250,252,1) 50%,rgba(248,250,252,0))">
  <div style="display:flex;justify-content:center;padding:24px 0 56px">
    <div style="text-align:center">
      <h1 style="font-size:20px;font-weight:800;color:#0F172A;margin:0;letter-spacing:-0.03em">Árvore Diagnóstica de Problemas</h1>
      <p style="font-size:11px;color:#475569;margin:5px 0 0;font-weight:600">Volumetria proporcional e conexões transversais unificadas</p>
    </div>
  </div>
</div>

<div id="painel">
  <div style="padding:28px;border-bottom:1px solid #F1F5F9;flex-shrink:0;display:flex;gap:16px;align-items:start">
    <div style="flex:1;min-width:0">
      <div id="p-cor" style="width:14px;height:14px;border-radius:50%;margin-bottom:10px"></div>
      <h2 id="p-titulo" style="font-size:14px;font-weight:700;color:#0F172A;margin:0;line-height:1.4;letter-spacing:-0.01em"></h2>
      <p id="p-sub" style="font-size:11px;color:#64748B;margin:4px 0 0;font-weight:500"></p>
    </div>
    <button onclick="fecharPainel()" style="width:32px;height:32px;border-radius:10px;background:#F1F5F9;border:none;cursor:pointer;font-size:18px;color:#64748B;flex-shrink:0;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="painel-body"></div>
</div>

<script>
// --- PALETA DE CORES VIVAS E CORPORATIVAS (FIM DOS TONS APAGADOS) ---
const EIXO_CORES = {
  "Eixo 1": "#2563EB", // Blue vivid
  "Eixo 2": "#7C3AED", // Purple vivid
  "Eixo 3": "#059669", // Emerald vivid
  "Eixo 4": "#EA580C", // Orange vivid
  "Eixo 5": "#06B6D4", // Cyan vivid
  "Eixo 6": "#EF4444", // Red vivid
  "Eixo 7": "#14B8A6"  // Teal vivid
};

const EIXO_CURTO = {
  "Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura",
  "Eixo 4": "Incentivos", "Eixo 5": "Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Materiais"
};

const CAT_CORES_MAP = {
  "Fragmentação da concepção": "#F87171", "Fragilidade na comunicação": "#60A5FA",
  "Alta rotatividade": "#C084FC", "Sobrecarga de demandas": "#22D3EE",
  "Participação desigual": "#34D399", "Fragilidade no atendimento": "#FBBF24",
  "Fragilidade na identidade": "#F472B6", "Fragilidade na articulação": "#FCA5A5",
  "Recursos pedagógicos": "#F472B6", "Excesso e sobreposição": "#4ADE80"
};

let G = { nodes: [], edges: [], details: {} };
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv";

async function inicializar() {
    try {
        const res = await fetch(CSV_URL);
        const csv = new TextDecoder("utf-8").decode(await res.arrayBuffer());
        const rows = parseCSV(csv);
        buildStructure(rows);
        buildSidebarHierarquica();
        renderTree();
    } catch (e) {
        console.error(e);
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    return lines.slice(1).map(line => {
        const cols = []; let curr = "", q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') q = !q;
            else if (c === ';' && !q) { cols.push(curr.trim()); curr = ""; }
            else curr += c;
        }
        cols.push(curr.trim());
        return cols;
    });
}

function buildStructure(rows) {
    const catMap = {};
    const eixosAtivos = new Set();

    // Nó central fixo e discreto (Tira o amontoado do meio)
    G.nodes.push({
        id: "ROOT", label: "Problema Central\nSME-SP", shape: "dot", size: 14,
        color: {background: "#EF4444", border: "#DC2626"}, font: {size: 11, color: "#475569", bold: true}
    });

    rows.forEach(r => {
        const [eixo, prob, cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        if (!eixo) return;
        
        const cleanEixo = eixo.split(" - ")[0];
        eixosAtivos.add(cleanEixo);

        const mapearPar = (textoCausa, categoriaCausa) => {
            if (!textoCausa || !categoriaCausa || categoriaCausa.trim() === "" || textoCausa.trim() === "") return;
            const cat = categoriaCausa.trim();
            const txt = textoCausa.trim();

            if (!catMap[cat]) catMap[cat] = { eixos: new Set(), causas: {} };
            catMap[cat].eixos.add(cleanEixo);
            
            if (!catMap[cat].causas[txt]) catMap[cat].causas[txt] = { texto: txt, eixos: new Set(), v: 0 };
            catMap[cat].causas[txt].eixos.add(cleanEixo);
            
            const vNum = parseInt(votos) || 0;
            if (vNum > catMap[cat].causas[txt].v) catMap[cat].causas[txt].v = vNum;
        };

        mapearPar(cp, cat_p);
        mapearPar(cs, cat_s);
        mapearPar(ct, cat_t);
    });

    eixosAtivos.forEach(ex => {
        G.nodes.push({
            id: ex, label: ex, shape: "dot", size: 11,
            color: {background: EIXO_CORES[ex]||"#64748B", border: EIXO_CORES[ex]||"#64748B"},
            font: {size: 10, color: "#1E293B", bold: true}
        });
        G.edges.push({ from: "ROOT", to: ex, color: "#E2E8F0", width: 2 });
    });

    Object.keys(catMap).forEach(catNome => {
        const info = catMap[catNome];
        const totalCausasDiferentes = Object.keys(info.causas).length;
        const chaveCor = Object.keys(CAT_CORES_MAP).find(k => catNome.includes(k));
        const corBase = CAT_CORES_MAP[chaveCor] || "#CBD5E0";

        // MÁGICA VOLUMÉTRICA SUTIL: Base fixa + bônus calculado por volume de causas
        const tamanhoCalculado = 8 + Math.min(totalCausasDiferentes * 1.5, 12);
        const labelCurto = catNome.length > 22 ? catNome.slice(0,22) + "..." : catNome;

        G.nodes.push({
            id: `__cat__${catNome}`,
            label: labelCurto,
            title: catNome,
            shape: "dot",
            size: tamanhoCalculado,
            color: {background: corBase, border: corBase},
            font: {size: 9, color: "#64748B"}
        });

        info.eixos.forEach(ex => {
            G.edges.push({ from: ex, to: `__cat__${catNome}`, color: "#E2E8F0", width: 1 });
        });

        G.details[`__cat__${catNome}`] = {
            cat: catNome, cor: corBase, volumeCausas: totalCausasDiferentes,
            causas: Object.values(info.causas).map(c => ({
                texto: c.texto, eixos: Array.from(c.eixos), votos: c.v
            }))
        };
    });
}

let net = null, vN = null, vE = null;

function renderTree() {
    vN = new vis.DataSet(G.nodes); vE = new vis.DataSet(G.edges);
    net = new vis.Network(document.getElementById("net"), {nodes: vN, edges: vE}, {
        physics: {
            solver: "barnesHut",
            barnesHut: { 
                gravitationalConstant: -3500, // Força a expansão para longe do centro (desembarace)
                centralGravity: 0.3,          // Mantém os grupos organizados radialmente
                springLength: 130,            // Dá espaço para as bolinhas "respirarem"
                springConstant: 0.04, damping: 0.09 
            },
            stabilization: { iterations: 150 }
        },
        interaction: { hover: true, tooltipDelay: 150 }
    });
    net.on("stabilizationIterationsDone", () => net.setOptions({ physics: false }));
    net.on("click", p => p.nodes.length && aoClicarNoNode(p.nodes[0]));
}

function aoClicarNoNode(id) {
    const det = G.details[id];
    if (!det) return;

    document.getElementById("p-cor").style.background = det.cor;
    document.getElementById("p-titulo").textContent = det.cat;
    document.getElementById("p-sub").textContent = `${det.causas.length} ocorrências e evidências unificadas neste tema`;

    let html = '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Relatos Reais da Rede (Alinhados por Categoria)</p>';

    det.causas.forEach(c => {
        const badges = c.eixos.map(ex => `<span style="background:${EIXO_CORES[ex] || "#64748B"};color:white;padding:3px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-right:4px">${EIXO_CURTO[ex] || ex}</span>`).join("");
        html += `<div style="padding:14px;border-radius:12px;border:1px solid #E2E8F0;background:#F8FAFC;margin-bottom:12px">
            <div style="margin-bottom:8px">${badges}</div>
            <p style="font-size:12px;color:#334155;line-height:1.6;font-weight:500">${c.texto}</p>
            ${c.votos > 0 ? `<div style="margin-top:8px;font-size:10px;font-weight:700;color:#D97706;background:#FEF3C7;padding:2px 8px;border-radius:6px;display:inline-block">⭐ ${c.votos} votos no GT</div>` : ""}
        </div>`;
    });

    document.getElementById("painel-body").innerHTML = html;
    document.getElementById("painel").classList.add("open");

    // Efeito Visual Sutil: Apaga o resto e destaca o tema clicado e os eixos dele
    const conectados = net.getConnectedNodes(id); conectados.push(id); conectados.push("ROOT");
    vN.update(G.nodes.map(n => ({ id: n.id, opacity: conectados.includes(n.id) ? 1 : 0.08 })));
}

function buildSidebarHierarquica() {
    const list = document.getElementById("sidebar-list");
    list.innerHTML = "";

    const reset = document.createElement("button");
    reset.className = "w-full text-left p-2.5 rounded-lg text-xs font-bold text-slate-400 hover:bg-slate-50 uppercase mb-4 transition";
    reset.textContent = "⊙ Ver Todos os Temas";
    reset.onclick = () => { fecharPainel(); };
    list.appendChild(reset);

    const sortedCats = Object.keys(G.details).map(id => ({ id, ...G.details[id] }));
    const transversais = [];
    const especificas = [];

    // ORDENAÇÃO HIERÁRQUICA: Ordena decrescente pelo volume de causas
    sortedCats.sort((a, b) => b.volumeCausas - a.volumeCausas);

    sortedCats.forEach(c => {
        // Se o tema engloba causas de mais de 1 eixo, ele é transversal
        const eixosUnicos = new Set();
        c.causas.forEach(causa => causa.eixos.forEach(ex => eixosUnicos.add(ex)));
        if (eixosUnicos.size > 1) transversais.push(c); else especificas.push(c);
    });

    const renderGrupo = (titulo, classeCor, lista) => {
        if (!lista.length) return;
        const h = document.createElement("p");
        h.className = `text-[10px] font-bold uppercase tracking-widest mt-5 mb-2 px-2.5 ${classeCor}`;
        h.textContent = titulo;
        list.appendChild(h);

        lista.forEach(item => {
            const b = document.createElement("button");
            b.className = "cat-btn w-full text-left p-2.5 rounded-xl text-[11px] mb-1 flex items-start gap-2.5 border border-transparent hover:bg-slate-50 transition";
            b.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${item.cor};margin-top:4px;flex-shrink:0"></span><span class="text-slate-600 font-medium leading-normal">${item.cat} <span class="text-indigo-600 font-bold ml-1">(${item.volumeCausas})</span></span>`;
            b.onclick = () => {
                aoClicarNoNode(item.id);
                document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("bg-indigo-50", "border-indigo-100"));
                b.classList.add("bg-indigo-50", "border-indigo-100");
            };
            list.appendChild(b);
        });
    };

    renderGrupo("🔗 Temas Transversais (Por Volume)", "text-indigo-600", transversais);
    renderGrupo("📌 Dores Específicas (Por Volume)", "text-slate-500", especificas);
}

function fecharPainel() {
    document.getElementById("painel").classList.remove("open");
    document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("bg-indigo-50", "border-indigo-100"));
    if (vN) vN.update(G.nodes.map(n => ({ id: n.id, opacity: 1 })));
}

window.onload = inicializar;
</script>
</body>
</html>
