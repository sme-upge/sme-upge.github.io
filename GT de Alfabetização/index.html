<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: "Inter", sans-serif; background: #F7F8FA; }
    #net { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #F7F8FA; transition: left 0.3s ease; }
    
    #sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: white; 
               border-right: 1px solid #E2E8F0; z-index: 30; display: flex; flex-direction: column; transition: 0.3s; }
    #sidebar.hide { transform: translateX(-100%); }
    #sidebar-list { flex: 1; overflow-y: auto; padding: 12px; }

    #painel { position: fixed; top: 0; right: 0; width: 380px; height: 100vh; background: white; 
              border-left: 1px solid #E2E8F0; z-index: 50; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
              box-shadow: -10px 0 15px -3px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    #painel.open { transform: translateX(0); }
    #painel-body { flex: 1; overflow-y: auto; padding: 24px; }

    .mbtn { padding: 10px 18px; border-radius: 12px; font-size: 12px; font-weight: 700; transition: 0.2s; white-space: nowrap; border: 1px solid transparent; }
    .mbtn.on { background: #4F46E5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    .mbtn.off { background: #F8FAFC; color: #64748B; border-color: #E2E8F0; }
    .mbtn.off:hover { background: #F1F5F9; }

    #toggles { position: fixed; top: 100px; right: 20px; z-index: 30; background: white; border-radius: 16px; padding: 16px; 
               border: 1px solid #E2E8F0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: none; min-width: 200px; }

    .vis-tooltip { background: #1F2937 !important; color: white !important; border-radius: 8px !important; padding: 12px !important; font-size: 12px !important; border: none !important; }
</style>
</head>
<body>

<div id="sidebar">
    <div class="p-6 border-b bg-gray-50/50">
        <p class="text-[10px] font-bold uppercase tracking-[0.15em] text-indigo-600">Filtros Temáticos</p>
        <p class="text-[11px] text-gray-400 mt-1 italic">Clique para isolar conexões</p>
    </div>
    <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<!-- Header -->
<div class="fixed top-0 left-0 right-0 z-20 pointer-events-none">
    <div class="flex justify-center py-6">
        <div class="text-center bg-white/90 backdrop-blur-md px-10 py-4 rounded-3xl border border-white/50 shadow-2xl pointer-events-auto">
            <h1 id="main-title" class="text-lg font-black text-gray-900 tracking-tight">Árvore de Problemas</h1>
            <p class="text-[10px] text-indigo-600 font-bold uppercase tracking-[0.2em] mt-1">SME-SP · Grupo de Trabalho</p>
        </div>
    </div>
</div>

<!-- Navigation -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-40 flex gap-3 bg-white/80 backdrop-blur-xl p-2 rounded-2xl border border-gray-200 shadow-2xl">
    <button class="mbtn on" data-m="temas">🔗 Conexões Transversais</button>
    <button class="mbtn off" data-m="completo">🌳 Árvore Completa</button>
    <button class="mbtn off" data-m="minuto">⚡ Resumo 1 Minuto</button>
</div>

<!-- Floating Controls (Mode Completo) -->
<div id="toggles">
    <p class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Exibição de Dados</p>
    <label class="flex items-center justify-between gap-4 text-xs font-semibold text-gray-600 cursor-pointer mb-3 hover:text-indigo-600 transition-colors">
        <span>Causas Transversais</span>
        <input type="checkbox" id="t-trans" checked class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
    </label>
    <label class="flex items-center justify-between gap-4 text-xs font-semibold text-gray-600 cursor-pointer hover:text-indigo-600 transition-colors">
        <span>Causas Isoladas</span>
        <input type="checkbox" id="t-sem" checked class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
    </label>
</div>

<!-- Details Panel -->
<div id="painel">
    <div class="p-8 border-b bg-gray-50/50">
        <div class="flex justify-between items-start mb-4">
            <div id="p-cor" class="w-12 h-2 rounded-full"></div>
            <button onclick="fecharPainel()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
        </div>
        <h2 id="p-titulo" class="text-base font-extrabold text-gray-900 leading-tight"></h2>
        <p id="p-sub" class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest mt-4"></p>
    </div>
    <div id="painel-body"></div>
</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv';

const EIXO_NAMES = {
    'Eixo 1': 'Eixo 1 - Responsabilidades na Garantia do Direito a Alfabetização',
    'Eixo 2': 'Eixo 2 - Formação',
    'Eixo 3': 'Eixo 3 - Infraestrutura Física e Pedagógica',
    'Eixo 4': 'Eixo 4 - Política de Incentivos',
    'Eixo 5': 'Eixo 5 - Acompanhamento e Monitoramento',
    'Eixo 6': 'Eixo 6 - Avaliação',
    'Eixo 7': 'Eixo 7 - Materiais Didáticos e Pedagógicos'
};

const COLORS = {
    cat: '#A78BFA',
    levels: ['#E53E3E', '#2B6CB0', '#D69E2E', '#38A169', '#3182CE', '#805AD5']
};

let network, vNodes, vEdges, fullData = null;
let currentModo = 'temas', selectedCat = null;

window.addEventListener("load", async () => {
    await carregarDados();
    document.querySelectorAll(".mbtn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mbtn").forEach(b => b.classList.replace('on','off'));
            btn.classList.replace('off','on');
            setModo(btn.dataset.m);
        };
    });
    document.getElementById('t-trans').onchange = updateFilters;
    document.getElementById('t-sem').onchange = updateFilters;
});

async function carregarDados() {
    try {
        const response = await fetch(CSV_URL);
        const buffer = await response.arrayBuffer();
        const text = new TextDecoder('utf-8').decode(buffer);
        const rows = parseCSV(text);
        fullData = processarDados(rows);
        buildSidebar(fullData.catsInfo);
        setModo('temas');
    } catch (e) {
        console.error(e);
        alert("Erro ao carregar CSV.");
    }
}

function parseCSV(text) {
    return text.split(/\r?\n/).slice(1).filter(l => l.trim()).map(line => {
        let fields = [], cur = "", inQ = false;
        for (let c of line) {
            if (c === '"') inQ = !inQ;
            else if (c === ';' && !inQ) { fields.push(cur.trim()); cur = ""; }
            else cur += c;
        }
        fields.push(cur.trim());
        return fields;
    });
}

function processarDados(rows) {
    const nodes = new Map();
    const edges = [];
    const catsCount = {};
    const childrenMap = {};

    nodes.set('macro', { id: 'macro', label: 'BAIXA APRENDIZAGEM\nNA ALFABETIZAÇÃO', level: 0, color: COLORS.levels[0], value: 60, font: {size: 18, color: '#fff', bold: true} });

    rows.forEach(row => {
        const [eixo, prob, c1, c2, c3, votos, cat] = row;
        if (!eixo) return;

        // Eixo
        const eixoFull = EIXO_NAMES[eixo] || eixo;
        if (!nodes.has(eixo)) {
            nodes.set(eixo, { id: eixo, label: breakText(eixoFull, 20), title: eixoFull, level: 1, color: '#2B6CB0', value: 40, font: {color: '#fff', size: 10} });
            edges.push({ from: 'macro', to: eixo });
        }

        // Problema
        if (prob && !nodes.has(prob)) {
            nodes.set(prob, { id: prob, label: breakText(prob), title: prob, level: 2, color: COLORS.levels[2], value: 30 });
            edges.push({ from: eixo, to: prob });
        }

        // Hierarquia de Causas
        let path = [prob, c1, c2, c3];
        path.forEach((txt, i) => {
            if (txt && i > 0) {
                const prev = path[i-1];
                if (!nodes.has(txt)) {
                    nodes.set(txt, { id: txt, label: breakText(txt), title: txt, level: i+2, cat, votos: parseInt(votos)||0, color: COLORS.levels[i+2] });
                    edges.push({ from: prev, to: txt });
                }
                // Guardar filhos para o modo 1 minuto
                if(!childrenMap[prev]) childrenMap[prev] = [];
                if(!childrenMap[prev].includes(txt)) childrenMap[prev].push(txt);
            }
        });

        if (cat) catsCount[cat] = (catsCount[cat] || 0) + 1;
    });

    return { 
        nodes: Array.from(nodes.values()), 
        edges, 
        catsInfo: Object.entries(catsCount).map(([name, count]) => ({name, count})),
        childrenMap
    };
}

function setModo(m) {
    currentModo = m;
    fecharPainel();
    document.getElementById('sidebar').classList.toggle('hide', m !== 'temas');
    document.getElementById('toggles').style.display = m === 'completo' ? 'block' : 'none';
    document.getElementById('main-title').innerText = m === 'temas' ? 'Conexões por Temas Transversais' : 'Árvore de Problemas';

    let n = JSON.parse(JSON.stringify(fullData.nodes));
    let e = JSON.parse(JSON.stringify(fullData.edges));

    if (m === 'temas') {
        // Criar nós de categoria
        fullData.catsInfo.forEach(c => {
            n.push({ id: 'cat_'+c.name, label: breakText(c.name, 15), title: `Tema: ${c.name}`, shape: 'diamond', color: COLORS.cat, value: 20 + (c.count * 3), group: 'cat', font: {size: 11, bold: true} });
        });
        // Ligar causas às categorias
        n.forEach(node => {
            if (node.cat) e.push({ from: node.id, to: 'cat_'+node.cat, dashes: true, color: '#A78BFA', width: 1 });
        });
    } else if (m === 'minuto') {
        n = n.filter(node => node.level <= 3);
        const ids = new Set(n.map(node => node.id));
        e = e.filter(edge => ids.has(edge.from) && ids.has(edge.to));
    }

    render(n, e);
}

function render(nodes, edges) {
    vNodes = new vis.DataSet(nodes);
    vEdges = new vis.DataSet(edges);
    network = new vis.Network(document.getElementById("net"), { nodes: vNodes, edges: vEdges }, {
        nodes: { shape: 'dot', font: { face: 'Inter', size: 12, multi: true }, borderWidth: 2, shadow: true },
        edges: { smooth: { type: 'cubicBezier', roundness: 0.4 }, color: '#D1D5DB' },
        physics: { stabilization: true, barnesHut: { gravitationalConstant: -2000 } },
        interaction: { hover: true, tooltipDelay: 200 }
    });

    network.on("click", p => p.nodes.length ? abrirPainel(vNodes.get(p.nodes[0])) : fecharPainel());
}

function abrirPainel(node) {
    if (node.level === 0) return;
    const isCat = node.id.toString().startsWith('cat_');
    
    document.getElementById('p-titulo').innerText = node.title || node.id;
    document.getElementById('p-sub').innerText = isCat ? 'Tema Transversal' : (node.cat ? `Vinculada a: ${node.cat}` : 'Causa Isolada');
    document.getElementById('p-cor').style.background = node.color.background || node.color;
    
    let html = `<div class="mt-6 space-y-6">`;
    
    if (node.votos > 0) {
        html += `<div class="bg-amber-50 border border-amber-200 p-4 rounded-2xl flex items-center gap-4">
            <span class="text-2xl">⭐</span>
            <div><p class="text-amber-900 font-black text-base">${node.votos} Votos</p><p class="text-amber-600 text-[10px] uppercase font-bold tracking-widest">Prioridade do Grupo</p></div>
        </div>`;
    }

    if (currentModo === 'minuto' && node.level === 3) {
        const secundarias = fullData.childrenMap[node.id] || [];
        html += `<div><p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Causas Secundárias Relacionadas:</p><ul class="space-y-2">`;
        secundarias.forEach(s => {
            const sData = fullData.nodes.find(fn => fn.id === s);
            html += `<li class="p-3 bg-white border border-gray-100 rounded-xl text-xs text-gray-700 shadow-sm">
                ${sData.cat ? `<span class="inline-block px-2 py-0.5 bg-purple-100 text-purple-600 rounded text-[9px] font-bold mb-1 mr-1 uppercase">🔗 ${sData.cat}</span>` : ''}
                ${sData.votos > 0 ? `<span class="text-amber-500 font-bold">⭐ ${sData.votos}</span> ` : ''}
                ${s}</li>`;
        });
        html += `</ul></div>`;
    }

    html += `<p class="text-gray-600 text-sm leading-relaxed">${node.title || ''}</p></div>`;
    document.getElementById('painel-body').innerHTML = html;
    document.getElementById('painel').classList.add('open');
}

function buildSidebar(cats) {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = `<button onclick="destacarCategoria(null)" class="w-full text-left p-3 mb-4 rounded-xl text-[10px] font-black text-gray-400 hover:bg-gray-100 uppercase tracking-[0.2em]">Exibir Tudo</button>`;
    cats.sort((a,b) => b.count - a.count).forEach(c => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-3 mb-1 rounded-xl text-[11px] font-semibold text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all border border-transparent flex justify-between items-center";
        btn.innerHTML = `<span>${c.name}</span><span class="bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full text-[9px]">${c.count}</span>`;
        btn.onclick = () => destacarCategoria(c.name);
        list.appendChild(btn);
    });
}

function destacarCategoria(cat) {
    const updates = vNodes.get().map(n => {
        const match = !cat || n.cat === cat || n.id === 'cat_'+cat || n.level < 2;
        return { id: n.id, opacity: match ? 1 : 0.05, font: { color: match ? '#374151' : 'rgba(0,0,0,0)' } };
    });
    vNodes.update(updates);
}

function updateFilters() {
    const showTrans = document.getElementById('t-trans').checked;
    const showSem = document.getElementById('t-sem').checked;
    const updates = vNodes.get().map(n => {
        let hidden = false;
        if (n.level >= 3) {
            if (n.cat && !showTrans) hidden = true;
            if (!n.cat && !showSem) hidden = true;
        }
        return { id: n.id, hidden };
    });
    vNodes.update(updates);
}

function breakText(text, limit = 25) {
    if (text.length <= limit) return text;
    const words = text.split(' ');
    let line = "", res = "";
    words.forEach(w => {
        if ((line + w).length > limit) { res += line + "\n"; line = w + " "; }
        else line += w + " ";
    });
    return res + line;
}

function fecharPainel() { document.getElementById('painel').classList.remove('open'); }
</script>
</body>
</html>
