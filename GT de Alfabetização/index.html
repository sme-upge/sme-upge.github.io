<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Evidências — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#FAFAFA}
#net{position:absolute;top:0;left:290px;right:0;bottom:0;background:#FAFAFA;transition:right .25s cubic-bezier(0.4, 0, 0.2, 1)}
#sidebar{position:fixed;top:0;left:0;width:290px;height:100vh;background:white;border-right:1px solid #EEF2F6;z-index:30;display:flex;flex-direction:column}
#sidebar-list{flex:1;overflow-y:auto;padding:16px 12px}
#painel{position:fixed;top:0;right:0;width:460px;height:100vh;background:white;border-left:1px solid #EEF2F6;z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(0.4, 0, 0.2, 1);box-shadow:-20px 0 40px rgba(15,23,42,0.03)}
#painel.open{transform:translateX(0)}
#painel-body{flex:1;overflow-y:auto;padding:24px 28px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:4px}

.switch {position:relative;display:inline-block;width:32px;height:18px}
.switch input {opacity:0;width:0;height:0}
.slider {position:absolute;cursor:pointer;inset:0;background-color:#E2E8F0;border-radius:20px;transition:.2s}
.slider:before {position:absolute;content:"";height:12px;width:12px;left:3px;bottom:3px;background-color:white;border-radius:50%;transition:.2s}
input:checked + .slider {background-color:#3B82F6}
input:checked + .slider:before {transform:translateX(14px)}

.btn-sidebar-item {
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    margin-bottom: 3px;
    display: flex;
    align-items: start;
    gap: 8px;
    transition: all 0.15s ease;
    white-space: normal !important;
    word-break: break-word !important;
}
.btn-sidebar-item:hover { background-color: #F8FAFC; }
.btn-sidebar-text { flex: 1; min-width: 0; font-weight: 500; color: #475569; line-height: 1.4; }
.btn-sidebar-item.active { background-color: #EFF6FF; }
.btn-sidebar-item.active .btn-sidebar-text { color: #1E40AF; font-weight: 600; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="px-6 pt-6 pb-4 border-b border-slate-50 flex-shrink-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-blue-600">Matriz Diagnóstica</p>
    <p class="text-[12px] text-slate-400 mt-0.5 font-medium">GT Alfabetização · SME-SP</p>
  </div>
  
  <div id="controles-aba1" class="px-6 py-3 bg-slate-50/50 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
    <span class="text-[11px] font-medium text-slate-600">Exibir dores específicas</span>
    <label class="switch">
      <input type="checkbox" id="filtro-especificas" checked onchange="aplicarFiltroAba1()">
      <span class="slider"></span>
    </label>
  </div>

  <div id="controles-aba2" class="px-6 py-4 bg-slate-50/50 border-b border-slate-100 flex-col gap-3.5 flex-shrink-0 hidden">
    <div class="flex flex-col gap-1 w-full border-b border-slate-100 pb-2.5">
      <span class="text-[10px] font-bold text-amber-600 uppercase tracking-wider">Mínimo de Relevância</span>
      <select id="select-votos-hierarquica" class="bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-medium text-slate-700 focus:outline-none" onchange="renderizarEstruturaHierarquica()">
        <option value="0">Todas as Evidências</option>
        <option value="1">1+ Estrela (Sinalizadas)</option>
        <option value="4">4+ Estrelas (Alta Relevância)</option>
        <option value="6">6+ Estrelas (Gargalos Críticos)</option>
      </select>
    </div>

    <div class="flex flex-col gap-1 w-full border-b border-slate-100 pb-2.5">
      <div class="flex items-center justify-between">
        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">Teia Transversal</span>
        <label class="switch">
          <input type="checkbox" id="switch-transversal-hierarquica" checked onchange="toggleVisibilidadeComboTema()">
          <span class="slider"></span>
        </label>
      </div>
      <select id="select-tema-transversal" class="bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-medium text-slate-700 focus:outline-none mt-1" onchange="renderizarEstruturaHierarquica()">
        <option value="__ALL__">Todos os Temas</option>
      </select>
    </div>

    <div>
      <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Filtrar por Eixos</span>
      <div id="checkbox-eixos-container" class="flex flex-col gap-1.5 max-h-[120px] overflow-y-auto"></div>
    </div>
  </div>

  <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<div style="position:fixed;top:0;left:290px;right:0;z-index:20;pointer-events:none;background:linear-gradient(rgba(250,250,250,1) 60%,rgba(250,250,250,0))">
  <div style="display:flex;flex-direction:column;align-items:center;padding:24px 0 40px">
    <div style="text-align:center;pointer-events:auto;">
      <h1 id="main-title" style="font-size:18px;font-weight:700;color:#0F172A;margin:0;letter-spacing:-0.02em">Árvore Diagnóstica de Problemas</h1>
      <p id="main-subtitle" style="font-size:11px;color:#64748B;margin:4px 0 0;font-weight:500">Volumetria proporcional e conexões transversais unificadas</p>
    </div>
    
    <div class="flex bg-slate-200/60 p-0.5 rounded-lg mt-3.5 pointer-events-auto border border-slate-200/40 shadow-sm backdrop-blur-md">
      <button id="btn-aba1" onclick="mudarAba('radial')" class="px-4 py-1.5 rounded-md text-xs font-semibold transition-all bg-white text-slate-800 shadow-sm">
        Matriz de Temas
      </button>
      <button id="btn-aba2" onclick="mudarAba('hierarquica')" class="px-4 py-1.5 rounded-md text-xs font-semibold transition-all text-slate-500 hover:text-slate-800">
        Árvore Detalhada
      </button>
    </div>
  </div>
</div>

<div id="painel">
  <div style="padding:24px;border-bottom:1px solid #F8FAFC;flex-shrink:0;display:flex;gap:16px;align-items:start">
    <div style="flex:1;min-width:0">
      <div id="p-cor" style="width:10px;height:10px;border-radius:50%;margin-bottom:8px"></div>
      <h2 id="p-titulo" style="font-size:13px;font-weight:700;color:#0F172A;margin:0;line-height:1.4"></h2>
      <p id="p-sub" style="font-size:11px;color:#94A3B8;margin:2px 0 0;font-weight:500"></p>
    </div>
    <button onclick="fecharPainel()" style="width:28px;height:28px;border-radius:6px;background:#F1F5F9;border:none;cursor:pointer;font-size:16px;color:#64748B;flex-shrink:0;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="painel-body"></div>
</div>

<script>
const EIXO_CORES = {
  "Eixo 1": "#3B82F6", "Eixo 2": "#8B5CF6", "Eixo 3": "#10B981",
  "Eixo 4": "#F97316", "Eixo 5": "#06B6D4", "Eixo 6": "#F43F5E", "Eixo 7": "#14B8A6"
};

const EIXO_NOMES_COMPLETOS = {};
const CAT_CORES_MAP = {
  "Fragmentação": "#EF4444", "Comunicação": "#3B82F6", "Rotatividade": "#A855F7",
  "Sobrecarga": "#06B6D4", "Participação": "#10B981", "Atendimento": "#F59E0B",
  "Identidade": "#EC4899", "Articulação": "#F43F5E", "Recursos": "#D946EF",
  "Excesso": "#22C55E", "Inadequação": "#F97316", "Qualificação": "#84CC16"
};

const MIN_OPACITY = 0.08;

let currentTab = "radial"; 
let rawRows = []; 
let G_aba1 = { nodes: [], edges: [], details: [], originalEdges: [] }; 
let hNodesDetails = {}; 
let networkInstance = null;
let nodesDataSet = new vis.DataSet([]);
let edgesDataSet = new vis.DataSet([]);
let selectedCategoryRadial = null;

let globalRecorrenciaTexto = {};
let globalTextoParaCategorias = {};
let globalTextoParaEixos = {};

const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv";

async function inicializar() {
    try {
        const res = await fetch(CSV_URL);
        const csv = new TextDecoder("utf-8").decode(await res.arrayBuffer());
        rawRows = parseCSV(csv);
        
        const listaTemasUnicos = new Set();

        rawRows.forEach(r => {
            const [eixoCompleto, , cp, cat_p, cs, cat_s, , ct, cat_t] = r;
            if(!eixoCompleto) return;
            
            const sigla = eixoCompleto.split(" - ")[0];
            EIXO_NOMES_COMPLETOS[sigla] = eixoCompleto;

            [[cp, cat_p], [cs, cat_s], [ct, cat_t]].forEach(([txt, cat]) => {
                if(txt && txt.trim() !== "") {
                    const cleanTxt = txt.trim();
                    if (!globalTextoParaEixos[cleanTxt]) {
                        globalTextoParaEixos[cleanTxt] = new Set();
                        globalRecorrenciaTexto[cleanTxt] = 0;
                    }
                    if (!globalTextoParaEixos[cleanTxt].has(sigla)) {
                        globalTextoParaEixos[cleanTxt].add(sigla);
                        globalRecorrenciaTexto[cleanTxt]++;
                    }
                    if (cat && cat.trim() !== "") {
                        globalTextoParaCategorias[cleanTxt] = cat.trim();
                        listaTemasUnicos.add(cat.trim());
                    }
                }
            });
        });

        const comboTema = document.getElementById("select-tema-transversal");
        Array.from(listaTemasUnicos).sort().forEach(t => {
            const opt = document.createElement("option");
            opt.value = t; opt.textContent = t;
            comboTema.appendChild(opt);
        });

        construirCheckboxEixos();
        processarDadosAba1(); 
        renderizarEstruturaRadial();

    } catch (e) {
        console.error(e);
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    return lines.slice(1).map(line => {
        const cols = []; let q = false; let curr = "";
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') q = !q;
            else if (c === ';' && !q) { cols.push(curr.trim()); curr = ""; }
            else curr += c;
        }
        cols.push(curr.trim());
        return cols;
    });
}

function construirCheckboxEixos() {
    const container = document.getElementById("checkbox-eixos-container");
    container.innerHTML = "";
    Object.keys(EIXO_NOMES_COMPLETOS).sort().forEach((sigla, idx) => {
        const label = document.createElement("label");
        label.className = "flex items-center gap-2 text-[11px] font-medium text-slate-600 cursor-pointer hover:text-slate-900";
        const checked = idx < 3 ? "checked" : ""; 
        label.innerHTML = `
            <input type="checkbox" value="${sigla}" ${checked} class="axis-checkbox rounded border-gray-300 text-blue-600 focus:ring-blue-500 w-3.5 h-3.5" onchange="renderizarEstruturaHierarquica()">
            <span class="truncate" title="${EIXO_NOMES_COMPLETOS[sigla]}">${sigla} - ${EIXO_NOMES_COMPLETOS[sigla].split(" - ")[1]}</span>
        `;
        container.appendChild(label);
    });
}

function toggleVisibilidadeComboTema() {
    const ativo = document.getElementById("switch-transversal-hierarquica").checked;
    document.getElementById("select-tema-transversal").disabled = !ativo;
    renderizarEstruturaHierarquica();
}

// ==========================================
// --- ABA 1: PROPORÇÕES MINIMALISTAS
// ==========================================
function processarDadosAba1() {
    G_aba1 = { nodes: [], edges: [], details: {}, originalEdges: [] };
    const catMap = {}; const eixosAtivos = {};

    G_aba1.nodes.push({
        id: "ROOT", label: "BAIXA ALFABETIZAÇÃO", shape: "dot", size: 14,
        color: { background: "#EF4444", border: "#DC2626" }, font: {size: 8, color: "#94A3B8", bold: true, vadjust: -22}
    });

    rawRows.forEach(r => {
        const [eixoCompleto, probCentral, cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        if (!eixoCompleto) return;
        const cleanEixo = eixoCompleto.split(" - ")[0];
        
        if (!eixosAtivos[cleanEixo]) {
            eixosAtivos[cleanEixo] = { completo: eixoCompleto, problema: probCentral };
        }

        const mapearPar = (textoCausa, categoriaCausa) => {
            if (!textoCausa || !categoriaCausa || categoriaCausa.trim() === "" || textoCausa.trim() === "") return;
            const cat = categoriaCausa.trim(); const txt = textoCausa.trim();
            if (!catMap[cat]) catMap[cat] = { eixos: new Set(), causas: {} };
            catMap[cat].eixos.add(cleanEixo);
            if (!catMap[cat].causas[txt]) catMap[cat].causas[txt] = { texto: txt, eixos: new Set(), v: 0 };
            catMap[cat].causas[txt].eixos.add(cleanEixo);
            const vNum = parseInt(votos) || 0;
            if (vNum > catMap[cat].causas[txt].v) catMap[cat].causas[txt].v = vNum;
        };
        mapearPar(cp, cat_p); mapearPar(cs, cat_s); mapearPar(ct, cat_t);
    });

    Object.keys(eixosAtivos).forEach(ex => {
        const cor = EIXO_CORES[ex] || "#64748B";
        G_aba1.nodes.push({
            id: ex, label: ex, title: eixosAtivos[ex].completo, shape: "dot", size: 9,
            color: {background: cor, border: cor}, font: {size: 10, color: "#334155", bold: true}
        });
        G_aba1.edges.push({ id: `edge_root_${ex}`, from: "ROOT", to: ex, color: { color: "#E2E8F0", opacity: 0.4 }, width: 1 });
        G_aba1.details[ex] = { tipo: "eixo", titulo: eixosAtivos[ex].completo, cor: cor, subtitulo: "Problema Central do Eixo", conteudo: eixosAtivos[ex].problema };
    });

    Object.keys(catMap).forEach(catNome => {
        const info = catMap[catNome];
        const totalCausasDiferentes = Object.keys(info.causas).length;
        let cor = "#64748B";
        for (const chave in CAT_CORES_MAP) {
            if (catNome.toLowerCase().includes(chave.toLowerCase())) { cor = CAT_CORES_MAP[chave]; break; }
        }
        
        const tamanho = 6 + Math.min(totalCausasDiferentes * 1.5, 16);
        const labelCurto = catNome.length > 20 ? catNome.slice(0,18) + "..." : catNome;
        const ehTransversal = globalRecorrenciaTexto[Object.keys(info.causas)[0]] > 1 || info.eixos.size > 1;

        G_aba1.nodes.push({
            id: `__cat__${catNome}`, label: labelCurto, title: catNome, shape: "dot", size: tamanho,
            color: {background: cor, border: cor}, font: {size: 9, color: "#64748B", bold: false, vadjust: 16}, _isSpecific: !ehTransversal
        });

        info.eixos.forEach(ex => {
            G_aba1.edges.push({ id: `edge_${ex}_${catNome}`, from: ex, to: `__cat__${catNome}`, color: { color: "#F1F5F9", opacity: 0.6 }, width: 1 });
        });

        G_aba1.details[`__cat__${catNome}`] = {
            tipo: "categoria", cat: catNome, cor: cor, volumeCausas: totalCausasDiferentes, ehTransversal: ehTransversal,
            causas: Object.values(info.causas).map(c => ({ texto: c.texto, eixos: Array.from(c.eixos), votos: c.v }))
        };
    });

    G_aba1.originalEdges = [...G_aba1.edges];
}

function renderizarEstruturaRadial() {
    fecharPainel();
    selectedCategoryRadial = null;
    buildSidebarRadialAba1();

    nodesDataSet.clear(); nodesDataSet.add(G_aba1.nodes);
    edgesDataSet.clear(); edgesDataSet.add(G_aba1.edges);

    const opcoesRadial = {
        edges: { width: 1, smooth: { enabled: true, type: "continuous", roundness: 0.2 } },
        physics: { 
            enabled: true, 
            solver: "barnesHut", 
            barnesHut: { gravitationalConstant: -3500, centralGravity: 0.04, springLength: 110, springConstant: 0.05 },
            stabilization: { enabled: true, iterations: 120 }
        },
        interaction: { hover: true, tooltipDelay: 80 }
    };

    if (networkInstance) networkInstance.destroy();
    networkInstance = new vis.Network(document.getElementById("net"), {nodes: nodesDataSet, edges: edgesDataSet}, opcoesRadial);
    
    networkInstance.on("stabilizationIterationsDone", function () {
        networkInstance.setOptions({ physics: { enabled: false } });
    });

    networkInstance.on("click", p => {
        if(p.nodes.length) {
            const nodeClicado = p.nodes[0];
            if(nodeClicado.startsWith("__cat__")) {
                filtrarTeiaPorCategoria(nodeClicado.replace("__cat__", ""));
            } else {
                aoClicarNoNodeRadial(nodeClicado);
            }
        } else {
            resetarFiltroTeiaRadial();
        }
    });
    
    aplicarFiltroAba1();
}

function aplicarFiltroAba1() {
    const exibirEspecificas = document.getElementById("filtro-especificas").checked;
    fecharPainel();
    const nosFiltrados = G_aba1.nodes.filter(n => exibirEspecificas || !n._isSpecific);
    
    networkInstance.setOptions({ physics: { enabled: true } });
    nodesDataSet.clear(); nodesDataSet.add(nosFiltrados);
    const idsAtivos = nosFiltrados.map(n => n.id);
    edgesDataSet.clear(); edgesDataSet.add(G_aba1.originalEdges.filter(e => idsAtivos.includes(e.from) && idsAtivos.includes(e.to)));
    networkInstance.stabilize();
}

function filtrarTeiaPorCategoria(nomeCat) {
    selectedCategoryRadial = nomeCat;
    
    document.querySelectorAll(".btn-sidebar-item").forEach(btn => {
        const textNode = btn.querySelector(".btn-sidebar-text");
        if(textNode && textNode.textContent === nomeCat) {
            btn.classList.add("active");
        } else {
            btn.classList.remove("active");
        }
    });

    const catNodeId = `__cat__${nomeCat}`;
    const eixosConectados = G_aba1.edges.filter(e => e.to === catNodeId).map(e => e.from);
    
    const novosNos = G_aba1.nodes.map(n => {
        let op = MIN_OPACITY;
        if (n.id === "ROOT" || n.id === catNodeId || eixosConectados.includes(n.id)) {
            op = 1.0;
        }
        return { id: n.id, opacity: op, font: { color: op === 1.0 ? "#475569" : "rgba(148,163,184,0.15)" } };
    });

    const novasEdges = G_aba1.edges.map(e => {
        let op = 0.03;
        if (e.to === catNodeId || (e.from === "ROOT" && eixosConectados.includes(e.to))) {
            op = 0.8;
        }
        return { id: e.id, color: { opacity: op } };
    });

    nodesDataSet.update(novosNos);
    edgesDataSet.update(novasEdges);
    aoClicarNoNodeRadial(catNodeId);
}

function resetarFiltroTeiaRadial() {
    selectedCategoryRadial = null;
    document.querySelectorAll(".btn-sidebar-item").forEach(btn => btn.classList.remove("active"));
    
    nodesDataSet.update(G_aba1.nodes.map(n => ({ id: n.id, opacity: 1.0, font: { color: "#64748B" } })));
    edgesDataSet.update(G_aba1.edges.map(e => ({ id: e.id, color: { opacity: 0.6 } })));
    fecharPainel();
}

function aoClicarNoNodeRadial(id) {
    const det = G_aba1.details[id]; if (!det) return;
    document.getElementById("p-cor").style.background = det.cor;
    
    if (det.tipo === "eixo") {
        document.getElementById("p-titulo").textContent = det.titulo;
        document.getElementById("p-sub").textContent = det.subtitulo;
        document.getElementById("painel-body").innerHTML = `<div class="p-4 border rounded-xl bg-slate-50/50 text-xs font-medium text-slate-700 leading-relaxed">${det.conteudo}</div>`;
    } else {
        document.getElementById("p-titulo").textContent = det.cat;
        document.getElementById("p-sub").textContent = `${det.volumeCausas} evidências sob este tema`;
        let html = '';
        det.causas.forEach(c => {
            const badges = c.eixos.map(ex => `<span class="inline-block px-2 py-0.5 text-[9px] font-bold text-white rounded mr-1" style="background:${EIXO_CORES[ex]}">${ex}</span>`).join("");
            html += `<div class="p-3 border border-slate-100 rounded-xl bg-slate-50/40 mb-2.5 text-xs">
                <div class="mb-1.5">${badges}</div>
                <p class="text-slate-600 font-medium leading-relaxed">${c.texto}</p>
                ${c.votos > 0 ? `<span class="inline-block mt-2 text-[10px] font-bold text-amber-700 bg-amber-50 px-2 py-0.5 rounded border border-amber-200/40">⭐ ${c.votos} votos</span>` : ""}
            </div>`;
        });
        document.getElementById("painel-body").innerHTML = html;
    }
    document.getElementById("painel").classList.add("open");
    document.getElementById("net").style.right = "460px";
}

function buildSidebarRadialAba1() {
    const list = document.getElementById("sidebar-list"); list.innerHTML = "";
    const sortedCats = Object.keys(G_aba1.details).map(id => G_aba1.details[id]).filter(item => item.tipo === "categoria").sort((a,b)=>b.volumeCausas - a.volumeCausas);
    
    const renderGrupo = (titulo, classeCor, lista) => {
        if (!lista.length) return;
        const h = document.createElement("p"); h.className = `text-[10px] font-bold uppercase tracking-widest mt-4 mb-2 px-2 ${classeCor}`; h.textContent = titulo; list.appendChild(h);
        
        lista.forEach(item => {
            const b = document.createElement("button"); 
            b.className = "btn-sidebar-item";
            b.innerHTML = `
                <span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0" style="background:${item.cor}"></span>
                <span class="btn-sidebar-text">${item.cat}</span>
                <span class="text-[10px] font-bold text-slate-300 mt-0.5 flex-shrink-0">${item.volumeCausas}</span>
            `;
            b.onclick = (e) => {
                e.stopPropagation();
                filtrarTeiaPorCategoria(item.cat);
            };
            list.appendChild(b);
        });
    };
    renderGrupo("🔗 Temas Transversais", "text-blue-600", sortedCats.filter(c=>c.ehTransversal));
    renderGrupo("📌 Dores Específicas", "text-slate-400", sortedCats.filter(c=>!c.ehTransversal));
}


// ==========================================
// --- ABA 2: MODELAGEM HIERÁRQUICA SEM REPETIÇÕES (UNIFICAÇÃO POR STRING)
// ==========================================
function renderizarEstruturaHierarquica() {
    if (currentTab !== "hierarquica") return;
    fecharPainel();
    
    const eixosSelecionados = Array.from(document.querySelectorAll(".axis-checkbox:checked")).map(cb => cb.value);
    const destacarTransversais = document.getElementById("switch-transversal-hierarquica").checked;
    const filtroTemaEscolhido = document.getElementById("select-tema-transversal").value;
    const notaCorteVotos = parseInt(document.getElementById("select-votos-hierarquica").value) || 0;

    const hNodes = []; const hEdges = []; const nosCriadosUnicos = new Set();
    const arestasCriadasUnicas = new Set();
    hNodesDetails = {}; 

    const macroId = "H2_MACRO_ROOT";
    hNodes.push({
        id: macroId, label: "BAIXA ALFABETIZAÇÃO", shape: "dot", size: 12,
        color: { background: "#EF4444", border: "#DC2626" }, font: { bold: true, size: 8, color: "#94A3B8", vadjust: -18 }
    });

    const mapaNodesParaTeia = {};

    // Métricas reais e auditadas por eixo
    const metricasEixos = {};
    eixosSelecionados.forEach(ex => { 
        metricasEixos[ex] = { totalP: 0, totalS: 0, totalT: 0, estrelas: 0, probCentral: "" }; 
    });

    const regVistosP = {}; const regVistosS = {}; const regVistosT = {};

    rawRows.forEach(r => {
        const [eixoCompleto, probCentral, cp, , cs, , votos, ct, ] = r; if (!eixoCompleto) return;
        const sigla = eixoCompleto.split(" - ")[0]; if (!eixosSelecionados.includes(sigla)) return;
        
        metricasEixos[sigla].probCentral = probCentral;
        const vNum = parseInt(votos) || 0;
        
        if (!regVistosP[sigla]) regVistosP[sigla] = new Set();
        if (!regVistosS[sigla]) regVistosS[sigla] = new Set();
        if (!regVistosT[sigla]) regVistosT[sigla] = new Set();

        if (cp && cp.trim() !== "" && !regVistosP[sigla].has(cp.trim())) {
            metricasEixos[sigla].totalP++;
            regVistosP[sigla].add(cp.trim());
            if(vNum >= 1) metricasEixos[sigla].estrelas++;
        }
        if (cs && cs.trim() !== "" && !regVistosS[sigla].has(cs.trim())) {
            metricasEixos[sigla].totalS++;
            regVistosS[sigla].add(cs.trim());
        }
        if (ct && ct.trim() !== "" && !regVistosT[sigla].has(ct.trim())) {
            metricasEixos[sigla].totalT++;
            regVistosT[sigla].add(ct.trim());
        }
    });

    // UNIFICAÇÃO ANÁLITICA DE CADEIAS: Mapeamento de hierarquia limpo por Strings
    rawRows.forEach((r) => {
        const [eixoCompleto, , cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        const siglaEixo = eixoCompleto.split(" - ")[0];
        if (!eixosSelecionados.includes(siglaEixo)) return;

        const vNum = parseInt(votos) || 0;
        if (vNum < notaCorteVotos) return;

        const eixoId = `H2_${siglaEixo}`;
        const corEixo = EIXO_CORES[siglaEixo] || "#64748B";

        if (!nosCriadosUnicos.has(eixoId)) {
            hNodes.push({ id: eixoId, label: siglaEixo, shape: "dot", size: 8, color: { background: corEixo, border: corEixo }, font: { bold: true, size: 10, color: "#475569" } });
            hEdges.push({ from: macroId, to: eixoId, color: { color: "#E2E8F0", opacity: 0.5 }, width: 1 });
            nosCriadosUnicos.add(eixoId);
            hNodesDetails[eixoId] = { tipo: "eixo", titulo: eixoCompleto, sigla: siglaEixo, cor: corEixo, dados: metricasEixos[siglaEixo] };
        }

        // Função de montagem interna blindada contra duplicações pelo uso da Hash do Texto puro
        const registrarNoUnico = (texto, categoria, paiId, camadaLabel, tamanho, corPadrao) => {
            if (!texto || texto.trim() === "") return null;
            const txt = texto.trim();
            
            // O ID agora é baseado unicamente no texto e na camada, removendo o ID da linha do loop
            const hashTexto = btoa(unescape(encodeURIComponent(txt))).replace(/=/g, "").slice(0, 24);
            const noId = `H2_N_${camadaLabel}_${hashTexto}`;

            const temaReal = categoria ? categoria.trim() : (globalTextoParaCategorias[txt] || "Sem Categoria");
            const ehTransversal = globalRecorrenciaTexto[txt] > 1;

            if (!nosCriadosUnicos.has(noId)) {
                let cor = corPadrao; let tSize = tamanho; let bW = 0.5; let bColor = "#CBD5E0";

                if (destacarTransversais && ehTransversal && (filtroTemaEscolhido === "__ALL__" || filtroTemaEscolhido === temaReal)) {
                    cor = "#FEF3C7"; tSize = tamanho + 1.5; bW = 1.5; bColor = "#F59E0B";
                    if (!mapaNodesParaTeia[temaReal]) mapaNodesParaTeia[temaReal] = [];
                    mapaNodesParaTeia[temaReal].push(noId);
                }

                const labelCurto = txt.length > 14 ? txt.slice(0, 12) + "..." : txt;
                hNodes.push({
                    id: noId, label: `[C${camadaLabel}] ${vNum > 0 ? '⭐ ' : ''}${labelCurto}`,
                    shape: "dot", size: tSize, borderWidth: bW, color: { background: cor, border: bColor }, font: { size: 8, color: "#64748B" }
                });

                hNodesDetails[noId] = {
                    tipo: "causa", 
                    camada: camadaLabel === "1" ? "Primária" : camadaLabel === "2" ? "Secundária" : "Terciária",
                    texto: txt, 
                    tema: temaReal, 
                    votos: vNum, 
                    eixoOrigem: eixoCompleto,
                    eixos: Array.from(globalTextoParaEixos[txt] || [siglaEixo]), 
                    ehTransversal: ehTransversal
                };
                nosCriadosUnicos.add(noId);
            }

            // Garante que a aresta entre os nós unificados só seja criada uma única vez
            const arestaKey = `${paiId}->${noId}`;
            if (!arestasCriadasUnicas.has(arestaKey)) {
                hEdges.push({ from: paiId, to: noId, color: { color: "#F1F5F9", opacity: 0.5 }, width: 0.8 });
                arestasCriadasUnicas.add(arestaKey);
            }

            return noId;
        };

        const idP = registrarNoUnico(cp, cat_p, eixoId, "1", 6, "#E2E8F0");
        const idS = idP ? registrarNoUnico(cs, cat_s, idP, "2", 4.5, "#F1F5F9") : null;
        if (idS) registrarNoUnico(ct, cat_t, idS, "3", 3, "#FAFAFA");
    });

    if (destacarTransversais) {
        Object.keys(mapaNodesParaTeia).forEach(tema => {
            if (filtroTemaEscolhido !== "__ALL__" && filtroTemaEscolhido !== tema) return;
            const nos = [...new Set(mapaNodesParaTeia[tema])];
            for (let i = 0; i < nos.length; i++) {
                for (let j = i + 1; j < nos.length; j++) {
                    hEdges.push({ from: nos[i], to: nos[j], color: { color: "#F59E0B", opacity: 0.35 }, width: 0.8, dashes: [2, 3] });
                }
            }
        });
    }

    document.getElementById("sidebar-list").innerHTML = `<div class="p-4 bg-slate-50 border border-slate-100 rounded-xl text-[11px] text-slate-500 leading-relaxed"><p class="font-semibold text-slate-700 mb-1">✨ Constelação Sem Repetições</p>Causas repetidas no CSV foram fundidas em nós únicos. Grafo totalmente estabilizado. Clique em qualquer nó para inspecionar.</div>`;

    nodesDataSet.clear(); nodesDataSet.add(hNodes);
    edgesDataSet.clear(); edgesDataSet.add(hEdges);

    const opcoesHierarquica = {
        physics: { 
            enabled: true, 
            solver: "forceAtlas2Based", 
            forceAtlas2Based: { gravitationalConstant: -45, centralGravity: 0.02, springLength: 40, avoidOverlap: 1 },
            stabilization: { enabled: true, iterations: 180 }
        }
    };

    if (networkInstance) networkInstance.destroy();
    networkInstance = new vis.Network(document.getElementById("net"), {nodes: nodesDataSet, edges: edgesDataSet}, opcoesHierarquica);
    
    networkInstance.on("stabilizationIterationsDone", function () {
        networkInstance.setOptions({ physics: { enabled: false } });
    });

    networkInstance.off("click"); 
    networkInstance.on("click", p => {
        if(!p.nodes.length) { fecharPainel(); return; }
        const id = p.nodes[0];
        
        if(id === "H2_MACRO_ROOT") {
            document.getElementById("p-cor").style.background = "#EF4444";
            document.getElementById("p-titulo").textContent = "Baixa Alfabetização";
            document.getElementById("p-sub").textContent = "Problema Macro Central";
            document.getElementById("painel-body").innerHTML = `<p class="text-xs text-slate-500 font-medium leading-relaxed">Nó Central Diagnóstico.</p>`;
            document.getElementById("painel").classList.add("open"); document.getElementById("net").style.right = "460px";
            return;
        }

        const det = hNodesDetails[id]; if (!det) return;
        document.getElementById("p-cor").style.background = det.cor || "#64748B";

        if(det.tipo === "eixo") {
            document.getElementById("p-titulo").textContent = det.titulo;
            document.getElementById("p-sub").textContent = "Métricas Consolidadas do Eixo";
            document.getElementById("painel-body").innerHTML = `
                <div class="mb-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Problema do Eixo:</span>
                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-medium text-slate-700 leading-relaxed">${det.dados.probCentral}</div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="p-3 bg-white border border-slate-100 rounded-xl shadow-sm"><span class="text-slate-400 block text-[10px]">Causas Primárias</span><span class="text-sm font-bold text-slate-700">${det.dados.totalP}</span></div>
                    <div class="p-3 bg-white border border-slate-100 rounded-xl shadow-sm"><span class="text-slate-400 block text-[10px]">Causas Secundárias</span><span class="text-sm font-bold text-slate-700">${det.dados.totalS}</span></div>
                    <div class="p-3 bg-white border border-slate-100 rounded-xl shadow-sm"><span class="text-slate-400 block text-[10px]">Causas Terciárias</span><span class="text-sm font-bold text-slate-700">${det.dados.totalT}</span></div>
                    <div class="p-3 bg-amber-50/60 border border-amber-100 rounded-xl"><span class="text-amber-700 font-semibold block text-[10px]">Com Estrelas</span><span class="text-sm font-bold text-amber-800">${det.dados.estrelas}</span></div>
                </div>`;
        } else {
            document.getElementById("p-titulo").textContent = `Causa ${det.camada}`;
            document.getElementById("p-sub").textContent = "Evidência Qualitativa Mapeada";
            let cCat = CAT_CORES_MAP[Object.keys(CAT_CORES_MAP).find(k=>det.tema.toLowerCase().includes(k.toLowerCase()))] || "#64748B";
            const badges = det.eixos.map(ex => `<span class="inline-block px-2 py-0.5 text-[9px] font-bold text-white rounded mr-1" style="background:${EIXO_CORES[ex]}">${ex}</span>`).join("");
            
            document.getElementById("painel-body").innerHTML = `
                <div class="mb-3">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Eixo de Origem:</span>
                    <p class="text-xs font-semibold text-slate-800">${det.eixoOrigem}</p>
                </div>
                <div class="p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-medium text-slate-600 leading-relaxed mb-4">${det.texto}</div>
                <div class="flex items-center gap-2 p-2.5 border border-slate-100 rounded-xl bg-white text-xs mb-3 font-medium text-slate-600">
                    <span class="w-2.5 h-2.5 rounded-full" style="background:${cCat}"></span><span>Tema: ${det.tema}</span>
                    ${det.ehTransversal ? `<span class="ml-auto text-[9px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold uppercase tracking-wide">Transversal</span>` : `<span class="ml-auto text-[9px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wide">Específica</span>`}
                </div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Cruzamento de Eixos Compartilhados</div>
                <div class="mb-4">${badges}</div>
                ${det.votos > 0 ? `<div class="p-2 bg-amber-50/80 border border-amber-100 rounded-lg text-xs font-semibold text-amber-800 text-center">⭐ Priorizada com ${det.votos} Votos</div>`:''}`;
        }
        document.getElementById("painel").classList.add("open"); document.getElementById("net").style.right = "460px";
    });
}

// --- CONTROLE DE ABAS ---
function mudarAba(aba) {
    currentTab = aba; fecharPainel();
    const btn1 = document.getElementById("btn-aba1"); const btn2 = document.getElementById("btn-aba2");
    const ctrl1 = document.getElementById("controles-aba1"); const ctrl2 = document.getElementById("controles-aba2");
    
    if (aba === "radial") {
        btn1.className = "px-4 py-1.5 rounded-md text-xs font-semibold transition-all bg-white text-slate-800 shadow-sm";
        btn2.className = "px-4 py-1.5 rounded-md text-xs font-semibold transition-all text-slate-500 hover:text-slate-800";
        ctrl1.classList.remove("hidden"); ctrl2.classList.add("hidden");
        document.getElementById("main-title").textContent = "Árvore Diagnóstica de Problemas";
        document.getElementById("main-subtitle").textContent = "Volumetria proporcional e conexões transversais unificadas";
        renderizarEstruturaRadial();
    } else {
        btn2.className = "px-4 py-1.5 rounded-md text-xs font-semibold transition-all bg-white text-slate-800 shadow-sm";
        btn1.className = "px-4 py-1.5 rounded-md text-xs font-semibold transition-all text-slate-500 hover:text-slate-800";
        ctrl2.classList.remove("hidden"); ctrl2.classList.add("flex"); ctrl1.classList.add("hidden");
        document.getElementById("main-title").textContent = "Constelação Detalhada de Evidências";
        document.getElementById("main-subtitle").textContent = "Desdobramento radial unificado (Eixo → Causa 1ª → 2ª → 3ª)";
        renderizarEstruturaHierarquica();
    }
}

function fecharPainel() {
    document.getElementById("painel").classList.remove("open"); document.getElementById("net").style.right = "0";
    if(currentTab === "radial" && selectedCategoryRadial) {
        resetarFiltroTeiaRadial();
    }
}

window.onload = inicializar;
</script>
