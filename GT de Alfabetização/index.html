<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: "Inter", sans-serif; background: #F7F8FA; }
    #net { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #F7F8FA; transition: left 0.3s ease; }
    
    #sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: white; 
               border-right: 1px solid #E2E8F0; z-index: 30; display: flex; flex-direction: column; transition: 0.3s; }
    #sidebar.hide { transform: translateX(-100%); }
    #sidebar-list { flex: 1; overflow-y: auto; padding: 12px; }

    #painel { position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: white; 
              border-left: 1px solid #E2E8F0; z-index: 50; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
              box-shadow: -15px 0 30px -5px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
    #painel.open { transform: translateX(0); }
    #painel-body { flex: 1; overflow-y: auto; padding: 24px; }

    .mbtn { padding: 10px 20px; border-radius: 14px; font-size: 12px; font-weight: 800; transition: 0.2s; white-space: nowrap; border: 1px solid transparent; }
    .mbtn.on { background: #4F46E5; color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
    .mbtn.off { background: #F8FAFC; color: #64748B; border-color: #E2E8F0; }
    .mbtn.off:hover { background: #F1F5F9; }

    .vis-tooltip { background: #1F2937 !important; color: white !important; border-radius: 10px !important; padding: 12px !important; font-size: 11px !important; border: none !important; max-width: 220px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
    
    .cat-btn { width: 100%; text-align: left; padding: 14px; margin-bottom: 6px; border-radius: 12px; font-size: 11px; line-height: 1.4; transition: 0.2s; display: flex; align-items: start; gap: 12px; border: 1px solid transparent; cursor: pointer; }
    .cat-btn:hover { background: #F1F5F9; }
    .cat-btn.active { background: #EEF2FF; border-color: #C7D2FE; color: #4F46E5; font-weight: 700; }
</style>
</head>
<body>

<!-- Sidebar de Temas (Só aparece no modo 1) -->
<div id="sidebar">
    <div class="p-6 border-b bg-gray-50/50">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-600">Perspectiva Temática</p>
        <p class="text-[11px] text-gray-400 mt-1">Selecione para ver as causas reais</p>
    </div>
    <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<!-- Header Dinâmico -->
<div class="fixed top-0 left-0 right-0 z-20 pointer-events-none">
    <div class="flex justify-center py-6">
        <div class="text-center bg-white/90 backdrop-blur-md px-12 py-4 rounded-3xl border border-white/50 shadow-2xl pointer-events-auto">
            <h1 id="main-title" class="text-lg font-black text-gray-900 tracking-tight">Causas Padronizadas por Temas</h1>
            <p id="main-subtitle" class="text-[10px] text-indigo-600 font-bold uppercase tracking-[0.2em] mt-1">GT DE ALFABETIZAÇÃO · SME-SP</p>
        </div>
    </div>
</div>

<!-- Navegação de Modos -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-40 flex gap-3 bg-white/80 backdrop-blur-xl p-2 rounded-2xl border border-gray-200 shadow-2xl">
    <button class="mbtn on" data-m="temas">🔗 Temas Padronizados</button>
    <button class="mbtn off" data-m="completo">🌳 Visão Técnica</button>
    <button class="mbtn off" data-m="minuto">⚡ Resumo Executivo</button>
</div>

<!-- Painel de Detalhes -->
<div id="painel">
    <div class="p-8 border-b bg-gray-50/50">
        <div class="flex justify-between items-start mb-4">
            <div id="p-cor" class="w-14 h-2 rounded-full"></div>
            <button onclick="fecharPainel()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none transition-transform hover:scale-110">&times;</button>
        </div>
        <h2 id="p-titulo" class="text-base font-black text-gray-900 leading-tight"></h2>
        <p id="p-sub" class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest mt-4"></p>
    </div>
    <div id="painel-body"></div>
</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv';

const EIXO_NAMES = {
    'Eixo 1': 'Eixo 1 - Responsabilidades na Garantia do Direito a Alfabetização',
    'Eixo 2': 'Eixo 2 - Formação',
    'Eixo 3': 'Eixo 3 - Infraestrutura Física e Pedagógica',
    'Eixo 4': 'Eixo 4 - Política de Incentivos',
    'Eixo 5': 'Eixo 5 - Acompanhamento e Monitoramento',
    'Eixo 6': 'Eixo 6 - Avaliação',
    'Eixo 7': 'Eixo 7 - Materiais Didáticos e Pedagógicos'
};

const COLORS = {
    cat: '#818CF8',
    levels: ['#EF4444', '#3B82F6', '#F59E0B', '#10B981', '#6366F1', '#8B5CF6']
};

let network, vNodes, vEdges, fullData = null;
let currentModo = 'temas';

window.addEventListener("load", async () => {
    await carregarDados();
    document.querySelectorAll(".mbtn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mbtn").forEach(b => b.classList.replace('on','off'));
            btn.classList.replace('off','on');
            setModo(btn.dataset.m);
        };
    });
});

async function carregarDados() {
    try {
        const response = await fetch(CSV_URL);
        const buffer = await response.arrayBuffer();
        const text = new TextDecoder('utf-8').decode(buffer);
        const rows = parseCSV(text);
        fullData = processarDados(rows);
        buildSidebar(fullData.temasPadronizados);
        setModo('temas');
    } catch (e) { console.error(e); alert("Erro ao carregar dados."); }
}

function parseCSV(text) {
    return text.split(/\r?\n/).slice(1).filter(l => l.trim()).map(line => {
        let fields = [], cur = "", inQ = false;
        for (let c of line) {
            if (c === '"') inQ = !inQ;
            else if (c === ';' && !inQ) { fields.push(cur.trim()); cur = ""; }
            else cur += c;
        }
        fields.push(cur.trim());
        return fields;
    });
}

function processarDados(rows) {
    const rawNodes = [];
    const temas = {}; // Para agrupar causas reais por tema padronizado

    rows.forEach(row => {
        const [eixo, prob, c1, c2, c3, votos, categoria] = row;
        if (!eixo) return;

        const tema = categoria || c2 || c1; // Se não tem categoria, usa a causa real como tema
        if (!temas[tema]) temas[tema] = { nome: tema, causas: [], eixos: new Set(), totalVotos: 0 };
        
        temas[tema].causas.push({ texto: c2 || c1, eixo, votos: parseInt(votos) || 0 });
        temas[tema].eixos.add(eixo);
        temas[tema].totalVotos += (parseInt(votos) || 0);

        rawNodes.push({ eixo, prob, c1, c2, c3, votos: parseInt(votos) || 0, categoria: tema });
    });

    return { 
        raw: rawNodes, 
        temasPadronizados: Object.values(temas).sort((a,b) => b.causas.length - a.causas.length)
    };
}

function setModo(m) {
    currentModo = m;
    fecharPainel();
    document.getElementById('sidebar').classList.toggle('hide', m !== 'temas');
    document.getElementById('net').style.left = m === 'temas' ? '280px' : '0';
    
    const title = document.getElementById('main-title');
    const nodes = [];
    const edges = [];

    if (m === 'temas') {
        title.innerText = "Causas Padronizadas por Temas";
        // Bolinha central
        nodes.push({ id: 'macro', label: 'BAIXA APRENDIZAGEM', level: 0, color: COLORS.levels[0], value: 40 });
        
        fullData.temasPadronizados.forEach(t => {
            nodes.push({ 
                id: 'tema_'+t.nome, 
                label: breakText(t.nome, 20), 
                title: `Tema: ${t.nome}\n(${t.causas.length} causas reais)`,
                shape: 'dot', 
                color: COLORS.cat, 
                value: 15 + (t.causas.length * 2),
                font: { size: 11, bold: true },
                temaInfo: t
            });
            edges.push({ from: 'macro', to: 'tema_'+t.nome, color: '#E2E8F0' });
        });
    } else if (m === 'completo') {
        title.innerText = "Visão Técnica Completa";
        nodes.push({ id: 'macro', label: 'BAIXA APRENDIZAGEM', level: 0, color: COLORS.levels[0], value: 40 });
        
        const added = new Set();
        fullData.raw.forEach(r => {
            // Eixos
            if (!added.has(r.eixo)) {
                nodes.push({ id: r.eixo, label: breakText(EIXO_NAMES[r.eixo] || r.eixo, 15), level: 1, color: COLORS.levels[1], value: 30, font: {color: '#fff'} });
                edges.push({ from: 'macro', to: r.eixo });
                added.add(r.eixo);
            }
            // Problemas e Causas
            [r.prob, r.c1, r.c2].forEach((txt, i) => {
                if (txt && !added.has(txt)) {
                    nodes.push({ id: txt, label: breakText(txt, 25), level: i+2, color: COLORS.levels[i+2], value: 20 - (i*2), cat: r.categoria });
                    edges.push({ from: i === 0 ? r.eixo : [r.prob, r.c1][i-1], to: txt });
                    added.add(txt);
                }
            });
        });
    } else {
        title.innerText = "Resumo Executivo (1 Minuto)";
        nodes.push({ id: 'macro', label: 'BAIXA APRENDIZAGEM', level: 0, color: COLORS.levels[0], value: 40 });
        const added = new Set();
        fullData.raw.forEach(r => {
            if (!added.has(r.eixo)) {
                nodes.push({ id: r.eixo, label: breakText(EIXO_NAMES[r.eixo] || r.eixo, 20), level: 1, color: COLORS.levels[1], value: 35, font: {color: '#fff'} });
                edges.push({ from: 'macro', to: r.eixo });
                added.add(r.eixo);
            }
            if (r.prob && !added.has(r.prob)) {
                nodes.push({ id: r.prob, label: breakText(r.prob, 30), level: 2, color: COLORS.levels[2], value: 25 });
                edges.push({ from: r.eixo, to: r.prob });
                added.add(r.prob);
            }
        });
    }

    render(nodes, edges);
}

function render(nodes, edges) {
    vNodes = new vis.DataSet(nodes);
    vEdges = new vis.DataSet(edges);
    network = new vis.Network(document.getElementById("net"), { nodes: vNodes, edges: vEdges }, {
        nodes: { shape: 'dot', font: { face: 'Inter', multi: true }, borderWidth: 2, shadow: true },
        edges: { smooth: { type: 'cubicBezier', roundness: 0.4 }, color: '#D1D5DB' },
        physics: { stabilization: true, barnesHut: { gravitationalConstant: -2000 } },
        interaction: { hover: true, tooltipDelay: 200 }
    });
    network.on("click", p => p.nodes.length ? abrirPainel(vNodes.get(p.nodes[0])) : fecharPainel());
}

function abrirPainel(node) {
    const p = document.getElementById('painel');
    const titulo = document.getElementById('p-titulo');
    const sub = document.getElementById('p-sub');
    const body = document.getElementById('painel-body');
    const cor = document.getElementById('p-cor');

    cor.style.background = node.color.background || node.color;
    titulo.innerText = node.id.replace('tema_', '');
    
    let html = `<div class="mt-6 space-y-6">`;

    if (currentModo === 'temas' && node.temaInfo) {
        sub.innerText = "Agrupamento por Tema Padronizado";
        const causasPorEixo = {};
        node.temaInfo.causas.forEach(c => {
            if (!causasPorEixo[c.eixo]) causasPorEixo[c.eixo] = [];
            causasPorEixo[c.eixo].push(c);
        });

        Object.keys(causasPorEixo).forEach(eixo => {
            html += `<div>
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3">${EIXO_NAMES[eixo] || eixo}</p>
                <div class="space-y-2">`;
            causasPorEixo[eixo].forEach(c => {
                html += `<div class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm text-xs text-gray-700 leading-relaxed">
                    ${c.votos > 0 ? `<span class="inline-block px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full font-bold mr-2">⭐ ${c.votos}</span>` : ''}
                    ${c.texto}
                </div>`;
            });
            html += `</div></div>`;
        });
    } else {
        sub.innerText = "Detalhe da Causa Técnica";
        html += `<p class="text-gray-600 text-sm leading-relaxed">${node.id}</p>`;
        if (node.cat) html += `<div class="mt-4 pt-4 border-t"><p class="text-[9px] font-bold text-gray-400 uppercase">Tema Relacionado</p><p class="text-xs text-indigo-600 font-bold">${node.cat}</p></div>`;
    }

    body.innerHTML = html + `</div>`;
    p.classList.add('open');
}

function buildSidebar(temas) {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = "";
    temas.forEach(t => {
        const btn = document.createElement('div');
        btn.className = "cat-btn group";
        btn.innerHTML = `
            <span class="w-2 h-2 rounded-full mt-1.5 shrink-0 bg-indigo-200 group-hover:bg-indigo-500"></span>
            <div class="flex-1">
                <p class="font-bold text-gray-700 group-hover:text-indigo-600">${t.nome}</p>
                <p class="text-[9px] text-gray-400 mt-0.5">${t.causas.length} causas reais · ${t.totalVotos} votos</p>
            </div>`;
        btn.onclick = () => {
            const nodeId = 'tema_' + t.nome;
            network.selectNodes([nodeId]);
            abrirPainel(vNodes.get(nodeId));
        };
        list.appendChild(btn);
    });
}

function breakText(text, limit = 25) {
    if (text.length <= limit) return text;
    const words = text.split(' ');
    let line = "", res = "";
    words.forEach(w => {
        if ((line + w).length > limit) { res += line + "\n"; line = w + " "; }
        else line += w + " ";
    });
    return res + line;
}

function fecharPainel() { document.getElementById('painel').classList.remove('open'); }
</script>
</body>
</html>
