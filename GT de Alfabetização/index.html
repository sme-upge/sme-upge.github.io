<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F7F8FA}
#net{position:absolute;top:0;left:0;right:0;bottom:0;background:#F7F8FA}
#sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:white;
  border-right:1px solid #E2E8F0;z-index:30;display:flex;flex-direction:column}
#sidebar-list{flex:1;overflow-y:auto;padding:8px}
#sidebar.hide{display:none}
#painel{position:fixed;top:0;right:0;width:380px;height:100vh;background:white;
  border-left:1px solid #E2E8F0;z-index:40;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s ease;box-shadow:-10px 0 20px rgba(0,0,0,0.05)}
#painel.open{transform:translateX(0)}
#painel-body{flex:1;overflow-y:auto;padding:16px 20px}
#toggles{position:fixed;top:80px;right:16px;z-index:30;background:white;
  border:1px solid #E2E8F0;border-radius:12px;padding:12px 16px;display:none}
.mbtn{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;
  border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.mbtn.on{background:#4F46E5;color:white}
.mbtn.off{background:#F1F5F9;color:#64748B}
.tog{position:relative;display:inline-block;width:32px;height:18px}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;cursor:pointer;inset:0;background:#CBD5E0;border-radius:18px;transition:.2s}
.tog-sl:before{position:absolute;content:"";height:12px;width:12px;left:3px;bottom:3px;
  background:white;border-radius:50%;transition:.2s}
input:checked+.tog-sl{background:#4F46E5}
input:checked+.tog-sl:before{transform:translateX(14px)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}
.vis-tooltip{background:rgba(17,24,39,.9)!important;color:#F9FAFB!important;
  border:none!important;border-radius:8px!important;font-size:11px!important;
  padding:6px 10px!important;max-width:260px!important;line-height:1.5!important}
</style>
</head>
<body>

<div id="sidebar">
  <div class="px-4 pt-4 pb-3 border-b border-gray-100 flex-shrink-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-600">Filtros Pedagógicos</p>
    <p class="text-[10px] text-gray-400 mt-0.5 font-medium">GT Alfabetização</p>
  </div>
  <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<div style="position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;
  background:linear-gradient(rgba(247,248,250,1),rgba(247,248,250,0))">
  <div style="display:flex;justify-content:center;padding:20px 0 40px">
    <div style="text-align:center">
      <h1 style="font-size:18px;font-weight:700;color:#1A202C;margin:0">Árvore de Problemas</h1>
      <p style="font-size:11px;color:#718096;margin:4px 0 0">GT de Alfabetização · SME-SP · 2026</p>
    </div>
  </div>
</div>

<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;gap:8px;background:rgba(255,255,255,.95);border:1px solid #E2E8F0;
  border-radius:16px;padding:10px 16px;box-shadow:0 4px 16px rgba(0,0,0,.1)">
  <button class="mbtn on" data-m="temas">🔗 Conexões por temas</button>
  <button class="mbtn off" data-m="completo">🌳 Completo</button>
</div>

<div id="toggles">
  <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    color:#9CA3AF;margin:0 0 10px">Exibir</p>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <label class="tog"><input type="checkbox" id="t-trans" checked><span class="tog-sl"></span></label>
    <span style="font-size:12px;color:#4B5563">Conexões transversais</span>
  </div>
</div>

<div id="painel">
  <div style="padding:20px;border-bottom:1px solid #E2E8F0;flex-shrink:0;display:flex;gap:12px;align-items:start">
    <div style="flex:1;min-width:0">
      <div id="p-cor" style="width:12px;height:12px;border-radius:50%;margin-bottom:8px"></div>
      <h2 id="p-titulo" style="font-size:13px;font-weight:700;color:#1A202C;margin:0;line-height:1.4"></h2>
      <p id="p-sub" style="font-size:11px;color:#9CA3AF;margin:6px 0 0"></p>
    </div>
    <button onclick="fecharPainel()" style="width:28px;height:28px;border-radius:8px;
      background:#F3F4F6;border:none;cursor:pointer;font-size:16px;color:#6B7280;
      flex-shrink:0;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="painel-body" style="flex:1;overflow-y:auto;padding:16px 20px"></div>
</div>

<script>
// --- CONFIGURAÇÃO ESTÁTICA ---
const EIXO_CORES = {
  "Eixo 1": "#2B6CB0", "Eixo 2": "#6B46C1", "Eixo 3": "#276749",
  "Eixo 4": "#9C4221", "Eixo 5": "#1A5276", "Eixo 6": "#9B2335", "Eixo 7": "#234E52"
};

const EIXO_CURTO = {
  "Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura",
  "Eixo 4": "Incentivos", "Eixo 5": "Acomp. e Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Materiais Didáticos"
};

const CAT_CORES_MAP = {
  "Fragmentação da concepção": "#ECC94B", "Fragilidade na comunicação": "#FC8181",
  "Alta rotatividade": "#C6F6D5", "Sobrecarga de demandas": "#F687B3",
  "Participação desigual": "#68D391", "Fragilidade no atendimento": "#E9D8FD"
};

// --- DATA ENGINE ---
let D = { grafo_temas: { nodes: [], edges: [], detail: {} } };
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv";

async function inicializarAplicacao() {
    try {
        const res = await fetch(CSV_URL);
        const csv = new TextDecoder("utf-8").decode(await res.arrayBuffer());
        const rows = parseCSV(csv);
        buildStructure(rows);
        buildSidebar();
        setModo("temas");
    } catch (e) {
        console.error("Falha no carregamento:", e);
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    return lines.slice(1).map(line => {
        const cols = []; let curr = "", q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') q = !q;
            else if (c === ';' && !q) { cols.push(curr.trim()); curr = ""; }
            else curr += c;
        }
        cols.push(curr.trim());
        return cols;
    });
}

function buildStructure(rows) {
    const catMap = {};
    const eixosAtivos = new Set();

    D.grafo_temas.nodes.push({
        id: "__macro__", label: "Baixa\naprendizagem\nna alfabetização", group: "macro", value: 90,
        color: {background: "#E53E3E", border: "#C53030"}, font: {size: 13, color: "#fff", bold: true}, shape: "dot"
    });

    rows.forEach(r => {
        const [eixo, prob, cp, cs, votos, cat] = r;
        if (!eixo || !cat) return;
        eixosAtivos.add(eixo);

        if (!catMap[cat]) catMap[cat] = { axes: new Set(), rawCauses: {} };
        catMap[cat].axes.add(eixo);

        const txt = cs || cp;
        if (!catMap[cat].rawCauses[txt]) catMap[cat].rawCauses[txt] = { text: txt, axes: new Set(), v: 0 };
        catMap[cat].rawCauses[txt].axes.add(eixo);
        const vNum = parseInt(votos) || 0;
        if (vNum > catMap[cat].rawCauses[txt].v) catMap[cat].rawCauses[txt].v = vNum;
    });

    eixosAtivos.forEach(ex => {
        D.grafo_temas.nodes.push({
            id: `__e__${ex}`, label: `${ex}\n${EIXO_CURTO[ex] || ""}`, title: ex, group: "eixo", value: 45,
            color: {background: EIXO_CORES[ex], border: EIXO_CORES[ex]}, font: {size: 10, color: "#fff"}, shape: "dot"
        });
        D.grafo_temas.edges.push({from: "__macro__", to: `__e__${ex}`, color: {color: EIXO_CORES[ex]+"99"}, width: 1.5});
    });

    Object.keys(catMap).forEach(name => {
        const id = `__cat__${name}`;
        const info = catMap[name];
        const corBase = CAT_CORES_MAP[Object.keys(CAT_CORES_MAP).find(k => name.includes(k))] || "#CBD5E0";

        D.grafo_temas.nodes.push({
            id: id, label: name.length > 40 ? name.slice(0,40)+"..." : name, title: name, group: "cat",
            value: 40 + (info.axes.size * 12), color: {background: corBase+"66", border: corBase},
            font: {size: 10, color: "#1A202C"}, shape: "dot"
        });

        info.axes.forEach(ex => D.grafo_temas.edges.push({from: `__e__${ex}`, to: id, color: {color: corBase}, width: 2}));

        D.grafo_temas.detail[id] = {
            cat: name, cor: corBase, eixos: Array.from(info.axes),
            causas: Object.values(info.rawCauses).map(c => ({
                causa: c.text, eixos_origem: Array.from(c.axes), votos: c.v
            }))
        };
    });
}

// --- VIS.JS ENGINE ---
let net = null, vN = null, vE = null, modo = "temas", selCat = null;

function render(nodes, edges, opts) {
    if (net) net.destroy();
    vN = new vis.DataSet(nodes); vE = new vis.DataSet(edges);
    net = new vis.Network(document.getElementById("net"), {nodes: vN, edges: vE}, {
        nodes: {shape: "dot", scaling: {min: 8, max: opts.mn}, font: {size: 11, face: "Inter", color: "#374151"}},
        edges: {width: 0.8, color: "#D1D5DB", smooth: {type: "continuous"}},
        physics: {barnesHut: {gravitationalConstant: opts.grav, centralGravity: 0.25, springLength: opts.sl}, stabilization: {iterations: 200}},
        interaction: {hover: true, tooltipDelay: 300}
    });
    setTimeout(() => { if(net) { net.setOptions({physics: false}); net.fit(); } }, 2000);
    net.on("click", p => p.nodes.length && onClick(p.nodes[0]));
}

function setModo(m) {
    modo = m; fecharPainel();
    document.querySelectorAll(".mbtn").forEach(b => {
        b.classList.toggle("on", b.dataset.m === m);
        b.classList.toggle("off", b.dataset.m !== m);
    });
    document.getElementById("sidebar").classList.toggle("hide", m !== "temas");
    document.getElementById("net").style.left = m === "temas" ? "240px" : "0";
    if (m === "temas") render(D.grafo_temas.nodes, D.grafo_temas.edges, {mn: 75, grav: -16000, sl: 130});
    else render(D.grafo_temas.nodes, D.grafo_temas.edges, {mn: 50, grav: -32000, sl: 170});
}

function onClick(id) {
    const det = D.grafo_temas.detail[id];
    if (!det) return;
    document.getElementById("p-cor").style.background = det.cor;
    document.getElementById("p-titulo").textContent = det.cat;
    document.getElementById("p-sub").textContent = `${det.causas.length} causas consolidadas`;
    
    let html = '<p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Evidências Mapeadas</p>';
    det.causas.forEach(c => {
        const badges = c.eixos_origem.map(ex => `<span style="background:${EIXO_CORES[ex]};color:white;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-right:4px">${EIXO_CURTO[ex] || ex}</span>`).join("");
        html += `<div style="padding:12px;border-radius:10px;border:1px solid #E2E8F0;background:#F9FAFB;margin-bottom:12px">
            <div style="margin-bottom:8px">${badges}</div>
            <p style="font-size:12px;color:#374151;line-height:1.5">${c.causa}</p>
            ${c.votos > 0 ? `<div style="margin-top:6px;font-size:10px;font-weight:700;color:#D97706">⭐ ${c.votos} votos</div>` : ""}
        </div>`;
    });
    document.getElementById("painel-body").innerHTML = html;
    document.getElementById("painel").classList.add("open");
    destacar(id);
}

function buildSidebar() {
    const list = document.getElementById("sidebar-list");
    list.innerHTML = "";
    
    const reset = document.createElement("button");
    reset.className = "w-full text-left p-2 rounded text-xs font-bold text-gray-400 hover:bg-gray-100 uppercase mb-4";
    reset.textContent = "⊙ Ver Grafo Completo";
    reset.onclick = () => { destacar(null); fecharPainel(); };
    list.appendChild(reset);

    const t = [], i = [];
    Object.keys(D.grafo_temas.detail).forEach(id => {
        const item = D.grafo_temas.detail[id];
        if (item.eixos.length > 1) t.push({id, ...item}); else i.push({id, ...item});
    });

    const renderGrupo = (titulo, cor, lista) => {
        const h = document.createElement("p");
        h.className = `text-[10px] font-bold uppercase tracking-widest mt-4 mb-2 ${cor}`;
        h.textContent = titulo;
        list.appendChild(h);
        lista.forEach(item => {
            const b = document.createElement("button");
            b.className = "cat-btn w-full text-left p-2 rounded-lg text-[11px] mb-1 flex items-start gap-2 border border-transparent hover:bg-gray-50";
            b.dataset.c = item.id;
            b.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${item.cor};margin-top:3px;flex-shrink:0"></span><span>${item.cat}</span>`;
            b.onclick = () => onClick(item.id);
            list.appendChild(b);
        });
        list.appendChild(document.createElement("hr"));
    };

    renderGrupo("🔗 Causas Transversais", "text-indigo-600", t);
    renderGrupo("📌 Causas Específicas", "text-slate-500", i);
}

function destacar(id) {
    selCat = id;
    document.querySelectorAll(".cat-btn").forEach(b => {
        const act = b.dataset.c === id;
        b.style.background = act ? "#EEF2FF" : "transparent";
        b.style.borderColor = act ? "#C7D2FE" : "transparent";
    });
    if (!vN) return;
    if (!id) { vN.update(vN.get().map(n => ({id: n.id, opacity: 1}))); return; }
    const nodes = net.getConnectedNodes(id); nodes.push(id);
    vN.update(vN.get().map(n => ({id: n.id, opacity: nodes.includes(n.id) ? 1 : 0.1})));
}

function fecharPainel() { document.getElementById("painel").classList.remove("open"); }
window.onload = inicializarAplicacao;
</script>
</body>
</html>
