<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Evidências — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F8FAFC}
#net{position:absolute;top:0;left:280px;right:0;bottom:0;background:#F8FAFC;transition:right .25s ease}
#sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:white;border-right:1px solid #E2E8F0;z-index:30;display:flex;flex-direction:column}
#sidebar-list{flex:1;overflow-y:auto;padding:12px 8px}
#painel{position:fixed;top:0;right:0;width:480px;height:100vh;background:white;border-left:1px solid #E2E8F0;z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-12px 0 30px rgba(0,0,0,0.04)}
#painel.open{transform:translateX(0)}
#painel-body{flex:1;overflow-y:auto;padding:24px 28px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:5px}

.switch {position:relative;display:inline-block;width:34px;height:20px}
.switch input {opacity:0;width:0;height:0}
.slider {position:absolute;cursor:pointer;inset:0;background-color:#CBD5E0;border-radius:20px;transition:.2s}
.slider:before {position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background-color:white;border-radius:50%;transition:.2s}
input:checked + .slider {background-color:#2563EB}
input:checked + .slider:before {transform:translateX(14px)}

.btn-sidebar-item {
    width: 100%;
    text-align: left;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 12px;
    margin-bottom: 4px;
    display: flex;
    align-items: start;
    gap: 10px;
    transition: all 0.2s ease;
    white-space: normal !important;
    word-break: break-word !important;
}
.btn-sidebar-item:hover { background-color: #F8FAFC; }
.btn-sidebar-text { flex: 1; min-width: 0; font-weight: 600; color: #334155; line-height: 1.4; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="px-5 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-700">Matriz Diagnóstica</p>
    <p class="text-[11px] text-gray-400 mt-1 font-medium">GT Alfabetização · SME-SP</p>
  </div>
  
  <div id="controles-aba1" class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
    <span class="text-[11px] font-semibold text-slate-700">Exibir dores específicas</span>
    <label class="switch">
      <input type="checkbox" id="filtro-especificas" checked onchange="aplicarFiltroAba1()">
      <span class="slider"></span>
    </label>
  </div>

  <div id="controles-aba2" class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex-col gap-3 flex-shrink-0 hidden">
    <div class="flex flex-col gap-1 w-full border-b border-slate-200 pb-2">
      <span class="text-[10px] font-bold text-amber-600 uppercase tracking-wider">Mínimo de Relevância (⭐)</span>
      <select id="select-votos-hierarquica" class="bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-medium text-slate-700 focus:outline-none" onchange="renderizarEstruturaHierarquica()">
        <option value="0">Mostrar Todas as Evidências</option>
        <option value="1">1+ Estrela (Sinalizadas)</option>
        <option value="4">4+ Estrelas (Alta Relevância)</option>
        <option value="6">6+ Estrelas (Gargalos Críticos)</option>
      </select>
    </div>

    <div class="flex flex-col gap-1 w-full border-b border-slate-200 pb-2">
      <div class="flex items-center justify-between">
        <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider">Teia Transversal</span>
        <label class="switch">
          <input type="checkbox" id="switch-transversal-hierarquica" checked onchange="toggleVisibilidadeComboTema()">
          <span class="slider"></span>
        </label>
      </div>
      <select id="select-tema-transversal" class="bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-medium text-slate-700 focus:outline-none mt-1" onchange="renderizarEstruturaHierarquica()">
        <option value="__ALL__">Ver Todos os Temas</option>
      </select>
    </div>

    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5 block">Filtrar por Eixos</span>
    <div id="checkbox-eixos-container" class="flex flex-col gap-1.5 max-h-[140px] overflow-y-auto"></div>
  </div>

  <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<div style="position:fixed;top:0;left:280px;right:0;z-index:20;pointer-events:none;background:linear-gradient(rgba(248,250,252,1) 70%,rgba(248,250,252,0))">
  <div style="display:flex;flex-direction:column;align-items:center;padding:20px 0 40px">
    <div style="text-align:center;pointer-events:auto;">
      <h1 id="main-title" style="font-size:20px;font-weight:800;color:#0F172A;margin:0;letter-spacing:-0.03em">Árvore Diagnóstica de Problemas</h1>
      <p id="main-subtitle" style="font-size:11px;color:#475569;margin:5px 0 0;font-weight:600">Volumetria proporcional e conexões transversais unificadas</p>
    </div>
    
    <div class="flex bg-slate-200/80 p-1 rounded-xl mt-4 pointer-events-auto shadow-sm backdrop-blur-sm">
      <button id="btn-aba1" onclick="mudarAba('radial')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-800 shadow-sm">
        Matriz de Temas
      </button>
      <button id="btn-aba2" onclick="mudarAba('hierarquica')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800">
        Árvore Detalhada
      </button>
    </div>
  </div>
</div>

<div id="painel">
  <div style="padding:28px;border-bottom:1px solid #F1F5F9;flex-shrink:0;display:flex;gap:16px;align-items:start">
    <div style="flex:1;min-width:0">
      <div id="p-cor" style="width:14px;height:14px;border-radius:50%;margin-bottom:10px;box-shadow:0 0 6px rgba(0,0,0,0.1)"></div>
      <h2 id="p-titulo" style="font-size:14px;font-weight:700;color:#0F172A;margin:0;line-height:1.4;letter-spacing:-0.01em"></h2>
      <p id="p-sub" style="font-size:11px;color:#64748B;margin:4px 0 0;font-weight:500"></p>
    </div>
    <button onclick="fecharPainel()" style="width:32px;height:32px;border-radius:10px;background:#F1F5F9;border:none;cursor:pointer;font-size:18px;color:#64748B;flex-shrink:0;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="painel-body"></div>
</div>

<script>
const EIXO_CORES = {
  "Eixo 1": "#2563EB", "Eixo 2": "#7C3AED", "Eixo 3": "#059669",
  "Eixo 4": "#EA580C", "Eixo 5": "#06B6D4", "Eixo 6": "#E11D48", "Eixo 7": "#14B8A6"
};

const EIXO_NOMES_COMPLETOS = {};
const CAT_CORES_MAP = {
  "Fragmentação": "#EF4444", "Comunicação": "#3B82F6", "Rotatividade": "#A855F7",
  "Sobrecarga": "#06B6D4", "Participação": "#10B981", "Atendimento": "#F59E0B",
  "Identidade": "#EC4899", "Articulação": "#F43F5E", "Recursos": "#D946EF",
  "Excesso": "#22C55E", "Inadequação": "#F97316", "Qualificação": "#84CC16"
};

let currentTab = "radial"; 
let rawRows = []; 
let G_aba1 = { nodes: [], edges: [], details: [], originalEdges: [] }; 
let hNodesDetails = {}; 
let networkInstance = null;
let nodesDataSet = new vis.DataSet([]);
let edgesDataSet = new vis.DataSet([]);

const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv";

async function inicializar() {
    try {
        const res = await fetch(CSV_URL);
        const csv = new TextDecoder("utf-8").decode(await res.arrayBuffer());
        rawRows = parseCSV(csv);
        
        const listaTemasUnicos = new Set();

        rawRows.forEach(r => {
            const [eixoCompleto,, , cp_cat,, cs_cat,, , ct_cat] = r;
            if(eixoCompleto && eixoCompleto.includes(" - ")) {
                const sigla = eixoCompleto.split(" - ")[0];
                EIXO_NOMES_COMPLETOS[sigla] = eixoCompleto;
            }
            [cp_cat, cs_cat, ct_cat].forEach(cat => {
                if(cat && cat.trim() !== "") listaTemasUnicos.add(cat.trim());
            });
        });

        const comboTema = document.getElementById("select-tema-transversal");
        Array.from(listaTemasUnicos).sort().forEach(t => {
            const opt = document.createElement("option");
            opt.value = t; opt.textContent = t;
            comboTema.appendChild(opt);
        });

        construirCheckboxEixos();
        processarDadosAba1(); 
        renderizarEstruturaRadial();

    } catch (e) {
        console.error(e);
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    return lines.slice(1).map(line => {
        const cols = []; let q = false; let curr = "";
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') q = !q;
            else if (c === ';' && !q) { cols.push(curr.trim()); curr = ""; }
            else curr += c;
        }
        cols.push(curr.trim());
        return cols;
    });
}

function construirCheckboxEixos() {
    const container = document.getElementById("checkbox-eixos-container");
    container.innerHTML = "";
    Object.keys(EIXO_NOMES_COMPLETOS).sort().forEach((sigla, idx) => {
        const label = document.createElement("label");
        label.className = "flex items-center gap-2 text-[11px] font-medium text-slate-600 cursor-pointer hover:text-slate-900";
        const checked = idx < 3 ? "checked" : ""; 
        label.innerHTML = `
            <input type="checkbox" value="${sigla}" ${checked} class="axis-checkbox rounded border-gray-300 text-blue-600 focus:ring-blue-500 w-3.5 h-3.5" onchange="renderizarEstruturaHierarquica()">
            <span class="truncate" title="${EIXO_NOMES_COMPLETOS[sigla]}">${sigla} - ${EIXO_NOMES_COMPLETOS[sigla].split(" - ")[1]}</span>
        `;
        container.appendChild(label);
    });
}

function toggleVisibilidadeComboTema() {
    const ativo = document.getElementById("switch-transversal-hierarquica").checked;
    document.getElementById("select-tema-transversal").disabled = !ativo;
    renderizarEstruturaHierarquica();
}

// ==========================================
// --- MOTOR DA ABA 1 (PRESERVAÇÃO TOTAL + TRANSIÇÃO ELÁSTICA)
// ==========================================
function processarDadosAba1() {
    G_aba1 = { nodes: [], edges: [], details: {}, originalEdges: [] };
    const catMap = {}; const eixosAtivos = {};

    G_aba1.nodes.push({
        id: "ROOT", label: "BAIXA\nALFABETIZAÇÃO", shape: "dot", size: 38,
        color: { background: "#E11D48", border: "#BE123C" }, font: {size: 10, color: "#FFFFFF", bold: true}
    });

    rawRows.forEach(r => {
        const [eixoCompleto, probCentral, cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        if (!eixoCompleto) return;
        const cleanEixo = eixoCompleto.split(" - ")[0];
        
        if (!eixosAtivos[cleanEixo]) {
            eixosAtivos[cleanEixo] = { completo: eixoCompleto, problema: probCentral };
        }

        const mapearPar = (textoCausa, categoriaCausa) => {
            if (!textoCausa || !categoriaCausa || categoriaCausa.trim() === "" || textoCausa.trim() === "") return;
            const cat = categoriaCausa.trim(); const txt = textoCausa.trim();
            if (!catMap[cat]) catMap[cat] = { eixos: new Set(), causas: {} };
            catMap[cat].eixos.add(cleanEixo);
            if (!catMap[cat].causas[txt]) catMap[cat].causas[txt] = { texto: txt, eixos: new Set(), v: 0 };
            catMap[cat].causas[txt].eixos.add(cleanEixo);
            const vNum = parseInt(votos) || 0;
            if (vNum > catMap[cat].causas[txt].v) catMap[cat].causas[txt].v = vNum;
        };
        mapearPar(cp, cat_p); mapearPar(cs, cat_s); mapearPar(ct, cat_t);
    });

    Object.keys(eixosAtivos).forEach(ex => {
        const cor = EIXO_CORES[ex] || "#475569";
        G_aba1.nodes.push({
            id: ex, label: ex, title: eixosAtivos[ex].completo, shape: "dot", size: 26,
            color: {background: cor, border: cor}, font: {size: 12, color: "#1E293B", bold: true}
        });
        G_aba1.edges.push({ id: `edge_root_${ex}`, from: "ROOT", to: ex, color: { color: "#CBD5E0", opacity: 0.6 }, width: 2 });
        G_aba1.details[ex] = { tipo: "eixo", titulo: eixosAtivos[ex].completo, cor: cor, subtitulo: "Problema Central do Eixo", conteudo: eixosAtivos[ex].problema };
    });

    Object.keys(catMap).forEach(catNome => {
        const info = catMap[catNome];
        const totalCausasDiferentes = Object.keys(info.causas).length;
        let cor = "#FF6B6B";
        for (const chave in CAT_CORES_MAP) {
            if (catNome.toLowerCase().includes(chave.toLowerCase())) { cor = CAT_CORES_MAP[chave]; break; }
        }
        const tamanho = 16 + Math.min(totalCausasDiferentes * 3.5, 34);
        const labelCurto = catNome.length > 22 ? catNome.slice(0,20) + "..." : catNome;
        const ehTransversal = info.eixos.size > 1;

        G_aba1.nodes.push({
            id: `__cat__${catNome}`, label: labelCurto, title: catNome, shape: "dot", size: tamanho,
            color: {background: cor, border: cor}, font: {size: 11, color: "#334155", bold: true}, _isSpecific: !ehTransversal
        });

        info.eixos.forEach(ex => {
            G_aba1.edges.push({ id: `edge_${ex}_${catNome}`, from: ex, to: `__cat__${catNome}`, color: { color: "#E2E8F0", opacity: 0.8 }, width: 1.5 });
        });

        G_aba1.details[`__cat__${catNome}`] = {
            tipo: "categoria", cat: catNome, cor: cor, volumeCausas: totalCausasDiferentes, ehTransversal: ehTransversal,
            causas: Object.values(info.causas).map(c => ({ texto: c.texto, eixos: Array.from(c.eixos), votos: c.v }))
        };
    });

    G_aba1.originalEdges = [...G_aba1.edges];
}

function renderizarEstruturaRadial() {
    fecharPainel();
    buildSidebarRadialAba1();

    nodesDataSet.clear(); nodesDataSet.add(G_aba1.nodes);
    edgesDataSet.clear(); edgesDataSet.add(G_aba1.edges);

    const opcoesRadial = {
        edges: { width: 1.5, smooth: { enabled: true, type: "continuous", roundness: 0.3 } },
        physics: { 
            enabled: true, 
            solver: "barnesHut", 
            barnesHut: { gravitationalConstant: -9000, centralGravity: 0.03, springLength: 160, springConstant: 0.04 },
            stabilization: { enabled: true, iterations: 150, updateInterval: 25 }
        },
        interaction: { hover: true, tooltipDelay: 100 }
    };

    if (networkInstance) networkInstance.destroy();
    networkInstance = new vis.Network(document.getElementById("net"), {nodes: nodesDataSet, edges: edgesDataSet}, opcoesRadial);
    
    // Trava as bolinhas após a expansão inicial elástica para não ficarem dançando
    networkInstance.on("stabilizationIterationsDone", function () {
        networkInstance.setOptions({ physics: { enabled: false } });
    });

    networkInstance.on("click", p => p.nodes.length ? aoClicarNoNodeRadial(p.nodes[0]) : fecharPainel());
    aplicarFiltroAba1();
}

function aplicarFiltroAba1() {
    const exibirEspecificas = document.getElementById("filtro-especificas").checked;
    fecharPainel();
    const nosFiltrados = G_aba1.nodes.filter(n => exibirEspecificas || !n._isSpecific);
    
    networkInstance.setOptions({ physics: { enabled: true } });
    nodesDataSet.clear(); nodesDataSet.add(nosFiltrados);
    const idsAtivos = nosFiltrados.map(n => n.id);
    edgesDataSet.clear(); edgesDataSet.add(G_aba1.originalEdges.filter(e => idsAtivos.includes(e.from) && idsAtivos.includes(e.to)));
    
    networkInstance.stabilize();
}

function aoClicarNoNodeRadial(id) {
    const det = G_aba1.details[id]; if (!det) return;
    document.getElementById("p-cor").style.background = det.cor;
    
    if (det.tipo === "eixo") {
        document.getElementById("p-titulo").textContent = det.titulo;
        document.getElementById("p-sub").textContent = det.subtitulo;
        document.getElementById("painel-body").innerHTML = `<div class="p-4 border rounded-xl bg-slate-50 text-xs font-medium text-slate-700 leading-relaxed">${det.conteudo}</div>`;
    } else {
        document.getElementById("p-titulo").textContent = det.cat;
        document.getElementById("p-sub").textContent = `${det.volumeCausas} evidências sob este tema`;
        let html = '';
        det.causas.forEach(c => {
            const badges = c.eixos.map(ex => `<span class="inline-block px-2 py-0.5 text-[9px] font-bold text-white bg-slate-500 rounded mr-1" style="background:${EIXO_CORES[ex]}">${ex}</span>`).join("");
            html += `<div class="p-3 border rounded-xl bg-slate-50 mb-3 text-xs">
                <div class="mb-1.5">${badges}</div>
                <p class="text-slate-700 font-medium leading-relaxed">${c.texto}</p>
                ${c.votos > 0 ? `<span class="inline-block mt-2 text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded">⭐ ${c.votos} votos</span>` : ""}
            </div>`;
        });
        document.getElementById("painel-body").innerHTML = html;
    }
    document.getElementById("painel").classList.add("open");
    document.getElementById("net").style.right = "480px";
}

function buildSidebarRadialAba1() {
    const list = document.getElementById("sidebar-list"); list.innerHTML = "";
    const sortedCats = Object.keys(G_aba1.details).map(id => G_aba1.details[id]).filter(item => item.tipo === "categoria").sort((a,b)=>b.volumeCausas - a.volumeCausas);
    
    const renderGrupo = (titulo, classeCor, lista) => {
        if (!lista.length) return;
        const h = document.createElement("p"); h.className = `text-[10px] font-bold uppercase tracking-widest mt-4 mb-2 px-2 ${classeCor}`; h.textContent = titulo; list.appendChild(h);
        
        lista.forEach(item => {
            const b = document.createElement("button"); 
            b.className = "btn-sidebar-item";
            b.innerHTML = `
                <span class="w-2.5 h-2.5 rounded-full mt-1.5 flex-shrink-0" style="background:${item.cor}"></span>
                <span class="btn-sidebar-text">${item.cat}</span>
                <span class="text-[10px] font-bold text-slate-400 mt-0.5 flex-shrink-0">${item.volumeCausas}</span>
            `;
            b.onclick = () => aoClicarNoNodeRadial(`__cat__${item.cat}`);
            list.appendChild(b);
        });
    };
    renderGrupo("🔗 Temas Transversais", "text-indigo-600", sortedCats.filter(c=>c.ehTransversal));
    renderGrupo("📌 Dores Específicas", "text-slate-500", sortedCats.filter(c=>!c.ehTransversal));
}


// ==========================================
// --- MOTOR DA ABA 2 (MÉTRICAS ESTREITAS AUDITADAS E GRAFO ESTABILIZADO)
// ==========================================
function renderizarEstruturaHierarquica() {
    if (currentTab !== "hierarquica") return;
    fecharPainel();
    
    const eixosSelecionados = Array.from(document.querySelectorAll(".axis-checkbox:checked")).map(cb => cb.value);
    const destacarTransversais = document.getElementById("switch-transversal-hierarquica").checked;
    const filtroTemaEscolhido = document.getElementById("select-tema-transversal").value;
    const notaCorteVotos = parseInt(document.getElementById("select-votos-hierarquica").value) || 0;

    const hNodes = []; const hEdges = []; const nosCriadosUnicos = new Set();
    hNodesDetails = {}; 

    // Nó Macro
    const macroId = "H2_MACRO_ROOT";
    hNodes.push({
        id: macroId, label: "BAIXA\nALFABETIZAÇÃO", shape: "dot", size: 28,
        color: { background: "#E11D48", border: "#BE123C" }, font: { bold: true, size: 10, color: "#FFFFFF" }
    });

    // Mapeamento absoluto sem falsos-positivos por colunas estritas
    const mapaRecorrenciaTexto = {}; 
    const mapaTextoParaEixos = {}; 
    const mapaNodesParaTeia = {};

    rawRows.forEach(r => {
        const [eixo, , cp, , cs, , , ct, ] = r; if(!eixo) return;
        const sigla = eixo.split(" - ")[0];
        
        [cp, cs, ct].forEach(txt => {
            if (txt && txt.trim() !== "") {
                const cleanTxt = txt.trim();
                if (!mapaTextoParaEixos[cleanTxt]) {
                    mapaTextoParaEixos[cleanTxt] = new Set();
                    mapaRecorrenciaTexto[cleanTxt] = 0;
                }
                if (!mapaTextoParaEixos[cleanTxt].has(sigla)) {
                    mapaTextoParaEixos[cleanTxt].add(sigla);
                    mapaRecorrenciaTexto[cleanTxt]++;
                }
            }
        });
    });

    // CONTADOR MATEMÁTICO REAL POR EIXO E POR COLUNA ESPECÍFICA (Correção Eixo 5)
    const metricasEixos = {};
    eixosSelecionados.forEach(ex => { 
        metricasEixos[ex] = { totalP: 0, totalS: 0, totalT: 0, estrelas: 0, probCentral: "" }; 
    });

    // Conjuntos de proteção contra contagens duplicadas de strings idênticas no mesmo eixo
    const duplicadosPrimarias = {};
    const duplicadosSecundarias = {};
    const duplicadosTerciarias = {};

    rawRows.forEach(r => {
        const [eixoCompleto, probCentral, cp, , cs, , votos, ct, ] = r; if (!eixoCompleto) return;
        const sigla = eixoCompleto.split(" - ")[0]; if (!eixosSelecionados.includes(sigla)) return;
        
        metricasEixos[sigla].probCentral = probCentral;
        const vNum = parseInt(votos) || 0;
        
        if (!duplicadosPrimarias[sigla]) duplicadosPrimarias[sigla] = new Set();
        if (!duplicadosSecundarias[sigla]) duplicadosSecundarias[sigla] = new Set();
        if (!duplicadosTerciarias[sigla]) duplicadosTerciarias[sigla] = new Set();

        if (cp && cp.trim() !== "" && !duplicadosPrimarias[sigla].has(cp.trim())) { 
            metricasEixos[sigla].totalP++; 
            duplicadosPrimarias[sigla].add(cp.trim());
            if(vNum >= 1) metricasEixos[sigla].estrelas++; 
        }
        if (cs && cs.trim() !== "" && !duplicadosSecundarias[sigla].has(cs.trim())) { 
            metricasEixos[sigla].totalS++; 
            duplicadosSecundarias[sigla].add(cs.trim());
        }
        if (ct && ct.trim() !== "" && !duplicadosTerciarias[sigla].has(ct.trim())) { 
            metricasEixos[sigla].totalT++; 
            duplicadosTerciarias[sigla].add(ct.trim());
        }
    });

    const linhasFiltradas = rawRows.filter(r => r[0] && eixosSelecionados.includes(r[0].split(" - ")[0]));

    linhasFiltradas.forEach((r, idx) => {
        const [eixoCompleto, , cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        const siglaEixo = eixoCompleto.split(" - ")[0];
        const corEixo = EIXO_CORES[siglaEixo] || "#475569";
        const vNum = parseInt(votos) || 0;

        if (vNum < notaCorteVotos) return;

        const eixoId = `H2_${siglaEixo}`;
        if (!nosCriadosUnicos.has(eixoId)) {
            hNodes.push({ id: eixoId, label: siglaEixo, shape: "dot", size: 20, color: { background: corEixo, border: corEixo }, font: { bold: true, size: 11 } });
            hEdges.push({ from: macroId, to: eixoId, color: { color: "#CBD5E0", opacity: 0.5 }, width: 2 });
            nosCriadosUnicos.add(eixoId);
            hNodesDetails[eixoId] = { tipo: "eixo", titulo: eixoCompleto, sigla: siglaEixo, cor: corEixo, dados: metricasEixos[siglaEixo] };
        }

        const montarNo = (texto, categoria, paiId, camadaLabel, tamanho, corPadrao) => {
            if (!texto || texto.trim() === "") return null;
            const txt = texto.trim();
            const noId = `H2_N_${siglaEixo}_${camadaLabel}_${txt.slice(0,12)}_${idx}`;
            if (nosCriadosUnicos.has(noId)) return noId;

            const temaReal = categoria ? categoria.trim() : "Sem Categoria";
            const ehTransversal = mapaRecorrenciaTexto[txt] > 1;
            
            let cor = corPadrao; let tSize = tamanho; let bW = 0.5; let bColor = "#94A3B8";

            if (destacarTransversais && ehTransversal && (filtroTemaEscolhido === "__ALL__" || filtroTemaEscolhido === temaReal)) {
                cor = "#FEF3C7"; tSize = tamanho + 3; bW = 2; bColor = "#F59E0B";
                if (!mapaNodesParaTeia[temaReal]) mapaNodesParaTeia[temaReal] = [];
                mapaNodesParaTeia[temaReal].push(noId);
            }

            const labelCurto = txt.length > 15 ? txt.slice(0, 13) + "..." : txt;
            hNodes.push({
                id: noId, label: `[${camadaLabel}ª] ${vNum > 0 ? '⭐ ' : ''}${labelCurto}`,
                shape: "dot", size: tSize, borderWidth: bW, color: { background: cor, border: bColor }, font: { size: 9, color: "#475569" }
            });
            hEdges.push({ from: paiId, to: noId, color: { color: "#CBD5E0", opacity: 0.4 }, width: 1 });

            hNodesDetails[noId] = {
                tipo: "causa", 
                camada: camadaLabel === "1" ? "Primária" : camadaLabel === "2" ? "Secundária" : "Terciária",
                texto: txt, 
                tema: temaReal, 
                votos: vNum, 
                eixoOrigem: eixoCompleto,
                eixos: Array.from(mapaTextoParaEixos[txt] || [siglaEixo]), 
                ehTransversal: ehTransversal
            };
            nosCriadosUnicos.add(noId); return noId;
        };

        const idP = montarNo(cp, cat_p, eixoId, "1", 13, "#E2E8F0");
        const idS = idP ? montarNo(cs, cat_s, idP, "2", 10, "#F1F5F9") : null;
        if (idS) montarNo(ct, cat_t, idS, "3", 7, "#F8FAFC");
    });

    if (destacarTransversais) {
        Object.keys(mapaNodesParaTeia).forEach(tema => {
            if (filtroTemaEscolhido !== "__ALL__" && filtroTemaEscolhido !== tema) return;
            const nos = mapaNodesParaTeia[tema];
            for (let i = 0; i < nos.length; i++) {
                for (let j = i + 1; j < nos.length; j++) {
                    if (nos[i].split("_")[2] !== nos[j].split("_")[2]) {
                        hEdges.push({ from: nos[i], to: nos[j], color: { color: "#D97706", opacity: 0.4 }, width: 1.2, dashes: [2, 4] });
                    }
                }
            }
        });
    }

    document.getElementById("sidebar-list").innerHTML = `<div class="p-4 bg-indigo-50/60 border rounded-xl text-[11px] text-slate-600 leading-relaxed"><p class="font-bold text-indigo-900 mb-1">✨ Constelação Ativa</p>Clique nos eixos ou causas para inspecionar métricas estáveis em tempo real.</div>`;

    nodesDataSet.clear(); nodesDataSet.add(hNodes);
    edgesDataSet.clear(); edgesDataSet.add(hEdges);

    const opcoesHierarquica = {
        physics: { 
            enabled: true, 
            solver: "forceAtlas2Based", 
            forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.015, springLength: 45, avoidOverlap: 1 },
            stabilization: { enabled: true, iterations: 180 }
        }
    };

    if (networkInstance) networkInstance.destroy();
    networkInstance = new vis.Network(document.getElementById("net"), {nodes: nodesDataSet, edges: edgesDataSet}, opcoesHierarquica);
    
    // FORÇA O CONGELAMENTO IMEDIATO APÓS ORGANIZAÇÃO (Evita bolinhas fugindo do mouse)
    networkInstance.on("stabilizationIterationsDone", function () {
        networkInstance.setOptions({ physics: { enabled: false } });
    });

    networkInstance.off("click"); 
    networkInstance.on("click", p => {
        if(!p.nodes.length) { fecharPainel(); return; }
        const id = p.nodes[0];
        
        if(id === "H2_MACRO_ROOT") {
            document.getElementById("p-cor").style.background = "#E11D48";
            document.getElementById("p-titulo").textContent = "Baixa Alfabetização";
            document.getElementById("p-sub").textContent = "Problema Macro Central";
            document.getElementById("painel-body").innerHTML = `<p class="text-xs text-slate-600 font-medium leading-relaxed">Nó Central Diagnóstico.</p>`;
            document.getElementById("painel").classList.add("open"); document.getElementById("net").style.right = "480px";
            return;
        }

        const det = hNodesDetails[id]; if (!det) return;
        document.getElementById("p-cor").style.background = det.cor || "#64748B";

        if(det.tipo === "eixo") {
            document.getElementById("p-titulo").textContent = det.titulo;
            document.getElementById("p-sub").textContent = "Métricas Consolidadas do Eixo";
            document.getElementById("painel-body").innerHTML = `
                <div class="mb-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Problema do Eixo:</span>
                    <div class="p-3 bg-slate-50 border rounded-xl text-xs font-semibold text-slate-700 leading-relaxed">${det.dados.probCentral}</div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="p-3 bg-white border rounded-xl shadow-sm"><span class="text-slate-400 block text-[10px]">Causas Primárias</span><span class="text-base font-bold text-slate-700">${det.dados.totalP}</span></div>
                    <div class="p-3 bg-white border rounded-xl shadow-sm"><span class="text-slate-400 block text-[10px]">Causas Secundárias</span><span class="text-base font-bold text-slate-700">${det.dados.totalS}</span></div>
                    <div class="p-3 bg-white border rounded-xl shadow-sm"><span class="text-slate-400 block text-[10px]">Causas Terciárias</span><span class="text-base font-bold text-slate-700">${det.dados.totalT}</span></div>
                    <div class="p-3 bg-amber-50 border border-amber-100 rounded-xl"><span class="text-amber-700 font-bold block text-[10px]">Com Estrelas</span><span class="text-base font-bold text-amber-800">${det.dados.estrelas}</span></div>
                </div>`;
        } else {
            document.getElementById("p-titulo").textContent = `Causa ${det.camada}`;
            document.getElementById("p-sub").textContent = "Evidência Qualitativa Mapeada";
            let cCat = CAT_CORES_MAP[Object.keys(CAT_CORES_MAP).find(k=>det.tema.toLowerCase().includes(k.toLowerCase()))] || "#64748B";
            const badges = det.eixos.map(ex => `<span class="inline-block px-2 py-0.5 text-[9px] font-bold text-white rounded mr-1" style="background:${EIXO_CORES[ex]}">${ex}</span>`).join("");
            
            document.getElementById("painel-body").innerHTML = `
                <div class="mb-3">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Eixo de Origem:</span>
                    <p class="text-xs font-bold text-slate-800">${det.eixoOrigem}</p>
                </div>
                <div class="p-4 bg-slate-50 border rounded-xl text-xs font-medium text-slate-700 leading-relaxed mb-4">${det.texto}</div>
                <div class="flex items-center gap-2 p-2 border rounded-xl bg-white text-xs mb-3 font-semibold text-slate-700">
                    <span class="w-2.5 h-2.5 rounded-full" style="background:${cCat}"></span><span>Tema: ${det.tema}</span>
                    ${det.ehTransversal ? `<span class="ml-auto text-[9px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold uppercase">Transversal</span>` : `<span class="ml-auto text-[9px] bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded font-bold uppercase">Específica</span>`}
                </div>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Cruzamento de Eixos Compartilhados</div>
                <div class="mb-4">${badges}</div>
                ${det.votos > 0 ? `<div class="p-2 bg-amber-50 border border-amber-100 rounded-xl text-xs font-bold text-amber-800 text-center">⭐ Priorizada com ${det.votos} Votos</div>`:''}`;
        }
        document.getElementById("painel").classList.add("open"); document.getElementById("net").style.right = "480px";
    });
}

// --- CONTROLE DE ALTERNÂNCIA DE ABAS ---
function mudarAba(aba) {
    currentTab = aba; fecharPainel();
    const btn1 = document.getElementById("btn-aba1"); const btn2 = document.getElementById("btn-aba2");
    const ctrl1 = document.getElementById("controles-aba1"); const ctrl2 = document.getElementById("controles-aba2");
    
    if (aba === "radial") {
        btn1.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-800 shadow-sm";
        btn2.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800";
        ctrl1.classList.remove("hidden"); ctrl2.classList.add("hidden");
        document.getElementById("main-title").textContent = "Árvore Diagnóstica de Problemas";
        document.getElementById("main-subtitle").textContent = "Volumetria proporcional e conexões transversais unificadas";
        renderizarEstruturaRadial();
    } else {
        btn2.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-800 shadow-sm";
        btn1.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800";
        ctrl2.classList.remove("hidden"); ctrl2.classList.add("flex"); ctrl1.classList.add("hidden");
        document.getElementById("main-title").textContent = "Constelação Detalhada de Evidências";
        document.getElementById("main-subtitle").textContent = "Desdobramento radial completo (Eixo → Causa 1ª → 2ª → 3ª)";
        renderizarEstruturaHierarquica();
    }
}

function fecharPainel() {
    document.getElementById("painel").classList.remove("open"); document.getElementById("net").style.right = "0";
}

window.onload = inicializar;
</script>
