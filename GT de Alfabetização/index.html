<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: "Inter", sans-serif; background: #F7F8FA; }
    #net { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #F7F8FA; transition: left 0.3s ease; }
    
    /* Sidebar */
    #sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; background: white; 
               border-right: 1px solid #E2E8F0; z-index: 30; display: flex; flex-direction: column; transition: 0.3s; }
    #sidebar.hide { transform: translateX(-100%); }
    #sidebar-list { flex: 1; overflow-y: auto; padding: 12px; }

    /* Painel Detalhe */
    #painel { position: fixed; top: 0; right: 0; width: 360px; height: 100vh; background: white; 
              border-left: 1px solid #E2E8F0; z-index: 50; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
              box-shadow: -10px 0 15px -3px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    #painel.open { transform: translateX(0); }
    #painel-body { flex: 1; overflow-y: auto; padding: 24px; }

    /* UI Components */
    .mbtn { padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 600; transition: 0.2s; white-space: nowrap; }
    .mbtn.on { background: #4F46E5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    .mbtn.off { background: #F1F5F9; color: #64748B; border: 1px solid #E2E8F0; }
    .mbtn.off:hover { background: #E2E8F0; }

    #toggles { position: fixed; top: 90px; right: 20px; z-index: 30; background: white; border-radius: 12px; padding: 12px; 
               border: 1px solid #E2E8F0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }

    .vis-tooltip { background: #111827 !important; color: white !important; border: none !important; 
                   border-radius: 8px !important; padding: 10px !important; font-size: 12px !important; max-width: 250px !important; }
</style>
</head>
<body>

<!-- Sidebar de Filtros -->
<div id="sidebar">
    <div class="p-6 border-b">
        <p class="text-[10px] font-bold uppercase tracking-[0.15em] text-indigo-600">Temas Transversais</p>
        <p class="text-[11px] text-gray-400 mt-1">Selecione para destacar</p>
    </div>
    <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<!-- Cabeçalho -->
<div class="fixed top-0 left-0 right-0 z-20 pointer-events-none">
    <div class="flex justify-center py-8">
        <div class="text-center bg-white/90 backdrop-blur-md px-8 py-3 rounded-2xl border border-gray-100 shadow-xl pointer-events-auto">
            <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Árvore de Problemas</h1>
            <p class="text-[11px] text-indigo-500 font-bold uppercase tracking-widest mt-1">GT de Alfabetização · SME-SP</p>
        </div>
    </div>
</div>

<!-- Menu de Modos -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40 flex gap-3 bg-white/90 backdrop-blur-md p-2 rounded-2xl border border-gray-200 shadow-2xl">
    <button class="mbtn on" data-m="temas">🔗 Conexões por temas</button>
    <button class="mbtn off" data-m="completo">🌳 Completo</button>
    <button class="mbtn off" data-m="minuto">⚡ 1 minuto</button>
</div>

<!-- Filtros de exibição (Modo Completo) -->
<div id="toggles">
    <p class="text-[9px] font-bold text-gray-400 uppercase mb-3">Visualização</p>
    <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer mb-2">
        <input type="checkbox" id="t-trans" checked> Conexões transversais
    </label>
    <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer">
        <input type="checkbox" id="t-sem" checked> Causas sem tema
    </label>
</div>

<!-- Painel de Detalhes -->
<div id="painel">
    <div class="p-6 border-b flex justify-between items-start bg-gray-50/50">
        <div class="flex-1 pr-4">
            <div id="p-cor" class="w-10 h-1.5 rounded-full mb-4"></div>
            <h2 id="p-titulo" class="text-base font-bold text-gray-900 leading-tight"></h2>
            <p id="p-sub" class="text-[11px] text-gray-500 mt-3 font-semibold uppercase tracking-wider"></p>
        </div>
        <button onclick="fecharPainel()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-400 transition-colors text-2xl">×</button>
    </div>
    <div id="painel-body"></div>
</div>

<script>
// URL do seu CSV Raw
const CSV_URL = 'https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv';

const COLORS = {
    macro: '#E53E3E',
    eixos: {
        'Eixo 1': '#2B6CB0', 'Eixo 2': '#6B46C1', 'Eixo 3': '#276749',
        'Eixo 4': '#9C4221', 'Eixo 5': '#1A5276', 'Eixo 6': '#9B2335', 'Eixo 7': '#234E52'
    },
    levels: ['#E53E3E', '#2B6CB0', '#D69E2E', '#38A169', '#3182CE', '#805AD5']
};

let network, vNodes, vEdges, fullData = null;
let currentModo = 'temas', selectedCat = null;

// Inicialização
window.addEventListener("load", async () => {
    await loadData();
    initMenu();
});

function initMenu() {
    document.querySelectorAll(".mbtn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".mbtn").forEach(b => { b.classList.replace('on','off'); });
            btn.classList.replace('off','on');
            setModo(btn.dataset.m);
        };
    });
    document.getElementById('t-trans').onchange = updateFilters;
    document.getElementById('t-sem').onchange = updateFilters;
}

async function loadData() {
    try {
        const response = await fetch(CSV_URL);
        const buffer = await response.arrayBuffer();
        const text = new TextDecoder('utf-8').decode(buffer);
        const rows = parseCSV(text);
        fullData = processData(rows);
        buildSidebar(fullData.categories);
        setModo('temas');
    } catch (e) {
        console.error("Erro:", e);
        alert("Erro ao carregar o CSV. Verifique se o arquivo está público no GitHub.");
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    return lines.slice(1).map(line => {
        let fields = [], cur = "", inQ = false;
        for (let c of line) {
            if (c === '"') inQ = !inQ;
            else if (c === ';' && !inQ) { fields.push(cur.trim()); cur = ""; }
            else cur += c;
        }
        fields.push(cur.trim());
        return fields;
    });
}

function processData(rows) {
    const nodes = new Map();
    const edges = [];
    const categories = new Set();

    // Raiz
    nodes.set('macro', { id: 'macro', label: 'BAIXA APRENDIZAGEM\nNA ALFABETIZAÇÃO', group: 'macro', level: 0, color: COLORS.macro, value: 50, font: {size: 16, color: '#fff', bold: true} });

    rows.forEach(row => {
        const [eixo, prob, c1, c2, c3, votos, cat] = row;
        if (!eixo) return;

        // Eixo
        if (!nodes.has(eixo)) {
            nodes.set(eixo, { id: eixo, label: eixo, group: 'eixo', level: 1, color: COLORS.eixos[eixo] || '#555', value: 30, font: {color: '#fff'} });
            edges.push({ from: 'macro', to: eixo });
        }

        // Problema
        if (prob && !nodes.has(prob)) {
            nodes.set(prob, { id: prob, label: splitLabel(prob), title: prob, group: 'prob', level: 2, color: COLORS.levels[2], value: 25 });
            edges.push({ from: eixo, to: prob });
        }

        // Causas
        let prev = prob;
        [c1, c2, c3].forEach((txt, i) => {
            if (txt) {
                const id = txt; // Usando o texto como ID para evitar duplicatas iguais em eixos diferentes
                if (!nodes.has(id)) {
                    nodes.set(id, { 
                        id: id, label: splitLabel(txt), title: txt, level: i + 3, 
                        cat: cat, votos: parseInt(votos) || 0,
                        color: COLORS.levels[i + 3], value: 20
                    });
                    edges.push({ from: prev, to: id });
                }
                prev = id;
            }
        });

        if (cat) categories.add(cat);
    });

    return { nodes: Array.from(nodes.values()), edges, categories: Array.from(categories) };
}

function setModo(m) {
    currentModo = m;
    fecharPainel();
    document.getElementById('sidebar').classList.toggle('hide', m !== 'temas');
    document.getElementById('net').style.left = m === 'temas' ? '240px' : '0';
    document.getElementById('toggles').style.display = m === 'completo' ? 'block' : 'none';

    let n = fullData.nodes;
    let e = fullData.edges;

    if (m === 'minuto') {
        n = fullData.nodes.filter(node => node.level <= 3);
        const ids = new Set(n.map(node => node.id));
        e = fullData.edges.filter(edge => ids.has(edge.from) && ids.has(edge.to));
    }

    render(n, e);
}

function render(nodes, edges) {
    const container = document.getElementById("net");
    vNodes = new vis.DataSet(nodes);
    vEdges = new vis.DataSet(edges);

    const options = {
        nodes: { 
            shape: 'dot', 
            font: { face: 'Inter', size: 12, multi: true },
            borderWidth: 2,
            shadow: { enabled: true, color: 'rgba(0,0,0,0.1)', size: 5 }
        },
        edges: { 
            smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 },
            color: { color: '#D1D5DB', highlight: '#4F46E5' },
            width: 1.5
        },
        physics: {
            forceAtlas2Based: { gravitationalConstant: -100, centralGravity: 0.01, springLength: 120, springConstant: 0.08 },
            solver: 'forceAtlas2Based',
            stabilization: { iterations: 200 }
        },
        interaction: { hover: true, tooltipDelay: 200 }
    };

    network = new vis.Network(container, { nodes: vNodes, edges: vEdges }, options);
    
    network.on("click", params => {
        if (params.nodes.length) {
            const node = vNodes.get(params.nodes[0]);
            abrirPainel(node);
        } else {
            fecharPainel();
        }
    });
}

function buildSidebar(cats) {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    
    // Botão Limpar
    const btnAll = document.createElement('button');
    btnAll.className = "w-full text-left p-3 mb-2 rounded-xl text-xs font-bold text-gray-400 hover:bg-gray-100 uppercase tracking-widest";
    btnAll.innerHTML = "Mostrar tudo";
    btnAll.onclick = () => destacarCategoria(null);
    list.appendChild(btnAll);

    cats.sort().forEach(cat => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-3 mb-1 rounded-xl text-[11px] font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all border border-transparent";
        btn.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-indigo-200 mr-2"></span>${cat}`;
        btn.onclick = () => destacarCategoria(cat);
        list.appendChild(btn);
    });
}

function destacarCategoria(cat) {
    selectedCat = cat;
    const allNodes = vNodes.get();
    const updates = allNodes.map(n => {
        let opacity = 1;
        if (cat && n.level >= 2 && n.cat !== cat) opacity = 0.1;
        return { id: n.id, color: { opacity: opacity }, font: { color: opacity < 1 ? 'rgba(0,0,0,0.1)' : '#374151' } };
    });
    vNodes.update(updates);
}

function abrirPainel(node) {
    if (node.level === 0) return;
    document.getElementById('p-titulo').innerText = node.title || node.id;
    document.getElementById('p-sub').innerText = node.cat ? `Tema: ${node.cat}` : 'Causa Direta';
    document.getElementById('p-cor').style.background = node.color.background || node.color;
    
    let html = `<div class="space-y-6">`;
    if(node.votos > 0) {
        html += `<div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl flex items-center gap-3">
                    <span class="text-2xl">⭐</span>
                    <div>
                        <p class="text-amber-800 font-bold text-sm">${node.votos} votos</p>
                        <p class="text-amber-600 text-[10px] uppercase font-bold tracking-wider">Prioridade no grupo</p>
                    </div>
                 </div>`;
    }
    
    html += `<div class="prose prose-sm">
                <p class="text-gray-700 leading-relaxed text-sm">${node.title || node.id}</p>
             </div></div>`;
    
    document.getElementById('painel-body').innerHTML = html;
    document.getElementById('painel').classList.add('open');
}

function fecharPainel() { document.getElementById('painel').classList.remove('open'); }

function splitLabel(str) {
    if (str.length < 25) return str;
    const words = str.split(' ');
    let mid = Math.floor(words.length / 2);
    return words.slice(0, mid).join(' ') + '\n' + words.slice(mid).join(' ');
}

function updateFilters() {
    // Lógica para esconder/mostrar baseada nos checkboxes
    const showTrans = document.getElementById('t-trans').checked;
    const showSem = document.getElementById('t-sem').checked;
    // ... implementação opcional conforme necessidade
}

</script>
</body>
</html>
