<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F7F8FA;}
  #mynetwork{width:100%;height:100vh;background:#F7F8FA;}
  .vis-tooltip{background:rgba(17,24,39,.92)!important;color:#F9FAFB!important;border:none!important;border-radius:8px!important;font-size:11px!important;padding:7px 11px!important;max-width:260px!important;line-height:1.5!important;box-shadow:0 4px 16px rgba(0,0,0,.2)!important;}
  #panel{transition:width .2s,height .2s;}
  #panel.min{width:44px!important;height:44px!important;overflow:hidden;border-radius:12px;}
  #panel.min #pb{display:none;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px;}
  @media(max-width:640px){#legend,#panel{display:none!important;}}
</style>
</head>
<body>

<div id="loading" class="absolute inset-0 z-50 flex flex-col items-center justify-center" style="background:rgba(247,248,250,.95);backdrop-filter:blur(8px);">
  <div class="relative w-14 h-14 mb-5">
    <div class="absolute inset-0 rounded-full border-4 border-indigo-100"></div>
    <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
  </div>
  <p class="text-base font-semibold text-gray-700">Montando a árvore de problemas</p>
</div>

<div class="absolute top-0 left-0 right-0 z-10 pointer-events-none">
  <div class="flex items-center justify-center px-6 pt-5 pb-10" style="background:linear-gradient(to bottom,rgba(247,248,250,1) 0%,rgba(247,248,250,0) 100%);">
    <div class="text-center">
      <h1 class="text-lg font-bold text-gray-800 tracking-tight">Árvore de Problemas</h1>
      <p class="text-xs text-gray-400 mt-0.5">GT de Alfabetização · SME-SP · 2026</p>
    </div>
  </div>
</div>

<div id="mynetwork"></div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4" style="background:rgba(17,24,39,.5);backdrop-filter:blur(4px);">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg transform transition-all duration-200 scale-95 opacity-0 overflow-hidden">
    <div class="px-6 pt-6 pb-4 border-b border-gray-100">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-3 flex-wrap">
            <span id="m-nivel" class="text-[10px] font-semibold uppercase tracking-widest text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md"></span>
            <span id="m-eixo" class="text-[10px] font-semibold text-white px-2.5 py-0.5 rounded-full" style="background:#1E3A5F"></span>
          </div>
          <p class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-1.5">O que o grupo disse</p>
          <h3 id="m-causa" class="text-sm font-semibold text-gray-800 leading-relaxed"></h3>
        </div>
        <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-lg flex-shrink-0 mt-1">×</button>
      </div>
    </div>
    <div id="m-cat-wrap" class="px-6 py-4 border-b border-gray-100">
      <p class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-2">Conexão temática</p>
      <div id="m-cat" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs font-medium"></div>
    </div>
    <div class="px-6 py-4 bg-gray-50 flex justify-end">
      <button onclick="closeModal()" class="px-5 py-2 bg-gray-900 hover:bg-gray-700 text-white text-xs font-semibold rounded-xl transition-colors">Fechar</button>
    </div>
  </div>
</div>

<!-- Legenda -->
<div id="legend" class="absolute bottom-5 left-5 bg-white/95 rounded-2xl shadow-lg border border-gray-100 p-4 z-10">
  <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-3">Hierarquia</p>
  <div class="space-y-2">
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#E53E3E"></span><span class="text-xs text-gray-600">Problema macro</span></div>
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#DD6B20"></span><span class="text-xs text-gray-600">Eixo</span></div>
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#D69E2E"></span><span class="text-xs text-gray-600">Problema central</span></div>
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#38A169"></span><span class="text-xs text-gray-600">Causa primária</span></div>
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#3182CE"></span><span class="text-xs text-gray-600">Causa secundária</span></div>
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#805AD5"></span><span class="text-xs text-gray-600">Causa terciária</span></div>
  </div>
</div>

<!-- Painel de Filtros -->
<div id="panel" class="absolute bottom-5 right-5 bg-white/95 rounded-2xl shadow-lg border border-gray-100 z-10 w-72">
  <div class="flex items-center justify-between px-4 pt-4 pb-3 border-b border-gray-100">
    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Filtros</p>
    <button id="toggle-panel" class="w-7 h-7 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center">
      <svg id="ic-down" class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      <svg id="ic-up" class="w-3.5 h-3.5 text-gray-500 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
    </button>
  </div>
  <div id="pb" class="p-4 space-y-4">
    <input id="search" type="text" placeholder="Pesquisar..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-xs">
    
    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Visualização</p>
      <div class="grid grid-cols-3 gap-1.5">
        <button data-view="completa" class="view-btn py-2 text-[10px] rounded-xl font-semibold bg-indigo-600 text-white">Completa</button>
        <button data-view="transversais" class="view-btn py-2 text-[10px] rounded-xl font-semibold bg-gray-100 text-gray-500">Só transversais</button>
        <button data-view="minuto" class="view-btn py-2 text-[10px] rounded-xl font-semibold bg-gray-100 text-gray-500">1 minuto</button>
      </div>
    </div>

    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Priorização</p>
      <div class="grid grid-cols-4 gap-1.5">
        <button data-min="0" class="prio py-1.5 text-[11px] rounded-lg font-semibold bg-indigo-600 text-white">Todas</button>
        <button data-min="1" class="prio py-1.5 text-[11px] rounded-lg font-semibold bg-gray-100 text-gray-500">1+⭐</button>
        <button data-min="4" class="prio py-1.5 text-[11px] rounded-lg font-semibold bg-gray-100 text-gray-500">4+⭐</button>
        <button data-min="5" class="prio py-1.5 text-[11px] rounded-lg font-semibold bg-gray-100 text-gray-500">5+⭐</button>
      </div>
    </div>

    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Eixos</p>
      <ul id="eixo-list" class="space-y-1 max-h-24 overflow-y-auto"></ul>
      <div class="flex gap-2 mt-2">
        <button id="sel-all" class="flex-1 py-1 text-[10px] bg-indigo-50 text-indigo-600 rounded">Todos</button>
        <button id="desel-all" class="flex-1 py-1 text-[10px] bg-gray-100 text-gray-500 rounded">Nenhum</button>
      </div>
    </div>

    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Tema transversal</p>
      <ul id="cat-list" class="space-y-0.5 max-h-32 overflow-y-auto"></ul>
    </div>
  </div>
</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/%C3%81rvore%20de%20Problemas%20-%20Alfabetiza%C3%A7%C3%A3o%20(3).csv";
const MACRO = "Baixa aprendizagem na alfabetização";
const EIXO_NOMES = {"Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura", "Eixo 4": "Incentivos", "Eixo 5": "Acomp. e Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Currículo e Materiais"};
const CAT_CORES = {"Alta rotatividade de professores": "#FC8181", "Alto número de estudantes por turma": "#F6AD55", "Ausência de critérios para retenção de professores alfabetizadores": "#FEB2B2", "Baixo uso dos dados das avaliações para planejamento e acompanhamento pedagógico": "#76E4F7", "Desafios na integração do cronograma formativo por ciclos e na conexão das temáticas com a realidade cotidiana e as necessidades dos territórios": "#B794F4", "Excesso e sobreposição de avaliações  no calendário escolar": "#FAF089", "Fragilidade na articulação curricular, planejamento integrado e continuidade pedagógica entre as etapas de ensino (Ed. Infantil e Ciclo de Alfabetização)": "#68D391", "Fragilidade na comunicação e planejamento integrado entre SME, DREs e UEs": "#63B3ED", "Fragilidade na formação continuada de professores e trio gestor acerca da alfabetização": "#D6BCFA", "Fragilidade na formação para uso e análise de dados de avaliação": "#76E4F7", "Fragilidade na integração entre currículo, materiais didáticos, práticas pedagógicas e avaliações": "#4FD1C5", "Fragilidade no atendimento dos estudantes em suas individualidades (AEE e vulnerabilidades)": "#F6AD55", "Fragilidade no planejamento do acompanhamento pedagógico dos estudantes e das práticas docentes": "#9AE6B4", "Fragilidades na consolidação de identidades e sobrecarga de demandas do Trio Gestor (Diretores, ADs e CPs) e POA, impactando o planejamento integrado": "#FBD38D", "Fragmentação da concepção e prática de alfabetização, com entendimentos distintos entre intâncias e atores da rede sobre instrumentos normativos": "#FFA07A", "Participação desigual de professores nas formações (JEIF e Contratados)": "#F687B3"};
const GC = {"macro": {"background": "#E53E3E", "border": "#C53030"}, "eixo": {"background": "#DD6B20", "border": "#C05621"}, "problema": {"background": "#D69E2E", "border": "#B7791F"}, "causa1": {"background": "#38A169", "border": "#276749"}, "causa2": {"background": "#3182CE", "border": "#2C5282"}, "causa3": {"background": "#805AD5", "border": "#553C9A"}};
const FADED_N = {background:"#F1F2F4", border:"#D1D5DB"};
const FADED_E = "#F1F2F4";
const NL = {macro:"Problema macro", eixo:"Eixo temático", problema:"Problema central", causa1:"Causa primária", causa2:"Causa secundária", causa3:"Causa terciária", hub:"Conexão transversal"};

let G = null, visData = null, network = null, parentMap = new Map();
let selEixos = new Set(), selCat = "__ALL__", minV = 0, viewMode = "completa";

// --- PARSER ---
function parseCsv(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for(let i = 1; i < lines.length; i++) {
    const line = lines[i].trim(); if(!line) continue;
    const cols = []; let col = "", inQ = false;
    for(let c = 0; c < line.length; c++) {
      if(line[c]==='"') inQ=!inQ;
      else if(line[c]===';'&&!inQ) { cols.push(col.trim()); col=""; }
      else col+=line[c];
    }
    cols.push(col.trim());
    while(cols.length < 9) cols.push("");
    rows.push(cols);
  }
  return rows;
}

// --- PROCESSAMENTO ---
function processData(rows) {
  const nodesMap = new Map(), edges = [], eixosSet = new Set();
  parentMap.clear();

  const addN = (id, group, level, eixo, cat, votos) => {
    if(!id) return; id = id.trim();
    if(!nodesMap.has(id)) {
      const ek = group==="eixo" ? id.slice(0,6) : (eixo||"").slice(0,6);
      nodesMap.set(id, { id, label:id.length>60?id.slice(0,60)+"…":id, title:id, causa_real:id, group, level, eixo:ek, eixo_nome:EIXO_NOMES[ek]||"", cat:cat||"", votos:votos||0 });
    } else if(votos > nodesMap.get(id).votos) nodesMap.get(id).votos = votos;
  };

  const addE = (from, to) => { if(!from || !to) return; edges.push({from, to, arrows:{to:{enabled:false}}}); parentMap.set(to, from); };

  addN(MACRO, "macro", 0, "", "", 0);

  rows.forEach(c => {
    const eixo=c[0], prob=c[1], cp=c[2], cat1=c[3], cs=c[4], cat2=c[5], votos=parseInt(c[6])||0, ct=c[7], cat3=c[8];
    if(!eixo) return; const ek = eixo.slice(0,6); eixosSet.add(ek);
    addN(ek, "eixo", 1, ek, "", 0); addE(MACRO, ek);
    if(prob){ addN(prob, "problema", 2, ek, cat1, 0); addE(ek, prob); }
    if(cp){ addN(cp, "causa1", 3, ek, cat1, 0); addE(prob, cp); }
    if(cs){ addN(cs, "causa2", 4, ek, cat2, votos); addE(cp, cs); }
    if(ct){ addN(ct, "causa3", 5, ek, cat3, 0); addE(cs, ct); }
  });

  const hubNodes = [], hubEdges = [], hubIds = new Set();
  const catMap = new Map();
  nodesMap.forEach(n => { if(n.cat) { if(!catMap.has(n.cat)) catMap.set(n.cat, []); catMap.get(n.cat).push(n.id); } });
  
  catMap.forEach((nids, cat) => {
    const hid = "__hub__"+cat; hubIds.add(hid); const cor = CAT_CORES[cat]||"#A78BFA";
    hubNodes.push({ id:hid, label:cat, group:"hub", level:99, cat, color:{background:cor+"30",border:cor}, shape:"diamond" });
    nids.forEach(nid => hubEdges.push({ from:nid, to:hid, cat, color:cor, transversal:true, dashes:[5,4] }));
  });

  return { nodes:[...nodesMap.values(), ...hubNodes], edges:[...edges, ...hubEdges], hubs:hubIds, eixos:[...eixosSet].sort(), cats:Object.keys(CAT_CORES) };
}

// --- FILTROS ---
function climb(id, set) { let cur = id; while(cur) { if(set.has(cur)) break; set.add(cur); cur = parentMap.get(cur); } }

function applyFilter() {
  if(!G || !visData) return;
  const search = document.getElementById("search").value.toLowerCase();
  const allN = visData.nodes.get(), allE = visData.edges.get();
  const ok = new Set(); ok.add(MACRO);

  allN.forEach(n => {
    if(G.hubs.has(n.id)) return;
    // Um nó é "base" para o filtro se ele for um Eixo selecionado OU uma Causa que bate com tudo
    const matchEixo = (n.group === "eixo" && selEixos.has(n.id)) || (n.eixo && selEixos.has(n.eixo));
    const matchPrio = (n.votos || 0) >= minV;
    const matchSearch = !search || n.causa_real.toLowerCase().includes(search);
    const matchCat = (selCat === "__ALL__") || (n.cat === selCat);

    if(matchEixo && matchPrio && matchSearch && matchCat) climb(n.id, ok);
  });

  visData.nodes.update(allN.map(n => {
    if(G.hubs.has(n.id)) { const s = (selCat === "__ALL__" || n.cat === selCat); return {id:n.id, hidden:!s, opacity:s?1:0}; }
    const isOk = ok.has(n.id);
    return { id:n.id, color:isOk?(GC[n.group]||null):FADED_N, opacity:isOk?1:0.1, hidden: (viewMode==="transversais" && n.level>=3 && !isOk) };
  }));

  visData.edges.update(allE.map(e => {
    if(e.transversal) { const s = (selCat === "__ALL__" || e.cat === selCat) && ok.has(e.from); return {id:e.id, hidden:!s, opacity:s?1:0}; }
    const isOk = ok.has(e.from) && ok.has(e.to);
    return { id:e.id, color:{color:isOk?"#D1D5DB":FADED_E}, opacity:isOk?1:0.05, hidden: (viewMode==="transversais") };
  }));
}

// --- SETUP ---
document.addEventListener("DOMContentLoaded", () => {
  fetch(CSV_URL).then(r => r.arrayBuffer()).then(buf => {
    const text = new TextDecoder("utf-8").decode(buf);
    G = processData(parseCsv(text));
    selEixos = new Set(G.eixos);
    initGraph();
  });
});

function initGraph() {
  visData = { nodes: new vis.DataSet(G.nodes), edges: new vis.DataSet(G.edges) };
  network = new vis.Network(document.getElementById("mynetwork"), visData, {
    nodes: { shape:"dot", font:{size:11, face:"Inter", strokeWidth:3, strokeColor:"#F7F8FA"} },
    edges: { width:0.8, color:{color:"#D1D5DB"}, smooth:{enabled:true, type:"continuous"} },
    physics: { barnesHut:{gravitationalConstant:-30000, springLength:160} }
  });
  network.once("stabilizationIterationsDone", () => {
    document.getElementById("loading").style.display="none";
    network.setOptions({physics:false});
    buildUI(); applyFilter();
  });
  network.on("click", p => { if(p.nodes.length) openModal(p.nodes[0]); });
}

function buildUI() {
  const eixoUl = document.getElementById("eixo-list");
  G.eixos.forEach(e => {
    const li = document.createElement("li");
    li.className = "px-2 py-1 text-[11px] cursor-pointer rounded bg-indigo-50 text-indigo-600 mb-1 font-medium";
    li.textContent = EIXO_NOMES[e]||e;
    li.onclick = () => { 
      selEixos.has(e)?selEixos.delete(e):selEixos.add(e); 
      li.classList.toggle("bg-indigo-50"); li.classList.toggle("text-indigo-600");
      li.classList.toggle("bg-gray-50"); li.classList.toggle("text-gray-400");
      applyFilter(); 
    };
    eixoUl.appendChild(li);
  });

  const catUl = document.getElementById("cat-list");
  const addC = (id, label, cor) => {
    const li = document.createElement("li");
    li.className = "px-2 py-1 text-[10px] cursor-pointer rounded hover:bg-gray-100 truncate";
    li.innerHTML = cor ? `<span class="inline-block w-2 h-2 rounded-full mr-1.5" style="background:${cor}"></span>${label}` : label;
    li.onclick = () => { selCat = id; applyFilter(); };
    catUl.appendChild(li);
  };
  addC("__ALL__", "Todas as conexões");
  G.cats.forEach(c => addC(c, c, CAT_CORES[c]));

  document.getElementById("search").oninput = applyFilter;
  document.getElementById("sel-all").onclick = () => { selEixos = new Set(G.eixos); location.reload(); };
  document.getElementById("desel-all").onclick = () => { selEixos.clear(); applyFilter(); };
  document.querySelectorAll(".prio").forEach(b => b.onclick = function(){
    document.querySelectorAll(".prio").forEach(x=>x.classList.replace("bg-indigo-600","bg-gray-100"));
    this.classList.replace("bg-gray-100","bg-indigo-600");
    minV = parseInt(this.dataset.min); applyFilter();
  });
  document.querySelectorAll(".view-btn").forEach(b => b.onclick = function(){
    document.querySelectorAll(".view-btn").forEach(x=>x.classList.replace("bg-indigo-600","bg-gray-100"));
    this.classList.replace("bg-gray-100","bg-indigo-600");
    viewMode = this.dataset.view; applyFilter();
  });
  document.getElementById("toggle-panel").onclick = () => document.getElementById("panel").classList.toggle("min");
}

function openModal(id) {
  const n = visData.nodes.get(id); if(!n || G.hubs.has(id)) return;
  document.getElementById("m-nivel").textContent = NL[n.group];
  document.getElementById("m-eixo").textContent = n.eixo_nome;
  document.getElementById("m-causa").textContent = n.causa_real;
  const catWrap = document.getElementById("m-cat-wrap");
  if(n.cat) { 
    const cor = CAT_CORES[n.cat];
    document.getElementById("m-cat").innerHTML = `<span class="w-2 h-2 rounded-full mr-2" style="background:${cor}"></span>${n.cat}`;
    catWrap.style.display="block"; 
  } else catWrap.style.display="none";
  document.getElementById("modal").classList.replace("hidden", "flex");
  setTimeout(()=>document.getElementById("modal-box").classList.replace("opacity-0","opacity-100"),10);
}
function closeModal() { document.getElementById("modal").classList.replace("flex", "hidden"); }
</script>
</body>
</html>
