<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Evidências — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F1F5F9}
#net{position:absolute;top:0;left:280px;right:0;bottom:0;background:#F1F5F9;transition:right .25s ease}
#sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:white;border-right:1px solid #E2E8F0;z-index:30;display:flex;flex-direction:column}
#sidebar-list{flex:1;overflow-y:auto;padding:12px 8px}
#painel{position:fixed;top:0;right:0;width:480px;height:100vh;background:white;border-left:1px solid #E2E8F0;z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-12px 0 30px rgba(0,0,0,0.04)}
#painel.open{transform:translateX(0)}
#painel-body{flex:1;overflow-y:auto;padding:24px 28px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:5px}
</style>
</head>
<body>

<div id="sidebar">
  <div class="px-5 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-700">Matriz de Vulnerabilidades</p>
    <p class="text-[11px] text-gray-400 mt-1 font-medium">GT Alfabetização · SME-SP</p>
  </div>
  <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<div style="position:fixed;top:0;left:280px;right:0;z-index:20;pointer-events:none;background:linear-gradient(rgba(241,245,249,1) 50%,rgba(241,245,249,0))">
  <div style="display:flex;justify-content:center;padding:28px 0 56px">
    <div style="text-align:center">
      <h1 style="font-size:20px;font-weight:800;color:#0F172A;margin:0;letter-spacing:-0.03em">Árvore Diagnóstica de Vulnerabilidades</h1>
      <p style="font-size:11px;color:#475569;margin:5px 0 0;font-weight:600">Volumetria proporcional e conexões transversais unificadas</p>
    </div>
  </div>
</div>

<div id="painel">
  <div style="padding:28px;border-bottom:1px solid #F1F5F9;flex-shrink:0;display:flex;gap:20px;align-items:start">
    <div style="flex:1;min-width:0">
      <div id="p-cor" style="width:16px;height:16px;border-radius:50%;margin-bottom:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05)"></div>
      <h2 id="p-titulo" style="font-size:15px;font-weight:700;color:#0F172A;margin:0;line-height:1.4"></h2>
      <p id="p-sub" style="font-size:11px;color:#64748B;margin:5px 0 0;font-weight:500"></p>
    </div>
    <button onclick="fecharPainel()" style="width:36px;height:36px;border-radius:12px;background:#F1F5F9;border:none;cursor:pointer;font-size:20px;color:#64748B;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s" onmouseover="this.style.background='#E2E8F0'" onmouseout="this.style.background='#F1F5F9'">×</button>
  </div>
  <div id="painel-body"></div>
</div>

<script>
// --- PALETA DE CORES MAIS "SAL" E CORPORATIVA ---
const EIXO_CORES = {
  "Eixo 1": "#1D4ED8", // Blue
  "Eixo 2": "#7C3AED", // Purple
  "Eixo 3": "#059669", // Emerald
  "Eixo 4": "#EA580C", // Orange
  "Eixo 5": "#0891B2", // Cyan
  "Eixo 6": "#DC2626", // Red
  "Eixo 7": "#0F766E"  // Teal
};

const EIXO_CURTO = {
  "Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura",
  "Eixo 4": "Incentivos", "Eixo 5": "Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Materiais"
};

// Cores mais saturadas e distintas para os temas transversais
const CAT_CORES_MAP = {
  "Fragmentação da concepção": "#EF4444", // Red vivid
  "Fragilidade na comunicação": "#2563EB", // Blue vivid
  "Alta rotatividade": "#A855F7",           // Purple vivid
  "Sobrecarga de demandas": "#06B6D4",      // Cyan
  "Participação desigual": "#10B981",        // Green vivid
  "Fragilidade no atendimento": "#F59E0B",   // Amber vivid
  "Fragilidade na identidade": "#F472B6",    // Pink
  "Fragilidade na articulação": "#FB7185",   // Rose
  "Recursos pedagógicos": "#F472B6",        // Pink
  "Excesso e sobreposição": "#4ADE80"        // Lime vivid
};

let G = { nodes: [], edges: [], details: {} };
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv";

async function inicializar() {
    try {
        const res = await fetch(CSV_URL);
        const csv = new TextDecoder("utf-8").decode(await res.arrayBuffer());
        const rows = parseCSV(csv);
        buildStructure(rows);
        buildSidebarHierarquica();
        renderTree();
    } catch (e) {
        console.error(e);
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    return lines.slice(1).map(line => {
        const cols = []; let curr = "", q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') q = !q;
            else if (c === ';' && !q) { cols.push(curr.trim()); curr = ""; }
            else curr += c;
        }
        cols.push(curr.trim());
        return cols;
    });
}

function buildStructure(rows) {
    const catMap = {};
    const eixosAtivos = new Set();

    G.nodes.push({
        id: "ROOT", label: "Gargalo Central\nEducação Municipal", shape: "dot", size: 16,
        color: {background: "#EF4444", border: "#DC2626"}, font: {size: 11, color: "#1E293B", bold: true}
    });

    rows.forEach(r => {
        const [eixo, prob, cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        if (!eixo) return;
        
        const cleanEixo = eixo.split(" - ")[0];
        eixosAtivos.add(cleanEixo);

        const mapearPar = (textoCausa, categoriaCausa) => {
            if (!textoCausa || !categoriaCausa || categoriaCausa.trim() === "" || textoCausa.trim() === "") return;
            const cat = categoriaCausa.trim();
            const txt = textoCausa.trim();

            if (!catMap[cat]) catMap[cat] = { eixos: new Set(), causas: {} };
            catMap[cat].eixos.add(cleanEixo);
            
            if (!catMap[cat].causas[txt]) catMap[cat].causas[txt] = { texto: txt, eixos: new Set(), v: 0 };
            catMap[cat].causas[txt].eixos.add(cleanEixo);
            
            const vNum = parseInt(votos) || 0;
            if (vNum > catMap[cat].causas[txt].v) catMap[cat].causas[txt].v = vNum;
        };

        mapearPar(cp, cat_p);
        mapearPar(cs, cat_s);
        mapearPar(ct, cat_t);
    });

    eixosAtivos.forEach(ex => {
        G.nodes.push({
            id: ex, label: ex, shape: "dot", size: 12,
            color: {background: EIXO_CORES[ex]||"#64748B", border: EIXO_CORES[ex]||"#64748B"},
            font: {size: 10, color: "#334155", bold: true}
        });
        G.edges.push({ from: "ROOT", to: ex, color: "#E2E8F0", width: 2.5 });
    });

    Object.keys(catMap).forEach(catNome => {
        const info = catMap[catNome];
        const totalCausasDiferentes = Object.keys(info.causas).length;
        const chaveCor = Object.keys(CAT_CORES_MAP).find(k => catNome.includes(k));
        const corBase = CAT_CORES_MAP[chaveCor] || "#CBD5E0";

        // UNIÃO INTELIGENTE E VIBRANTE: Volumetria de causas real e sensível!
        // Aumentado a base e o multiplicador para bolas visivelmente maiores conforme volume
        const tamanhoCalculado = 10 + Math.min(totalCausasDiferentes * 2, 20); 
        const labelCurto = catNome.length > 25 ? catNome.slice(0,25) + "..." : catNome;

        G.nodes.push({
            id: `__cat__${catNome}`, label: labelCurto, title: catNome, shape: "dot", size: tamanhoCalculado,
            color: {background: corBase, border: corBase}, font: {size: 9, color: "#475569", bold: true}
        });

        info.eixos.forEach(ex => {
            G.edges.push({ from: ex, to: `__cat__${catNome}`, color: "#CBD5E0", width: 1 });
        });

        // Coleciona o volume de causas para ordenar no menu lateral
        G.details[`__cat__${catNome}`] = {
            cat: catNome, cor: corBase, volumeCausas: totalCausasDiferentes,
            causas: Object.values(info.causas).map(c => ({ texto: c.texto, eixos: Array.from(c.eixos), votos: c.v }))
        };
    });
}

let net = null, vN = null, vE = null;

function renderTree() {
    vN = new vis.DataSet(G.nodes); vE = new vis.DataSet(G.edges);
    net = new vis.Network(document.getElementById("net"), {nodes: vN, edges: vE}, {
        physics: {
            solver: "barnesHut",
            barnesHut: { gravitationalConstant: -4000, centralGravity: 0.3, springLength: 140, springConstant: 0.04, damping: 0.09 },
            stabilization: { iterations: 150 }
        },
        interaction: { hover: true, tooltipDelay: 150 }
    });
    net.on("stabilizationIterationsDone", () => net.setOptions({ physics: false }));
    net.on("click", p => p.nodes.length && aoClicarNoNode(p.nodes[0]));
}

function aoClicarNoNode(id) {
    const det = G.details[id];
    if (!det) return;

    document.getElementById("p-cor").style.background = det.cor;
    document.getElementById("p-titulo").textContent = det.cat;
    document.getElementById("p-sub").textContent = `${det.volumeCausas} evidências e vulnerabilidades mapeadas sob este tema`;

    let html = '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Evidências Coletadas na Rede</p>';
    det.causas.forEach(c => {
        const badges = c.eixos.map(ex => `<span style="background:${EIXO_CORES[ex] || "#64748B"};color:white;padding:3.5px 7px;border-radius:8px;font-size:9px;font-weight:700;margin-right:5px;box-shadow: 0 1px 2px rgba(0,0,0,0.05)">${EIXO_CURTO[ex] || ex}</span>`).join("");
        html += `<div style="padding:16px;border-radius:14px;border:1px solid #E2E8F0;background:#F8FAFC;margin-bottom:14px">
            <div style="margin-bottom:10px">${badges}</div>
            <p style="font-size:12px;color:#334155;line-height:1.6;font-weight:500">${c.texto}</p>
            ${c.votos > 0 ? `<div style="margin-top:10px;font-size:10px;font-weight:700;color:#D97706;background:#FEF3C7;padding:3px 10px;border-radius:8px;display:inline-block">⭐ ${c.votos} votos</div>` : ""}
        </div>`;
    });

    document.getElementById("painel-body").innerHTML = html;
    document.getElementById("painel").classList.add("open");
    document.getElementById("net").style.right = "480px";

    // COMPORTAMENTO DE ACENDER CONEXÕES: Ilumina apenas o nó clicado, a raiz e os eixos diretamente interligados!
    const conectados = net.getConnectedNodes(id); conectados.push(id); conectados.push("ROOT");
    vN.update(G.nodes.map(n => ({ id: n.id, opacity: conectados.includes(n.id) ? 1 : 0.05 })));
}

function buildSidebarHierarquica() {
    const list = document.getElementById("sidebar-list");
    list.innerHTML = "";

    const reset = document.createElement("button");
    reset.className = "w-full text-left p-2.5 rounded-lg text-xs font-bold text-slate-400 hover:bg-slate-50 uppercase mb-5 transition flex items-center gap-1.5";
    reset.textContent = "⊙ Ver Cenário Completo";
    reset.onclick = () => { fecharPainel(); };
    list.appendChild(reset);

    const sortedCats = Object.keys(G.details).map(id => ({ id, ...G.details[id] }));
    
    // ORDENAÇÃO HIERÁRQUICA: Decrescente pela quantidade (volume) de causas
    sortedCats.sort((a, b) => b.volumeCausas - a.volumeCausas);

    const transversais = []; const especificas = [];

    sortedCats.forEach(c => {
        const eixosUnicos = new Set();
        c.causas.forEach(causa => causa.eixos.forEach(ex => eixosUnicos.add(ex)));
        if (eixosUnicos.size > 1) transversais.push(c); else especificas.push(c);
    });

    const renderGrupoHierarquico = (titulo, classeCor, lista) => {
        if (!lista.length) return;
        const h = document.createElement("p");
        h.className = `text-[10px] font-bold uppercase tracking-widest mt-6 mb-3 px-2.5 ${classeCor}`;
        h.textContent = titulo;
        list.appendChild(h);

        lista.forEach((item, idx) => {
            const b = document.createElement("button");
            // Estilo mais sutil, sem negrito pesado no nome, com volume de causas ao lado
            b.className = "cat-btn w-full text-left p-2.5 rounded-xl text-[11px] mb-1 flex items-start gap-3 border border-transparent hover:bg-slate-50 transition";
            b.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${item.cor};margin-top:4px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05)"></span>
                <div class="flex-1">
                    <span class="text-slate-700 font-medium leading-normal">${item.cat}</span>
                    <span class="text-slate-400 font-medium text-[9px] block">(${item.volumeCausas} causas)</span>
                </div>`;
            b.onclick = () => {
                aoClicarNoNode(item.id);
                document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("bg-indigo-50", "border-indigo-100"));
                b.classList.add("bg-indigo-50", "border-indigo-100");
            };
            list.appendChild(b);
        });
        const divider = document.createElement("hr");
        divider.className = "my-5 border-slate-100";
        list.appendChild(divider);
    };

    renderGrupoHierarquico("🔗 Temas Transversais (Ordenado por Volume)", "text-indigo-600", transversais);
    renderGrupoHierarquico("📌 Dores Específicas (Ordenado por Volume)", "text-slate-500", especificas);
}

function fecharPainel() {
    document.getElementById("painel").classList.remove("open");
    document.getElementById("net").style.right = "0";
    document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("bg-indigo-50", "border-indigo-100"));
    if (vN) vN.update(G.nodes.map(n => ({ id: n.id, opacity: 1 })));
}

window.onload = inicializar;
</script>
</body>
</html>
