<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Evidências — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F8FAFC}
#net{position:absolute;top:0;left:280px;right:0;bottom:0;background:#F8FAFC;transition:right .25s ease}
#sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:white;border-right:1px solid #E2E8F0;z-index:30;display:flex;flex-direction:column}
#sidebar-list{flex:1;overflow-y:auto;padding:12px 8px}
#painel{position:fixed;top:0;right:0;width:480px;height:100vh;background:white;border-left:1px solid #E2E8F0;z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-12px 0 30px rgba(0,0,0,0.04)}
#painel.open{transform:translateX(0)}
#painel-body{flex:1;overflow-y:auto;padding:24px 28px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:5px}

.switch {position:relative;display:inline-block;width:34px;height:20px}
.switch input {opacity:0;width:0;height:0}
.slider {position:absolute;cursor:pointer;inset:0;background-color:#CBD5E0;border-radius:20px;transition:.2s}
.slider:before {position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background-color:white;border-radius:50%;transition:.2s}
input:checked + .slider {background-color:#2563EB}
input:checked + .slider:before {transform:translateX(14px)}
</style>
</head>
<body>

<div id="sidebar">
  <div class="px-5 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-700">Matriz Diagnóstica</p>
    <p class="text-[11px] text-gray-400 mt-1 font-medium">GT Alfabetização · SME-SP</p>
  </div>
  
  <div id="controles-aba1" class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
    <span class="text-[11px] font-semibold text-slate-700">Exibir dores específicas</span>
    <label class="switch">
      <input type="checkbox" id="filtro-especificas" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div id="controles-aba2" class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex-col gap-3 flex-shrink-0 hidden">
    
    <div class="flex flex-col gap-1 w-full border-b border-slate-200 pb-2">
      <span class="text-[10px] font-bold text-amber-600 uppercase tracking-wider">Mínimo de Relevância (⭐)</span>
      <select id="select-votos-hierarquica" class="bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-medium text-slate-700 focus:outline-none focus:ring-1 focus:ring-amber-500" onchange="renderizarEstruturaHierarquica()">
        <option value="0">Mostrar Todas as Evidências</option>
        <option value="1">1+ Estrela (Sinalizadas)</option>
        <option value="4">4+ Estrelas (Alta Relevância)</option>
        <option value="6">6+ Estrelas (Gargalos Críticos)</option>
      </select>
    </div>

    <div class="flex flex-col gap-1 w-full border-b border-slate-200外 pb-2">
      <div class="flex items-center justify-between">
        <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider">Conexões Transversais</span>
        <label class="switch">
          <input type="checkbox" id="switch-transversal-hierarquica" checked onchange="toggleVisibilidadeComboTema()">
          <span class="slider"></span>
        </label>
      </div>
      <select id="select-tema-transversal" class="bg-white border border-slate-200 rounded-lg p-1.5 text-xs font-medium text-slate-700 focus:outline-none focus:ring-1 focus:ring-indigo-500 mt-1" onchange="renderizarEstruturaHierarquica()">
        <option value="__ALL__">Destacar Todos os Temas</option>
      </select>
    </div>

    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5 block">Filtrar por Eixos</span>
    <div id="checkbox-eixos-container" class="flex flex-col gap-1.5 max-height-[140px] overflow-y-auto"></div>
  </div>

  <div id="sidebar-list"></div>
</div>

<div id="net"></div>

<div style="position:fixed;top:0;left:280px;right:0;z-index:20;pointer-events:none;background:linear-gradient(rgba(248,250,252,1) 70%,rgba(248,250,252,0))">
  <div style="display:flex;flex-direction:column;align-items:center;padding:20px 0 40px">
    <div style="text-align:center;pointer-events:auto;">
      <h1 id="main-title" style="font-size:20px;font-weight:800;color:#0F172A;margin:0;letter-spacing:-0.03em">Árvore Diagnóstica de Problemas</h1>
      <p id="main-subtitle" style="font-size:11px;color:#475569;margin:5px 0 0;font-weight:600">Volumetria proporcional e conexões transversais unificadas</p>
    </div>
    
    <div class="flex bg-slate-200/80 p-1 rounded-xl mt-4 pointer-events-auto shadow-sm backdrop-blur-sm">
      <button id="btn-aba1" onclick="mudarAba('radial')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-800 shadow-sm">
        Matriz de Temas
      </button>
      <button id="btn-aba2" onclick="mudarAba('hierarquica')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800">
        Árvore Detalhada
      </button>
    </div>
  </div>
</div>

<div id="painel">
  <div style="padding:28px;border-bottom:1px solid #F1F5F9;flex-shrink:0;display:flex;gap:16px;align-items:start">
    <div style="flex:1;min-width:0">
      <div id="p-cor" style="width:14px;height:14px;border-radius:50%;margin-bottom:10px;box-shadow:0 0 6px rgba(0,0,0,0.1)"></div>
      <h2 id="p-titulo" style="font-size:14px;font-weight:700;color:#0F172A;margin:0;line-height:1.4;letter-spacing:-0.01em"></h2>
      <p id="p-sub" style="font-size:11px;color:#64748B;margin:4px 0 0;font-weight:500"></p>
    </div>
    <button onclick="fecharPainel()" style="width:32px;height:32px;border-radius:10px;background:#F1F5F9;border:none;cursor:pointer;font-size:18px;color:#64748B;flex-shrink:0;display:flex;align-items:center;justify-content:center">×</button>
  </div>
  <div id="painel-body"></div>
</div>

<script>
const EIXO_CORES = {
  "Eixo 1": "#2563EB", "Eixo 2": "#7C3AED", "Eixo 3": "#059669",
  "Eixo 4": "#EA580C", "Eixo 5": "#06B6D4", "Eixo 6": "#E11D48", "Eixo 7": "#14B8A6"
};

const EIXO_NOMES_COMPLETOS = {};
const CAT_CORES_MAP = {
  "Fragmentação": "#EF4444", "fragmentação": "#EF4444",
  "Comunicação": "#3B82F6", "comunicação": "#3B82F6",
  "Rotatividade": "#A855F7", "rotatividade": "#A855F7",
  "Sobrecarga": "#06B6D4", "sobrecarga": "#06B6D4",
  "Participação": "#10B981", "participação": "#10B981",
  "Atendimento": "#F59E0B", "atendimento": "#F59E0B",
  "Identidade": "#EC4899", "identidade": "#EC4899",
  "Articulação": "#F43F5E", "articulação": "#F43F5E",
  "Recursos": "#D946EF", "recursos": "#D946EF",
  "Excesso": "#22C55E", "excesso": "#22C55E",
  "Inadequação": "#F97316", "inadequação": "#F97316",
  "Qualificação": "#84CC16", "qualificação": "#84CC16"
};

let currentTab = "radial"; 
let rawRows = []; 
let G = { nodes: [], edges: [], details: {}, edgesOriginal: [] };
let net = null, vN = null, vE = null;

const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/arvore.csv";

async function inicializar() {
    try {
        const res = await fetch(CSV_URL);
        const csv = new TextDecoder("utf-8").decode(await res.arrayBuffer());
        rawRows = parseCSV(csv);
        
        const listaTemasUnicos = new Set();

        rawRows.forEach(r => {
            const [eixoCompleto,, , cp_cat,, cs_cat,, exterior, ct_cat] = r;
            if(eixoCompleto && eixoCompleto.includes(" - ")) {
                const sigla = eixoCompleto.split(" - ")[0];
                EIXO_NOMES_COMPLETOS[sigla] = eixoCompleto;
            }
            [cp_cat, cs_cat, ct_cat].forEach(cat => {
                if(cat && cat.trim() !== "") listaTemasUnicos.add(cat.trim());
            });
        });

        // Preenche o combo de temas transversais da aba 2 dinamicamente
        const comboTema = document.getElementById("select-tema-transversal");
        Array.from(listaTemasUnicos).sort().forEach(t => {
            const opt = document.createElement("option");
            opt.value = t;
            opt.textContent = t;
            comboTema.appendChild(opt);
        });

        construirCheckboxEixos();
        renderizarEstruturaRadial();

        document.getElementById("filtro-especificas").addEventListener("change", (e) => {
            if(currentTab === "radial") aplicarFiltroGrafoRadial(e.target.checked);
        });

    } catch (e) {
        console.error(e);
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    return lines.slice(1).map(line => {
        const cols = []; let q = false; let curr = "";
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') q = !q;
            else if (c === ';' && !q) { cols.push(curr.trim()); curr = ""; }
            else curr += c;
        }
        cols.push(curr.trim());
        return cols;
    });
}

function construirCheckboxEixos() {
    const container = document.getElementById("checkbox-eixos-container");
    container.innerHTML = "";
    Object.keys(EIXO_NOMES_COMPLETOS).sort().forEach((sigla, idx) => {
        const label = document.createElement("label");
        label.className = "flex items-center gap-2 text-[11px] font-medium text-slate-600 cursor-pointer hover:text-slate-900";
        const checked = idx < 3 ? "checked" : ""; 
        label.innerHTML = `
            <input type="checkbox" value="${sigla}" ${checked} class="axis-checkbox rounded border-gray-300 text-blue-600 focus:ring-blue-500 w-3.5 h-3.5" onchange="renderizarEstruturaHierarquica()">
            <span class="truncate" title="${EIXO_NOMES_COMPLETOS[sigla]}">${sigla} - ${EIXO_NOMES_COMPLETOS[sigla].split(" - ")[1]}</span>
        `;
        container.appendChild(label);
    });
}

function toggleVisibilidadeComboTema() {
    const ativo = document.getElementById("switch-transversal-hierarquica").checked;
    document.getElementById("select-tema-transversal").disabled = !ativo;
    renderizarEstruturaHierarquica();
}

// --- CONSTRUÇÃO DA ABA 1: GRAFO RADIAL DE TEMAS ---
function renderizarEstruturaRadial() {
    G = { nodes: [], edges: [], details: {}, edgesOriginal: [] };
    const catMap = {};
    const eixosAtivos = {};

    G.nodes.push({
        id: "ROOT", label: "BAIXA\nALFABETIZAÇÃO", shape: "dot", size: 36,
        color: { background: "#E11D48", border: "#BE123C", highlight: {background: "#E11D48", border: "#BE123C"} }, 
        borderWidth: 1.5, font: {size: 9, color: "#FFFFFF", bold: true}
    });

    rawRows.forEach(r => {
        const [eixoCompleto, probCentral, cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        if (!eixoCompleto) return;
        const cleanEixo = eixoCompleto.split(" - ")[0];
        
        if (!eixosAtivos[cleanEixo]) {
            eixosAtivos[cleanEixo] = { completo: eixoCompleto, problema: probCentral };
        }

        const mapearPar = (textoCausa, categoriaCausa) => {
            if (!textoCausa || !categoriaCausa || categoriaCausa.trim() === "" || textoCausa.trim() === "") return;
            const cat = categoriaCausa.trim();
            const txt = textoCausa.trim();

            if (!catMap[cat]) catMap[cat] = { eixos: new Set(), causas: {} };
            catMap[cat].eixos.add(cleanEixo);
            if (!catMap[cat].causas[txt]) catMap[cat].causas[txt] = { texto: txt, eixos: new Set(), v: 0 };
            catMap[cat].causas[txt].eixos.add(cleanEixo);
            const vNum = parseInt(votos) || 0;
            if (vNum > catMap[cat].causas[txt].v) catMap[cat].causas[txt].v = vNum;
        };

        mapearPar(cp, cat_p); mapearPar(cs, cat_s); mapearPar(ct, cat_t);
    });

    Object.keys(eixosAtivos).forEach(ex => {
        const corSólida = EIXO_CORES[ex] || "#475569";
        G.nodes.push({
            id: ex, label: ex, title: eixosAtivos[ex].completo, shape: "dot", size: 24, borderWidth: 1.5,
            color: {background: corSólida, border: corSólida, highlight: {background: corSólida, border: corSólida}},
            font: {size: 11, color: "#1E293B", bold: true}, _isEixo: true
        });
        G.edges.push({ id: `edge_root_${ex}`, from: "ROOT", to: ex, color: { color: "#CBD5E0", opacity: 0.5 }, width: 1.5 });
        G.details[ex] = { tipo: "eixo", titulo: eixosAtivos[ex].completo, cor: corSólida, subtitulo: "Problema Central Mapeado no Eixo", conteudo: eixosAtivos[ex].problema };
    });

    Object.keys(catMap).forEach(catNome => {
        const info = catMap[catNome];
        const totalCausasDiferentes = Object.keys(info.causas).length;
        let corSólida = "#FF6B6B";
        for (const chave in CAT_CORES_MAP) {
            if (catNome.toLowerCase().includes(chave.toLowerCase())) { corSólida = CAT_CORES_MAP[chave]; break; }
        }
        const tamanhoCalculado = 14 + Math.min(totalCausasDiferentes * 4, 32);
        const labelCurto = catNome.length > 20 ? catNome.slice(0,20) + "..." : catNome;
        const eixosUnicos = Array.from(info.eixos);
        const ehTransversal = eixosUnicos.length > 1;

        G.nodes.push({
            id: `__cat__${catNome}`, label: labelCurto, title: catNome, shape: "dot", size: tamanhoCalculado, borderWidth: 1,
            color: {background: corSólida, border: corSólida, highlight: {background: corSólida, border: corSólida}},
            font: {size: 10, color: "#475569", bold: true}, _isSpecific: !ehTransversal
        });

        info.eixos.forEach(ex => {
            G.edges.push({ id: `edge_${ex}_${catNome}`, from: ex, to: `__cat__${catNome}`, color: { color: "#E2E8F0", opacity: 0.7 } });
        });

        G.details[`__cat__${catNome}`] = {
            tipo: "categoria", id: `__cat__${catNome}`, cat: catNome, cor: corSólida, volumeCausas: totalCausasDiferentes, ehTransversal: ehTransversal,
            causas: Object.values(info.causas).map(c => ({ texto: c.texto, eixos: Array.from(c.eixos), votos: c.v }))
        };
    });

    G.edgesOriginal = [...G.edges];
    buildSidebarHierarquicaRadial();
    renderVisNetworkRadial();
}

function renderVisNetworkRadial() {
    vN = new vis.DataSet(G.nodes); vE = new vis.DataSet(G.edges);
    net = new vis.Network(document.getElementById("net"), {nodes: vN, edges: vE}, {
        edges: { width: 1.5, smooth: { enabled: true, type: "continuous", roundness: 0.4 } },
        physics: {
            enabled: true, solver: "barnesHut",
            barnesHut: { gravitationalConstant: -14000, centralGravity: 0.04, springLength: 220, springConstant: 0.02, damping: 0.15 },
            stabilization: { iterations: 120, updateInterval: 25 }
        },
        interaction: { hover: true, dragNodes: true, tooltipDelay: 150 }
    });
    net.on("click", p => p.nodes.length ? aoClicarNoNodeRadial(p.nodes[0]) : fecharPainel());
    aplicarFiltroGrafoRadial(document.getElementById("filtro-especificas").checked);
}

function aplicarFiltroGrafoRadial(exibirEspecificas) {
    fecharPainel();
    const nosFiltrados = G.nodes.filter(n => exibirEspecificas || !n._isSpecific);
    vN.clear(); vN.add(nosFiltrados);
    const idsAtivos = nosFiltrados.map(n => n.id);
    const arestasFiltradas = G.edgesOriginal.filter(e => idsAtivos.includes(e.from) && idsAtivos.includes(e.to));
    vE.clear(); vE.add(arestasFiltradas);
}

function aoClicarNoNodeRadial(id) {
    const det = G.details[id];
    if (!det) return;
    document.getElementById("p-cor").style.background = det.cor;
    
    if (det.tipo === "eixo") {
        document.getElementById("p-titulo").textContent = det.titulo;
        document.getElementById("p-sub").textContent = det.subtitulo;
        document.getElementById("painel-body").innerHTML = `
            <div style="padding:20px;border-radius:14px;border:1px solid #E2E8F0;background:#F8FAFC;margin-top:10px">
                <p style="font-size:13px;color:#1E293B;line-height:1.7;font-weight:500">${det.conteudo}</p>
            </div>`;
    } else {
        document.getElementById("p-titulo").textContent = det.cat;
        document.getElementById("p-sub").textContent = `${det.volumeCausas} evidências mapeadas sob este tema`;

        let html = '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Evidências Coletadas na Rede</p>';
        det.causas.forEach(c => {
            const badges = c.eixos.map(ex => {
                return `<span style="background:${EIXO_CORES[ex] || "#475569"};color:white;padding:5px 9px;border-radius:8px;font-size:10px;font-weight:700;display:inline-block;margin-bottom:6px;margin-right:5px">${EIXO_NOMES_COMPLETOS[ex] || ex}</span>`;
            }).join("");
            html += `<div style="padding:16px;border-radius:14px;border:1px solid #E2E8F0;background:#F8FAFC;margin-bottom:14px">
                <div style="margin-bottom:6px; display:flex; flex-wrap:wrap;">${badges}</div>
                <p style="font-size:12px;color:#334155;line-height:1.6;font-weight:500">${c.texto}</p>
                ${c.votos > 0 ? `<div style="margin-top:10px;font-size:10px;font-weight:700;color:#D97706;background:#FEF3C7;padding:3px 10px;border-radius:8px;display:inline-block">⭐ ${c.votos}  votos</div>` : ""}
            </div>`;
        });
        document.getElementById("painel-body").innerHTML = html;
    }

    document.getElementById("painel").classList.add("open");
    document.getElementById("net").style.right = "480px";

    try {
        const conectados = net.getConnectedNodes(id); conectados.push(id);
        const ocultarMacro = (id !== "ROOT");
        vN.update(vN.get().map(n => {
            let visivel = conectados.includes(n.id);
            if (n.id === "ROOT" && ocultarMacro) visivel = false;
            return { id: n.id, opacity: visivel ? 1 : 0.05 };
        }));
        vE.update(vE.get().map(e => {
            const pertenceAoFluxoDireto = (e.from === id || e.to === id);
            const envolveMacro = (e.from === "ROOT" || e.to === "ROOT");
            if (ocultarMacro &&外vMacro) return { id: e.id, color: { opacity: 0 }, width: 0 };
            return { id: e.id, color: pertenceAoFluxoDireto ? { color: det.cor, opacity: 1 } : { opacity: 0.02 }, width: pertenceAoFluxoDireto ? 2.5 : 1 };
        }));
    } catch(err){}
}

function buildSidebarHierarquicaRadial() {
    const list = document.getElementById("sidebar-list"); list.innerHTML = "";
    const reset = document.createElement("button");
    reset.className = "w-full text-left p-2.5 rounded-lg text-xs font-bold text-slate-400 hover:bg-slate-50 uppercase mb-3 transition flex items-center gap-1.5";
    reset.textContent = "⊙ Ver Cenário Completo";
    reset.onclick = () => { fecharPainel(); };
    list.appendChild(reset);

    const sortedCats = Object.keys(G.details).map(id => G.details[id]).filter(item => item.tipo === "categoria");
    sortedCats.sort((a, b) => b.volumeCausas - a.volumeCausas);
    const transversais = sortedCats.filter(c => c.ehTransversal);
    const especificas = sortedCats.filter(c => !c.ehTransversal);

    const renderGrupoHierarquico = (titulo, classeCor, lista) => {
        if (!lista.length) return;
        const h = document.createElement("p");
        h.className = `text-[10px] font-bold uppercase tracking-widest mt-5 mb-3 px-2.5 ${classeCor}`;
        h.textContent = titulo;
        list.appendChild(h);

        lista.forEach(item => {
            const b = document.createElement("button");
            b.className = "cat-btn w-full text-left p-2.5 rounded-xl text-[11px] mb-1 flex items-start gap-3 border border-transparent hover:bg-slate-50 transition";
            b.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${item.cor};margin-top:4px;flex-shrink:0;box-shadow:0 0 4px rgba(0,0,0,0.1)"></span>
                <div class="flex-1">
                    <span class="text-slate-700 font-semibold leading-normal">${item.cat}</span>
                    <span class="text-indigo-600 font-bold text-[10px] block mt-0.5">${item.volumeCausas} causas</span>
                </div>`;
            b.onclick = () => {
                aoClicarNoNodeRadial(item.id);
                document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("bg-indigo-50", "border-indigo-100"));
                b.classList.add("bg-indigo-50", "border-indigo-100");
            };
            list.appendChild(b);
        });
    };
    renderGrupoHierarquico("🔗 Temas Transversais", "text-indigo-600", transversais);
    renderGrupoHierarquico("📌 Dores Específicas", "text-slate-500", especificas);
}


// --- CONSTRUÇÃO DA ABA 2: CONSTELAÇÃO DELICADA + MAPA DE CONEXÕES EM TEIA ---
let hNodesDetails = {}; 

function renderizarEstruturaHierarquica() {
    fecharPainel();
    
    const eixosSelecionados = Array.from(document.querySelectorAll(".axis-checkbox:checked")).map(cb => cb.value);
    const destacarTransversais = document.getElementById("switch-transversal-hierarquica").checked;
    const filtroTemaEscolhido = document.getElementById("select-tema-transversal").value;
    const notaCorteVotos = parseInt(document.getElementById("select-votos-hierarquica").value) || 0;

    const hNodes = [];
    const hEdges = [];
    const nosCriadosUnicos = new Set();
    hNodesDetails = {}; 

    // Nó de Problema Macro Principal (Âncora Vermelha)
    const macroId = "H2_MACRO_ROOT";
    hNodes.push({
        id: macroId, label: "BAIXA\nALFABETIZAÇÃO", shape: "dot", size: 30,
        color: { background: "#E11D48", border: "#BE123C" },
        font: { bold: true, size: 10, color: "#FFFFFF" }
    });

    const linhasFiltradas = rawRows.filter(r => {
        if (!r[0]) return false;
        const siglaEixo = r[0].split(" - ")[0];
        return eixosSelecionados.includes(siglaEixo);
    });

    // Mapeamentos analíticos globais para as relações cruzadas
    const mapaRecorrenciaTexto = {};
    const mapaTextoParaEixos = {};
    const mapaTextoParaCategorias = {};
    const mapaNodesPorTemaParaTeia = {}; // Agrupador físico para gerar as linhas tracejadas

    rawRows.forEach(r => {
        const [eixo, , cp, cat_p, cs, cat_s, , ct, cat_t] = r;
        if(!eixo) return;
        const sigla = eixo.split(" - ")[0];

        [[cp, cat_p], [cs, cat_s], [ct, cat_t]].forEach(([txt, cat]) => {
            if (txt && txt.trim() !== "") {
                const cleanTxt = txt.trim();
                mapaRecorrenciaTexto[cleanTxt] = (mapaRecorrenciaTexto[cleanTxt] || 0) + 1;
                
                if (!mapaTextoParaEixos[cleanTxt]) mapaTextoParaEixos[cleanTxt] = new Set();
                mapaTextoParaEixos[cleanTxt].add(sigla);

                if (cat && cat.trim() !== "") mapaTextoParaCategorias[cleanTxt] = cat.trim();
            }
        });
    });

    // Contador consolidado de métricas por eixo
    const metricasEixos = {};
    eixosSelecionados.forEach(ex => {
        metricasEixos[ex] = { totalP: 0, totalS: 0, totalT: 0, transversais: 0, estrelas: 0, probCentral: "" };
    });

    rawRows.forEach(r => {
        const [eixoCompleto, probCentral, cp, , cs, , votos, ct] = r;
        if (!eixoCompleto) return;
        const sigla = eixoCompleto.split(" - ")[0];
        if (!eixosSelecionados.includes(sigla)) return;

        metricasEixos[sigla].probCentral = probCentral;
        const vNum = parseInt(votos) || 0;

        if (cp && cp.trim() !== "") {
            metricasEixos[sigla].totalP++;
            if(mapaRecorrenciaTexto[cp.trim()] > 1) metricasEixos[sigla].transversais++;
            if(vNum > 0) metricasEixos[sigla].estrelas++;
        }
        if (cs && cs.trim() !== "") {
            metricasEixos[sigla].totalS++;
            if(mapaRecorrenciaTexto[cs.trim()] > 1) metricasEixos[sigla].transversais++;
            if(vNum > 0) metricasEixos[sigla].estrelas++;
        }
        if (ct && ct.trim() !== "") {
            metricasEixos[sigla].totalT++;
            if(mapaRecorrenciaTexto[ct.trim()] > 1) metricasEixos[sigla].transversais++;
            if(vNum > 0) metricasEixos[sigla].estrelas++;
        }
    });

    // Laço de montagem do ecossistema de constelações
    linhasFiltradas.forEach((r, idx) => {
        const [eixoCompleto, , cp, cat_p, cs, cat_s, votos, ct, cat_t] = r;
        const siglaEixo = eixoCompleto.split(" - ")[0];
        const corEixo = EIXO_CORES[siglaEixo] || "#475569";
        const vNum = parseInt(votos) || 0;

        // Regra do corte de estrelas progressivo (1+, 4+, 6+)
        if (vNum <外notaCorteVotos && notaCorteVotos > 0) return;

        // Criar e conectar Eixos
        const eixoId = `H2_${siglaEixo}`;
        if (!nosCriadosUnicos.has(eixoId)) {
            hNodes.push({
                id: eixoId, label: siglaEixo, shape: "dot", size: 23,
                color: { background: corEixo, border: corEixo },
                font: { bold: true, size: 11, color: "#1E293B" }
            });
            hEdges.push({ from: macroId, to: eixoId, color: { color: "#CBD5E0", opacity: 0.5 }, width: 2 });
            nosCriadosUnicos.add(eixoId);
            hNodesDetails[eixoId] = { tipo: "eixo", titulo: eixoCompleto, cor: corEixo, dados: metricasEixos[siglaEixo] };
        }

        // Função de montagem orbital com identificadores claros das camadas de causas [1ª], [2ª] e [3ª]
        const montarNoOrbital = (texto, categoria, paiId, camadaLabel, tamanhoBase, corPadrao) => {
            if (!texto || texto.trim() === "") return null;
            const txt = texto.trim();
            const noId = `H2_N_${siglaEixo}_${camadaLabel}_${txt.slice(0,10)}_${idx}`;
            
            if (nosCriadosUnicos.has(noId)) return noId;

            const temaReal = categoria || mapaTextoParaCategorias[txt] || "Sem Categoria";
            const ehTransversal = mapaRecorrenciaTexto[txt] > 1;
            
            let corFinal = corPadrao;
            let tamanhoFinal = tamanhoBase;
            let bordaW = 0.5;
            let corBorda = "#94A3B8";

            // Se pertencer ao grupo transversal selecionado ou se destacar geral estiver ativo
            const atendeFiltroTema = (filtroTemaEscolhido === "__ALL__" || filtroTemaEscolhido === temaReal);
            if (destacarTransversais && ehTransversal && atendeFiltroTema) {
                corFinal = "#FEF3C7"; 
                tamanhoFinal = tamanhoBase + 3;
                bordaW = 2;
                corBorda = "#F59E0B";

                // Registra o nó para cruzar as linhas tracejadas depois
                if (!mapaNodesPorTemaParaTeia[temaReal]) mapaNodesPorTemaParaTeia[temaReal] = [];
                mapaNodesPorTemaParaTeia[temaReal].push(noId);
            }

            const labelCurto = txt.length > 15 ? txt.slice(0, 13) + "..." : txt;
            const labelCompleto = `[${camadaLabel}ª] ${vNum > 0 ? '⭐ ' : ''}${labelCurto}`;

            hNodes.push({
                id: noId, label: labelCompleto,
                shape: "dot", size: tamanhoFinal, borderWidth: bordaW,
                color: { background: corFinal, border: corBorda },
                font: { size: 9, color: "#475569" }
            });

            // Conecta a causa à sua respectiva árvore genealógica interna
            hEdges.push({
                from: paiId, to: noId,
                color: { color: "#CBD5E0", opacity: 0.4 },
                width: 1
            });

            hNodesDetails[noId] = {
                tipo: "causa",
                camadaLiteral: camadaLabel === "1" ? "Primária" : camadaLabel === "2" ? "Secundária" : "Terciária",
                textoCompleto: txt,
                categoriaEstipulada: temaReal,
                votos: vNum,
                eixosCompartilhados: Array.from(mapaTextoParaEixos[txt] || [siglaEixo]),
                ehTransversal: ehTransversal
            };

            nosCriadosUnicos.add(noId);
            return noId;
        };

        // Escalonamento visual nítido de tamanhos: Primária (14px) -> Secundária (10px) -> Terciária (7px)
        const idP = montarNoOrbital(cp, cat_p, eixoId, "1", 14, "#E2E8F0");
        const idS = idP ? montarNoOrbital(cs, cat_s, idP, "2", 10, "#F1F5F9") : null;
        if (idS) montarNoOrbital(ct, cat_t, idS, "3", 7, "#F8FAFC");
    });

    // --- CONSTRUÇÃO DOS TRAÇOS DE CONEXÃO DA TEIA TRANSVERSAL EM TRIÂNGULO/REDES ---
    if (destacarTransversais) {
        Object.keys(mapaNodesPorTemaParaTeia).forEach(tema => {
            if (filtroTemaEscolhido !== "__ALL__" && filtroTemaEscolhido !== tema) return;
            
            const nosDoGrupo = mapaNodesPorTemaParaTeia[tema];
            // Liga em cadeia (Nó 0 -> Nó 1 -> Nó 2... e fecha o ciclo criando o polígono/triângulo inter-eixos)
            for (let i = 0; i < nosDoGrupo.length; i++) {
                for (let j = i + 1; j < nosDoGrupo.length; j++) {
                    // Evita ligar causas que estão dentro do mesmo eixo para não poluir
                    const eixoA = nosDoGrupo[i].split("_")[2];
                    const eixoB = nosDoGrupo[j].split("_")[2];
                    if (eixoA !== eixoB) {
                        hEdges.push({
                            from: nosDoGrupo[i],
                            to: nosDoGrupo[j],
                            color: { color: "#D97706", opacity: 0.45 },
                            width: 1.2,
                            dashes: [3, 4] // Tracejado pequeno e delicado
                        });
                    }
                }
            }
        });
    }

    const list = document.getElementById("sidebar-list");
    list.innerHTML = `
        <div class="p-4 bg-indigo-50/60 rounded-xl border border-indigo-100/70 text-slate-600 text-[11px] leading-relaxed">
            <p class="font-bold text-indigo-900 mb-1 flex items-center gap-1">✨ Auditoria de Relações</p>
            As bolinhas indicam na etiqueta se são de <span class="font-bold text-slate-800">1ª, 2ª ou 3ª</span> ordem. Ative o seletor de Temas Transversais acima para desenhar os <span class="font-bold text-amber-700">laços e teias tracejadas</span> de ligação mútua.
        </div>
    `;

    // Renderizador Vis.js com física estável de repulsão orgânica
    vN = new vis.DataSet(hNodes); vE = new vis.DataSet(hEdges);
    net = new vis.Network(document.getElementById("net"), {nodes: vN, edges: vE}, {
        nodes: { font: { face: "Inter" } },
        edges: { smooth: { enabled: true, type: "continuous", roundness: 0.3 }, arrows: { to: { enabled: false } } },
        physics: {
            enabled: true,
            solver: "forceAtlas2Based",
            forceAtlas2Based: {
                gravitationalConstant: -75,
                centralGravity: 0.02,
                springLength: 50,
                springConstant: 0.03,
                damping: 0.4,
                avoidOverlap: 1
            },
            stabilization: { iterations: 130, updateInterval: 25 }
        },
        interaction: { hover: true, tooltipDelay: 100, dragNodes: true }
    });

    net.on("click", p => {
        if(p.nodes.length) {
            const idClicado = p.nodes[0];
            
            if (idClicado === "H2_MACRO_ROOT") {
                document.getElementById("p-cor").style.background = "#E11D48";
                document.getElementById("p-titulo").textContent = "Problema Macro Central";
                document.getElementById("p-sub").textContent = "Alvo Geral de Atuação da SME-SP";
                document.getElementById("painel-body").innerHTML = `
                    <div class="p-5 rounded-xl border border-rose-100 bg-rose-50/30">
                        <p class="text-xs外 font-bold text-rose-800 uppercase tracking-wider mb-1">Baixa Alfabetização</p>
                        <p class="text-[12px] text-slate-700 font-medium leading-relaxed">O guarda-chuva que conecta todas as frentes diagnosticadas pelo Grupo de Trabalho. Toda evidência mapeada concorre direta ou indiretamente para este quadro de vulnerabilidade.</p>
                    </div>`;
                document.getElementById("painel").classList.add("open");
                document.getElementById("net").style.right = "480px";
                return;
            }

            const det = hNodesDetails[idClicado];
            if (!det) return;

            document.getElementById("p-cor").style.background = det.cor || "#64748B";

            if (det.tipo === "eixo") {
                document.getElementById("p-titulo").textContent = det.titulo;
                document.getElementById("p-sub").textContent = "Auditoria de Evidências Internas";

                document.getElementById("painel-body").innerHTML = `
                    <div class="p-4 rounded-xl bg-slate-50 border border-slate-200/60 mb-4">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Problema do Eixo</p>
                        <p class="text-xs font-semibold text-slate-700 leading-relaxed">${det.dados.probCentral}</p>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Volumetria Estruturada</p>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-3 bg-white border border-slate-100 shadow-sm rounded-xl">
                            <span class="text-[10px] font-medium text-slate-400 block">Causas Primárias</span>
                            <span class="text-lg font-extrabold text-slate-700">${det.dados.totalP}</span>
                        </div>
                        <div class="p-3 bg-white border border-slate-100 shadow-sm rounded-xl">
                            <span class="text-[10px] font-medium text-slate-400 block">Causas Secundárias/Terciárias</span>
                            <span class="text-lg font-extrabold text-slate-700">${det.dados.totalS + det.dados.totalT}</span>
                        </div>
                        <div class="p-3 bg-indigo-50/50 border border-indigo-100 shadow-sm rounded-xl">
                            <span class="text-[10px] font-bold text-indigo-700 block">🔗 Temas Transversais</span>
                            <span class="text-lg font-extrabold text-indigo-800">${det.dados.transversais}</span>
                        </div>
                        <div class="p-3 bg-amber-50/50 border border-amber-100 shadow-sm rounded-xl">
                            <span class="text-[10px] font-bold text-amber-700 block">⭐ Com Estrelas</span>
                            <span class="text-lg font-extrabold text-amber-800">${det.dados.estrelas}</span>
                        </div>
                    </div>
                `;
            } else if (det.tipo === "causa") {
                document.getElementById("p-titulo").textContent = `Causa ${det.camadaLiteral}`;
                document.getElementById("p-sub").textContent = "Nível de Desdobramento Diagnóstico";

                let外corCat = "#64748B";
                for (const k in CAT_CORES_MAP) {
                    if (det.categoriaEstipulada.toLowerCase().includes(k.toLowerCase())) { corCat = CAT_CORES_MAP[k]; break; }
                }

                const eixosBadges = det.eixosCompartilhados.map(ex => {
                    return `<span class="inline-block px-2.5 py-1 text-[10px] font-bold rounded-lg text-white mr-1.5 mb-1.5" style="background:${EIXO_CORES[ex] || "#475569"}">${EIXO_NOMES_COMPLETOS[ex] || ex}</span>`;
                }).join("");

                document.getElementById("painel-body").innerHTML = `
                    <div class="p-4 rounded-xl bg-slate-50 border border-slate-200/60 mb-4">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Descrição Detalhada</p>
                        <p class="text-xs font-medium text-slate-700 leading-relaxed">${det.textoCompleto}</p>
                    </div>

                    <div class="mb-4">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Tema de Amarração</p>
                        <div class="flex items-center gap-2 px-3 py-2 border border-slate-100 rounded-xl bg-white shadow-sm">
                            <span class="w-3 h-3 rounded-full flex-shrink-0" style="background:${corCat}"></span>
                            <span class="text-xs font-bold text-slate-700">${det.categoriaEstipulada}</span>
                            ${det.ehTransversal ? `<span class="ml-auto text-[9px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded-md uppercase tracking-wider">Transversal</span>` : ""}
                        </div>
                    </div>

                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Compartilhada nos Eixes Estratégicos</p>
                        <div class="flex flex-wrap">${eixosBadges}</div>
                    </div>

                    ${det.votos > 0 ? `
                    <div class="mt-4 p-3 bg-amber-50 rounded-xl border border-amber-100 flex items-center justify-between">
                        <span class="text-xs font-bold text-amber-800">Votação Coletiva GT</span>
                        <span class="text-xs font-extrabold text-amber-700">⭐ ${det.votos} Votos</span>
                    </div>` : ""}
                `;
            }

            document.getElementById("painel").classList.add("open");
            document.getElementById("net").style.right = "480px";
        } else {
            fecharPainel();
        }
    });
}


// --- CONTROLE DE ALTERNÂNCIA DE ABAS ---
function mudarAba(aba) {
    currentTab = aba;
    fecharPainel();
    
    const btn1 = document.getElementById("btn-aba1");
    const btn2 = document.getElementById("btn-aba2");
    const ctrl1 = document.getElementById("controles-aba1");
    const ctrl2 = document.getElementById("controles-aba2");
    
    if (aba === "radial") {
        btn1.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-800 shadow-sm";
        btn2.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800";
        ctrl1.classList.remove("hidden");
        ctrl2.classList.add("hidden");
        document.getElementById("main-title").textContent = "Árvore Diagnóstica de Problemas";
        document.getElementById("main-subtitle").textContent = "Volumetria proporcional e conexões transversais unificadas";
        renderizarEstruturaRadial();
    } else {
        btn2.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-800 shadow-sm";
        btn1.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800";
        ctrl2.classList.remove("hidden");
        ctrl2.classList.add("flex");
        ctrl1.classList.add("hidden");
        document.getElementById("main-title").textContent = "Constelação Detalhada de Evidências";
        document.getElementById("main-subtitle").textContent = "Desdobramento radial completo (Eixo → Causa 1ª → 2ª → 3ª)";
        renderizarEstruturaHierarquica();
    }
}

function fecharPainel() {
    document.getElementById("painel").classList.remove("open");
    document.getElementById("net").style.right = "0";
    document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("bg-indigo-50", "border-indigo-100"));
    
    if(currentTab === "radial") {
        try {
            if (vN) vN.update(vN.get().map(n => ({ id: n.id, opacity: 1 })));
            if (vE) vE.update(vE.get().map(e => ({ id: e.id, color: { color: "#E2E8F0", opacity: 0.6 }, width: 1.5 })));
        } catch(err){}
    }
}

window.onload = inicializar;
</script>
</body>
</html>
