<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F7F8FA;}
  #mynetwork{width:100%;height:100vh;background:#F7F8FA;}
  .vis-tooltip{background:rgba(17,24,39,.92)!important;color:#F9FAFB!important;border:none!important;border-radius:8px!important;font-size:11px!important;padding:7px 11px!important;max-width:260px!important;line-height:1.5!important;box-shadow:0 4px 16px rgba(0,0,0,.2)!important;}
  #panel{transition:width .2s,height .2s;}
  #panel.min{width:44px!important;height:44px!important;overflow:hidden;border-radius:12px;}
  #panel.min #pb{display:none;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px;}
  @media(max-width:640px){#legend,#panel{display:none!important;}}
</style>
</head>
<body>

<div id="loading" class="absolute inset-0 z-50 flex flex-col items-center justify-center" style="background:rgba(247,248,250,.95);backdrop-filter:blur(8px);">
  <div class="relative w-14 h-14 mb-5">
    <div class="absolute inset-0 rounded-full border-4 border-indigo-100"></div>
    <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
  </div>
  <p class="text-base font-semibold text-gray-700">Carregando conexões...</p>
</div>

<div id="mynetwork"></div>

<div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4" style="background:rgba(17,24,39,.5);backdrop-filter:blur(4px);">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg transform transition-all duration-200 scale-95 opacity-0 overflow-hidden">
    <div class="px-6 pt-6 pb-4 border-b border-gray-100">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-3">
            <span id="m-nivel" class="text-[10px] font-bold uppercase tracking-widest text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded"></span>
            <span id="m-eixo" class="text-[10px] font-semibold text-white px-2.5 py-0.5 rounded-full bg-slate-700"></span>
          </div>
          <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Relato do Grupo:</p>
          <h3 id="m-causa" class="text-sm font-semibold text-gray-800 leading-relaxed"></h3>
        </div>
        <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500">×</button>
      </div>
    </div>
    <div id="m-cat-wrap" class="px-6 py-4 bg-gray-50/50">
      <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Conexão Temática:</p>
      <div id="m-cat" class="inline-block px-3 py-1.5 rounded-lg text-xs font-medium bg-white border border-gray-200 shadow-sm"></div>
    </div>
    <div id="m-votos-wrap" class="px-6 py-3 hidden border-t border-gray-100">
      <span id="m-votos" class="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded"></span>
    </div>
    <div class="px-6 py-4 bg-gray-50 flex justify-end">
      <button onclick="closeModal()" class="px-6 py-2 bg-gray-900 text-white text-xs font-bold rounded-xl hover:bg-gray-800 transition-colors">Entendido</button>
    </div>
  </div>
</div>

<div id="panel" class="absolute bottom-5 right-5 bg-white/95 rounded-2xl shadow-xl border border-gray-100 z-10 w-80">
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Filtros Avançados</p>
    <button id="toggle-panel" class="p-1 hover:bg-gray-100 rounded">
      <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div id="pb" class="p-4 space-y-5 max-h-[70vh] overflow-y-auto">
    <input id="search" type="text" placeholder="Buscar palavra-chave..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 outline-none">
    
    <div>
      <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Eixos Pedagógicos</p>
      <ul id="eixo-list" class="space-y-1"></ul>
      <div class="flex gap-2 mt-2">
        <button id="sel-all" class="text-[10px] font-bold text-indigo-600 hover:underline">Todos</button>
        <button id="desel-all" class="text-[10px] font-bold text-gray-400 hover:underline">Limpar</button>
      </div>
    </div>

    <div>
      <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Temas Transversais</p>
      <ul id="cat-list" class="space-y-1"></ul>
    </div>
  </div>
</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/%C3%81rvore%20de%20Problemas%20-%20Alfabetiza%C3%A7%C3%A3o%20(3).csv";
const MACRO = "Baixa aprendizagem na alfabetização";
const EIXO_NOMES = {"Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura", "Eixo 4": "Incentivos", "Eixo 5": "Acomp. e Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Currículo e Materiais"};
const CAT_CORES = {"Alta rotatividade de professores": "#FC8181", "Alto número de estudantes por turma": "#F6AD55", "Ausência de critérios para retenção de professores alfabetizadores": "#FEB2B2", "Baixo uso dos dados das avaliações para planejamento e acompanhamento pedagógico": "#76E4F7", "Desafios na integração do cronograma formativo por ciclos e na conexão das temáticas com a realidade cotidiana e as necessidades dos territórios": "#B794F4", "Excesso e sobreposição de avaliações  no calendário escolar": "#FAF089", "Fragilidade na articulação curricular, planejamento integrado e continuidade pedagógica entre as etapas de ensino (Ed. Infantil e Ciclo de Alfabetização)": "#68D391", "Fragilidade na comunicação e planejamento integrado entre SME, DREs e UEs": "#63B3ED", "Fragilidade na formação continuada de professores e trio gestor acerca da alfabetização": "#D6BCFA", "Fragilidade na formação para uso e análise de dados de avaliação": "#76E4F7", "Fragilidade na integração entre currículo, materiais didáticos, práticas pedagógicas e avaliações": "#4FD1C5", "Fragilidade no atendimento dos estudantes em suas individualidades (AEE e vulnerabilidades)": "#F6AD55", "Fragilidade no planejamento do acompanhamento pedagógico dos estudantes e das práticas docentes": "#9AE6B4", "Fragilidades na consolidação de identidades e sobrecarga de demandas do Trio Gestor (Diretores, ADs e CPs) e POA, impactando o planejamento integrado": "#FBD38D", "Fragmentação da concepção e prática de alfabetização, com entendimentos distintos entre intâncias e atores da rede sobre instrumentos normativos": "#FFA07A", "Participação desigual de professores nas formações (JEIF e Contratados)": "#F687B3"};
const GC = {"macro": {bg: "#E53E3E", bd: "#C53030"}, "eixo": {bg: "#DD6B20", bd: "#C05621"}, "problema": {bg: "#D69E2E", bd: "#B7791F"}, "causa1": {bg: "#38A169", bd: "#276749"}, "causa2": {bg: "#3182CE", bd: "#2C5282"}, "causa3": {bg: "#805AD5", bd: "#553C9A"}};

let G = { nodes: [], edges: [], eixos: [], cats: [] };
let visData = null;
let network = null;
let selEixos = new Set();
let selCat = "__ALL__";

function parseCsv(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for(let i = 1; i < lines.length; i++) {
    const line = lines[i].trim(); if(!line) continue;
    const cols = []; let c="", inQ=false;
    for(let j=0; j<line.length; j++){
      if(line[j]==='"') inQ=!inQ;
      else if(line[j]===';' && !inQ){ cols.push(c.trim()); c=""; }
      else c+=line[j];
    }
    cols.push(c.trim());
    rows.push(cols);
  }
  return rows;
}

function processData(rows) {
  const nodesMap = new Map();
  const edges = [];
  const eixosSet = new Set();

  const addNode = (id, group, level, eixo, cat, votos) => {
    if(!id || id === "" || id === "-") return;
    if(!nodesMap.has(id)) {
      const ek = group === "eixo" ? id.slice(0,6) : (eixo||"").slice(0,6);
      nodesMap.set(id, {
        id, label: id.length > 50 ? id.slice(0,50)+"..." : id, 
        causa_real: id, group, level, eixo: ek, 
        eixo_nome: EIXO_NOMES[ek] || "", cat: cat || "", votos: votos || 0
      });
    }
  };

  addNode(MACRO, "macro", 0);
  rows.forEach(r => {
    const eixo=r[0], prob=r[1], c1=r[2], cat1=r[3], c2=r[4], cat2=r[5], v=parseInt(r[6])||0, c3=r[7], cat3=r[8];
    if(!eixo) return;
    const ek = eixo.slice(0,6); eixosSet.add(ek);
    addNode(ek, "eixo", 1); edges.push({from: MACRO, to: ek});
    if(prob){ addNode(prob, "problema", 2, ek, cat1); edges.push({from: ek, to: prob}); }
    if(c1){ addNode(c1, "causa1", 3, ek, cat1); edges.push({from: prob, to: c1}); }
    if(c2){ addNode(c2, "causa2", 4, ek, cat2, v); edges.push({from: c1, to: c2}); }
    if(c3){ addNode(c3, "causa3", 5, ek, cat3); edges.push({from: c2, to: c3}); }
  });

  const hubs = [];
  Object.entries(CAT_CORES).forEach(([cat, cor]) => {
    const hid = "__hub__"+cat;
    hubs.push({ id: hid, label: cat, group: "hub", color: cor, shape: "diamond", size: 25, causa_real: cat });
    nodesMap.forEach(n => {
      if(n.cat === cat) edges.push({ from: n.id, to: hid, color: cor, dashes: true, transversal: true });
    });
  });

  return { nodes: [...nodesMap.values(), ...hubs], edges, eixos: [...eixosSet].sort(), cats: Object.keys(CAT_CORES) };
}

function climb(id, set) {
  if(!id || set.has(id)) return;
  set.add(id);
  G.edges.forEach(e => { if(e.to === id && !e.transversal) climb(e.from, set); });
}

function applyFilter() {
  const search = document.getElementById("search").value.toLowerCase();
  const visible = new Set();

  G.nodes.forEach(n => {
    if(n.group === "hub") return;
    const matchEixo = selEixos.size === 0 || selEixos.has(n.eixo) || (n.group === "eixo" && selEixos.has(n.id));
    const matchCat = selCat === "__ALL__" || n.cat === selCat;
    const matchSearch = !search || n.causa_real.toLowerCase().includes(search);
    if(matchEixo && matchCat && matchSearch) climb(n.id, visible);
  });
  visible.add(MACRO);

  visData.nodes.update(G.nodes.map(n => {
    const isHub = n.group === "hub";
    const isActive = isHub ? (selCat === "__ALL__" || n.id === "__hub__"+selCat) : visible.has(n.id);
    const color = isHub ? n.color : (isActive ? GC[n.group].bg : "#F3F4F6");
    return { 
      id: n.id, 
      color: color, 
      opacity: isActive ? 1 : 0.05,
      clickable: isActive // Impede clicar no que está escondido
    };
  }));

  visData.edges.update(G.edges.map((e, idx) => {
    const isActive = visible.has(e.from) && visible.has(e.to);
    if(e.transversal) return { id: idx, opacity: (selCat === "__ALL__" || e.color === CAT_CORES[selCat]) ? 0.4 : 0 };
    return { id: idx, opacity: isActive ? 1 : 0.05 };
  }));
}

document.addEventListener("DOMContentLoaded", () => {
  fetch(CSV_URL).then(r => r.text()).then(text => {
    G = processData(parseCsv(text));
    selEixos = new Set(G.eixos);
    initGraph();
  });
});

function initGraph() {
  visData = { nodes: new vis.DataSet(G.nodes), edges: new vis.DataSet(G.edges.map((e,i) => ({...e, id:i}))) };
  network = new vis.Network(document.getElementById("mynetwork"), visData, {
    nodes: { shape: "dot", font: { face: "Inter", size: 12 } },
    physics: { stabilization: true, barnesHut: { gravitationalConstant: -2000 } }
  });
  network.once("stabilizationIterationsDone", () => {
    document.getElementById("loading").style.display = "none";
    network.setOptions({ physics: false });
    buildUI();
    applyFilter();
  });
  network.on("click", p => { if(p.nodes.length) openModal(p.nodes[0]); });
}

function buildUI() {
  const eUl = document.getElementById("eixo-list");
  G.eixos.forEach(e => {
    const li = document.createElement("li");
    li.className = "text-xs p-2 rounded-lg cursor-pointer bg-indigo-50 text-indigo-700 font-medium border border-transparent hover:border-indigo-200";
    li.textContent = EIXO_NOMES[e] || e;
    li.onclick = () => {
      if(selEixos.has(e)) { selEixos.delete(e); li.classList.replace("bg-indigo-50", "bg-gray-50"); li.classList.replace("text-indigo-700", "text-gray-400"); }
      else { selEixos.add(e); li.classList.replace("bg-gray-50", "bg-indigo-50"); li.classList.replace("text-gray-400", "text-indigo-700"); }
      applyFilter();
    };
    eUl.appendChild(li);
  });

  const cUl = document.getElementById("cat-list");
  [{id:"__ALL__", n:"Todas as conexões"}, ...G.cats.map(c=>({id:c, n:c}))].forEach(c => {
    const li = document.createElement("li");
    li.className = "text-[10px] p-2 rounded-lg cursor-pointer border " + (selCat === c.id ? "bg-slate-800 text-white" : "bg-white text-gray-600");
    li.textContent = c.n;
    li.onclick = () => {
      selCat = c.id;
      document.querySelectorAll("#cat-list li").forEach(l => { l.className = "text-[10px] p-2 rounded-lg cursor-pointer border bg-white text-gray-600"; });
      li.className = "text-[10px] p-2 rounded-lg cursor-pointer border bg-slate-800 text-white";
      applyFilter();
    };
    cUl.appendChild(li);
  });

  document.getElementById("search").oninput = applyFilter;
  document.getElementById("toggle-panel").onclick = () => document.getElementById("panel").classList.toggle("min");
}

function openModal(id) {
  const n = G.nodes.find(x => x.id === id); if(!n) return;
  
  // Nomes amigáveis para os níveis
  const níveis = { macro: "Problema Macro", eixo: "Eixo", problema: "Problema Central", causa1: "Causa Primária", causa2: "Causa Secundária", causa3: "Causa Terciária", hub: "Conexão Transversal" };
  
  document.getElementById("m-nivel").textContent = níveis[n.group] || n.group;
  document.getElementById("m-causa").textContent = n.causa_real;
  document.getElementById("m-eixo").textContent = n.eixo_nome || "Geral";
  document.getElementById("m-eixo").style.display = n.eixo_nome ? "inline-block" : "none";
  
  const mCat = document.getElementById("m-cat");
  if(n.cat || n.group === "hub") {
    mCat.textContent = n.cat || n.causa_real;
    document.getElementById("m-cat-wrap").style.display = "block";
  } else {
    document.getElementById("m-cat-wrap").style.display = "none";
  }

  const vWrap = document.getElementById("m-votos-wrap");
  if(n.votos > 0) {
    document.getElementById("m-votos").textContent = `⭐ Priorizado com ${n.votos} votos`;
    vWrap.style.display = "block";
  } else { vWrap.style.display = "none"; }

  document.getElementById("modal").classList.replace("hidden", "flex");
  setTimeout(() => document.getElementById("modal-box").classList.replace("opacity-0", "opacity-100"), 10);
}

function closeModal() {
  document.getElementById("modal-box").classList.replace("opacity-100", "opacity-0");
  setTimeout(() => document.getElementById("modal").classList.replace("flex", "hidden"), 200);
}
</script>
</body>
</html>
