<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F7F8FA;}
  #mynetwork{width:100%;height:100vh;background:#F7F8FA;}
  
  /* Legenda Fixa à Esquerda */
  #legend-box { position: absolute; bottom: 30px; left: 30px; z-index: 10; }
  
  /* Painel de Filtros à Direita */
  #panel { position: absolute; top: 30px; right: 30px; bottom: 30px; width: 320px; z-index: 20; display: flex; flex-direction: column; }
  
  .filter-section { max-height: 40vh; overflow-y: auto; scrollbar-width: thin; }
  .filter-section::-webkit-scrollbar { width: 4px; }
  .filter-section::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }

  /* Ajustes de Clique e Modal */
  #modal { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
  
  /* Estilo das conexões vis.js */
  .vis-tooltip { background: #1e293b !important; color: #fff !important; border-radius: 8px !important; padding: 10px !important; font-size: 12px !important; border: none !important; }
</style>
</head>
<body>

<div id="loading" class="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-white">
  <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
  <p class="mt-4 font-bold text-gray-600">Restaurando Árvore...</p>
</div>

<div id="mynetwork"></div>

<div id="legend-box" class="bg-white/90 p-5 rounded-2xl shadow-lg border border-gray-100 hidden sm:block">
  <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Hierarquia</p>
  <div class="space-y-2">
    <div class="flex items-center gap-2 text-[11px] font-medium text-gray-600"><span class="w-3 h-3 rounded-full bg-[#EF4444]"></span> Problema Macro</div>
    <div class="flex items-center gap-2 text-[11px] font-medium text-gray-600"><span class="w-3 h-3 rounded-full bg-[#F97316]"></span> Eixo</div>
    <div class="flex items-center gap-2 text-[11px] font-medium text-gray-600"><span class="w-3 h-3 rounded-full bg-[#EAB308]"></span> Problema Central</div>
    <div class="flex items-center gap-2 text-[11px] font-medium text-gray-600"><span class="w-3 h-3 rounded-full bg-[#22C55E]"></span> Causa Primária</div>
    <div class="flex items-center gap-2 text-[11px] font-medium text-gray-600"><span class="w-3 h-3 rounded-full bg-[#3B82F6]"></span> Causa Secundária</div>
    <div class="flex items-center gap-2 text-[11px] font-medium text-gray-600"><span class="w-3 h-3 rounded-full bg-[#A855F7]"></span> Causa Terciária</div>
  </div>
</div>

<div id="panel" class="bg-white shadow-2xl rounded-3xl border border-gray-100 overflow-hidden">
  <div class="p-6 border-b border-gray-50">
    <h1 class="text-lg font-bold text-gray-800">Filtros</h1>
    <input id="search" type="text" placeholder="Pesquisar na árvore..." class="w-full mt-4 px-4 py-2 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
  </div>

  <div class="p-6 flex-1 overflow-y-auto space-y-8">
    <div>
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Eixos</p>
      <div id="eixo-list" class="space-y-1.5 filter-section"></div>
      <div class="flex gap-3 mt-3">
        <button onclick="toggleAllEixos(true)" class="text-[10px] font-bold text-indigo-600 hover:underline">Todos</button>
        <button onclick="toggleAllEixos(false)" class="text-[10px] font-bold text-gray-400 hover:underline">Nenhum</button>
      </div>
    </div>

    <div>
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Tema Transversal</p>
      <div id="cat-list" class="space-y-1 filter-section"></div>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4">
  <div id="modal-box" class="bg-white rounded-[32px] shadow-2xl w-full max-w-lg overflow-hidden transform transition-all duration-300">
    <div class="p-8">
      <div class="flex justify-between items-start mb-6">
        <span id="m-nivel" class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full"></span>
        <button onclick="closeModal()" class="text-gray-300 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <h2 id="m-eixo" class="text-[11px] font-bold text-slate-400 uppercase mb-2"></h2>
      <h3 id="m-causa" class="text-lg font-semibold text-gray-800 leading-snug mb-6"></h3>
      
      <div id="m-cat-wrap" class="p-5 bg-gray-50 rounded-2xl border border-gray-100">
        <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Conexão Transversal:</p>
        <div id="m-cat" class="text-sm font-medium text-gray-700"></div>
      </div>
    </div>
    <div class="px-8 py-5 bg-gray-50 flex justify-end">
      <button onclick="closeModal()" class="px-8 py-3 bg-indigo-600 text-white text-xs font-bold rounded-2xl hover:bg-indigo-700 transition-all">Fechar</button>
    </div>
  </div>
</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/%C3%81rvore%20de%20Problemas%20-%20Alfabetiza%C3%A7%C3%A3o%20(3).csv";
const MACRO = "Baixa aprendizagem na alfabetização";
const EIXO_NOMES = {"Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura", "Eixo 4": "Incentivos", "Eixo 5": "Acomp. e Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Currículo e Materiais"};
const CORES = { macro: "#EF4444", eixo: "#F97316", problema: "#EAB308", causa1: "#22C55E", causa2: "#3B82F6", causa3: "#A855F7", hub: "#6366F1" };

let G = { nodes: [], edges: [], eixos: [], cats: [] };
let network = null;
let visData = null;
let selEixos = new Set();
let selCat = "__ALL__";

async function init() {
  const resp = await fetch(CSV_URL);
  const text = await resp.text();
  parseData(text);
  render();
}

function parseData(text) {
  const rows = text.split(/\r?\n/).slice(1).map(line => {
    let cols = []; let c="", inQ=false;
    for(let char of line){
      if(char==='"') inQ=!inQ;
      else if(char===';' && !inQ){ cols.push(c.trim()); c=""; }
      else c+=char;
    }
    cols.push(c.trim()); return cols;
  });

  const nodesMap = new Map();
  const edges = [];

  const addNode = (id, group, level, eixo, cat) => {
    if(!id || id === "-" || id === "") return;
    if(!nodesMap.has(id)) {
      const ek = (eixo || (group === "eixo" ? id : "")).slice(0,6);
      nodesMap.set(id, { id, label: id, group, level, eixo: ek, cat: cat || "", causa_real: id, eixo_nome: EIXO_NOMES[ek] || "" });
    }
  };

  addNode(MACRO, "macro", 0);
  rows.forEach(r => {
    const [eixo, prob, c1, cat1, c2, cat2, v, c3, cat3] = r;
    if(!eixo) return;
    const ek = eixo.slice(0,6); G.eixos.push(ek);
    addNode(ek, "eixo", 1); edges.push({from: MACRO, to: ek});
    if(prob){ addNode(prob, "problema", 2, ek, cat1); edges.push({from: ek, to: prob}); }
    if(c1){ addNode(c1, "causa1", 3, ek, cat1); edges.push({from: prob, to: c1}); }
    if(c2){ addNode(c2, "causa2", 4, ek, cat2); edges.push({from: c1, to: c2}); }
    if(c3){ addNode(c3, "causa3", 5, ek, cat3); edges.push({from: c2, to: c3}); }
  });

  G.eixos = [...new Set(G.eixos)].sort();
  G.nodes = [...nodesMap.values()];
  G.cats = [...new Set(G.nodes.map(n => n.cat).filter(c => c))].sort();
  
  // Hubs de temas transversais
  G.cats.forEach(cat => {
    const hid = "__hub__" + cat;
    G.nodes.push({ id: hid, label: cat, group: "hub", isHub: true, causa_real: cat });
    G.nodes.filter(n => n.cat === cat).forEach(n => {
      edges.push({ from: n.id, to: hid, color: "#6366F1", dashes: true, isTransversal: true });
    });
  });

  G.edges = edges;
  selEixos = new Set(G.eixos);
}

function render() {
  visData = {
    nodes: new vis.DataSet(G.nodes.map(n => ({
      id: n.id, 
      label: n.label.length > 30 ? n.label.slice(0,30) + "..." : n.label,
      title: n.label,
      color: CORES[n.group],
      size: n.isHub ? 20 : (25 - n.level*3),
      shape: n.isHub ? "diamond" : "dot"
    }))),
    edges: new vis.DataSet(G.edges.map((e, i) => ({ ...e, id: i, color: "#E2E8F0", width: 1.5 })))
  };

  network = new vis.Network(document.getElementById("mynetwork"), visData, {
    nodes: { font: { face: "Inter", size: 11, color: "#475569" } },
    edges: { arrows: { to: { enabled: true, scaleFactor: 0.5 } }, smooth: { type: "cubicBezier" } },
    physics: { stabilization: true, barnesHut: { gravitationalConstant: -2000 } }
  });

  network.once("stabilizationIterationsDone", () => {
    document.getElementById("loading").style.display = "none";
    buildUI();
    applyFilter();
  });

  network.on("click", p => { if(p.nodes.length) openModal(p.nodes[0]); });
}

function applyFilter() {
  const search = document.getElementById("search").value.toLowerCase();
  const visible = new Set();

  G.nodes.forEach(n => {
    if(n.isHub) return;
    const matchEixo = selEixos.has(n.eixo) || n.group === "macro";
    const matchCat = selCat === "__ALL__" || n.cat === selCat;
    const matchSearch = !search || n.causa_real.toLowerCase().includes(search);

    if(matchEixo && matchCat && matchSearch) {
      visible.add(n.id);
      // Subir a árvore para garantir conexão com o macro
      let curr = n.id;
      while(true) {
        let parent = G.edges.find(e => e.to === curr && !e.isTransversal);
        if(parent) { visible.add(parent.from); curr = parent.from; }
        else break;
      }
    }
  });

  visData.nodes.update(G.nodes.map(n => ({
    id: n.id,
    opacity: (visible.has(n.id) || (n.isHub && (selCat === "__ALL__" || n.id === "__hub__"+selCat))) ? 1 : 0.05
  })));

  visData.edges.update(G.edges.map((e, i) => ({
    id: i,
    opacity: (visible.has(e.from) && visible.has(e.to)) ? 1 : 0.05
  })));
}

function buildUI() {
  const eList = document.getElementById("eixo-list");
  G.eixos.forEach(e => {
    const div = document.createElement("div");
    div.className = "flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-gray-50 transition-all";
    div.innerHTML = `<input type="checkbox" checked class="w-4 h-4 accent-indigo-600"> <span class="text-xs text-gray-600 font-medium">${EIXO_NOMES[e] || e}</span>`;
    div.onclick = (event) => {
      const cb = div.querySelector('input');
      if(event.target !== cb) cb.checked = !cb.checked;
      cb.checked ? selEixos.add(e) : selEixos.delete(e);
      applyFilter();
    };
    eList.appendChild(div);
  });

  const cList = document.getElementById("cat-list");
  [{id:"__ALL__", n:"Todas as Conexões"}, ...G.cats.map(c=>({id:c, n:c}))].forEach(c => {
    const div = document.createElement("div");
    div.className = `text-[11px] p-2.5 rounded-xl cursor-pointer transition-all border border-transparent ${selCat === c.id ? 'bg-indigo-50 text-indigo-700 font-bold border-indigo-100' : 'text-gray-500 hover:bg-gray-50'}`;
    div.textContent = c.n;
    div.onclick = () => {
      selCat = c.id;
      document.querySelectorAll("#cat-list div").forEach(d => d.className = "text-[11px] p-2.5 rounded-xl cursor-pointer text-gray-500 hover:bg-gray-50 border border-transparent");
      div.className = "text-[11px] p-2.5 rounded-xl cursor-pointer bg-indigo-50 text-indigo-700 font-bold border-indigo-100";
      applyFilter();
    };
    cList.appendChild(div);
  });

  document.getElementById("search").oninput = applyFilter;
}

function toggleAllEixos(val) {
  document.querySelectorAll("#eixo-list input").forEach(i => i.checked = val);
  val ? G.eixos.forEach(e => selEixos.add(e)) : selEixos.clear();
  applyFilter();
}

function openModal(id) {
  const n = G.nodes.find(x => x.id === id); if(!n) return;
  const labels = { macro: "Problema Macro", eixo: "Eixo Pedagógico", problema: "Problema Central", causa1: "Causa Primária", causa2: "Causa Secundária", causa3: "Causa Terciária", hub: "Conexão Transversal" };
  
  document.getElementById("m-nivel").textContent = labels[n.group];
  document.getElementById("m-eixo").textContent = n.eixo_nome || "Geral";
  document.getElementById("m-causa").textContent = n.causa_real;
  document.getElementById("m-cat").textContent = n.cat || (n.isHub ? "Ponto de convergência" : "Nenhuma conexão transversal");
  
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("modal").classList.remove("flex");
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
