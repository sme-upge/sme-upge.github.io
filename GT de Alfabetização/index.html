<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#F7F8FA;}
  #mynetwork{width:100%;height:100vh;background:#F7F8FA;}
  #panel.min{width:44px!important;height:44px!important;overflow:hidden;border-radius:12px;}
  #panel.min #pb{display:none;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px;}
</style>
</head>
<body>

<div id="loading" class="absolute inset-0 z-50 flex flex-col items-center justify-center" style="background:rgba(247,248,250,.95);backdrop-filter:blur(8px);">
  <div class="relative w-10 h-10 mb-4">
    <div class="absolute inset-0 rounded-full border-2 border-indigo-100"></div>
    <div class="absolute inset-0 rounded-full border-2 border-indigo-500 border-t-transparent animate-spin"></div>
  </div>
  <p class="text-xs font-medium text-gray-500">Renderizando árvore...</p>
</div>

<div id="mynetwork"></div>

<div id="legend" class="absolute bottom-5 left-5 bg-white/95 rounded-2xl shadow-lg border border-gray-100 p-4 z-10" style="min-width:180px;">
  <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-3">Hierarquia</p>
  <div class="space-y-2">
    <div class="flex items-center gap-2.5"><span class="w-3 h-3 rounded-full" style="background:#E53E3E"></span><span class="text-xs text-gray-600">Problema Macro</span></div>
    <div class="flex items-center gap-2.5"><span class="w-2.5 h-2.5 rounded-full" style="background:#DD6B20"></span><span class="text-xs text-gray-600">Eixo</span></div>
    <div class="flex items-center gap-2.5"><span class="w-2 h-2 rounded-full" style="background:#D69E2E"></span><span class="text-xs text-gray-600">Problema Central</span></div>
    <div class="flex items-center gap-2.5"><span class="w-2 h-2 rounded-full" style="background:#38A169"></span><span class="text-xs text-gray-600">Causa Primária</span></div>
    <div class="flex items-center gap-2.5"><span class="w-2 h-2 rounded-full" style="background:#3182CE"></span><span class="text-xs text-gray-600">Causa Secundária</span></div>
    <div class="flex items-center gap-2.5"><span class="w-2 h-2 rounded-full" style="background:#805AD5"></span><span class="text-xs text-gray-600">Causa Terciária</span></div>
    <div class="flex items-center gap-2.5"><span class="w-2.5 h-2.5 bg-[#A78BFA] rotate-45" style="clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);"></span><span class="text-xs text-gray-600">Transversal</span></div>
  </div>
</div>

<div id="panel" class="absolute bottom-5 right-5 bg-white/95 rounded-2xl shadow-lg border border-gray-100 z-10 w-72">
  <div class="flex items-center justify-between px-4 pt-4 pb-3 border-b border-gray-100">
    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Opções</p>
    <button id="toggle-panel" class="w-7 h-7 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center">
      <svg class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 9l-7 7-7-7"/></svg>
    </button>
  </div>
  <div id="pb" class="p-4 space-y-4">
    <input id="search" type="text" placeholder="Pesquisar..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-300">
    
    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Priorização</p>
      <div class="grid grid-cols-4 gap-1.5">
        <button data-min="0" class="prio-btn py-1.5 text-[10px] rounded-lg font-semibold bg-indigo-600 text-white">Todas</button>
        <button data-min="1" class="prio-btn py-1.5 text-[10px] rounded-lg font-semibold bg-gray-100 text-gray-500">1+⭐</button>
        <button data-min="4" class="prio-btn py-1.5 text-[10px] rounded-lg font-semibold bg-gray-100 text-gray-500">4+⭐</button>
        <button data-min="5" class="prio-btn py-1.5 text-[10px] rounded-lg font-semibold bg-gray-100 text-gray-500">5+⭐</button>
      </div>
    </div>

    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Eixos</p>
      <ul id="eixo-list" class="space-y-1 max-h-32 overflow-y-auto pr-1 text-[11px] text-gray-600"></ul>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4" style="background:rgba(17,24,39,.4);backdrop-filter:blur(4px);">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
    <div class="p-6">
      <div id="m-eixo" class="text-[9px] font-bold uppercase tracking-widest text-indigo-500 mb-1"></div>
      <h3 id="m-causa" class="text-sm font-semibold text-gray-800 leading-snug"></h3>
      <div id="m-votos" class="mt-4 inline-flex items-center gap-1.5 px-2 py-1 bg-amber-50 text-amber-700 rounded-lg text-[10px] font-bold hidden"></div>
    </div>
    <div class="px-6 py-3 bg-gray-50 flex justify-end">
      <button onclick="closeModal()" class="text-xs font-bold text-gray-500 hover:text-gray-800">FECHAR</button>
    </div>
  </div>
</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/sme-upge/sme-upge.github.io/refs/heads/main/GT%20de%20Alfabetiza%C3%A7%C3%A3o/%C3%81rvore%20de%20Problemas%20-%20Alfabetiza%C3%A7%C3%A3o%20(3).csv";
const MACRO_ID = "Baixa aprendizagem na alfabetização";

const COLORS = {
  macro: "#E53E3E", eixo: "#DD6B20", problema: "#D69E2E",
  causa1: "#38A169", causa2: "#3182CE", causa3: "#805AD5", hub: "#A78BFA"
};

// Tamanhos reduzidos para o estilo original
const SIZES = {
  macro: 22, eixo: 14, problema: 8, causa1: 7, causa2: 7, causa3: 7, hub: 10
};

const EIXO_NOMES = {"Eixo 1": "Responsabilidades", "Eixo 2": "Formação", "Eixo 3": "Infraestrutura", "Eixo 4": "Incentivos", "Eixo 5": "Acomp. e Monitoramento", "Eixo 6": "Avaliação", "Eixo 7": "Currículo e Materiais"};

let network, nodesDS, edgesDS, rawNodes = [];
let selEixos = new Set(), minVotos = 0;

fetch(CSV_URL)
  .then(res => res.arrayBuffer())
  .then(buf => {
    const text = new TextDecoder("windows-1252").decode(buf);
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    const nodesMap = new Map();
    const edgesList = [];

    nodesMap.set(MACRO_ID, { id: MACRO_ID, label: "", group: 'macro', title: "Problema Macro" });

    lines.slice(1).forEach(line => {
      const c = line.split(';').map(v => v.replace(/^"|"$/g, '').trim());
      if(c.length < 3) return;
      
      const [eixoFull, prob, cp, cat1, cs, cat2, vRaw, ct, cat3] = c;
      const eId = eixoFull ? eixoFull.split(' - ')[0] : null;
      const votos = parseInt(vRaw) || 0;

      if (eId && !nodesMap.has(eId)) {
        nodesMap.set(eId, { id: eId, label: "", group: 'eixo', eixo: eId });
        edgesList.push({ from: MACRO_ID, to: eId });
        selEixos.add(eId);
      }
      if (prob && eId) {
        if(!nodesMap.has(prob)) {
            nodesMap.set(prob, { id: prob, label: "", group: 'problema', eixo: eId, causa_real: prob });
            edgesList.push({ from: eId, to: prob });
        }
        if(cp) {
           if(!nodesMap.has(cp)) {
               nodesMap.set(cp, { id: cp, label: "", group: 'causa1', eixo: eId, causa_real: cp, cat: cat1 });
               edgesList.push({ from: prob, to: cp });
           }
           if(cs) {
              if(!nodesMap.has(cs)) {
                  nodesMap.set(cs, { id: cs, label: "", group: 'causa2', eixo: eId, causa_real: cs, cat: cat2, votos: votos });
                  edgesList.push({ from: cp, to: cs });
              }
              if(ct) {
                if(!nodesMap.has(ct)) {
                    nodesMap.set(ct, { id: ct, label: "", group: 'causa3', eixo: eId, causa_real: ct, cat: cat3 });
                    edgesList.push({ from: cs, to: ct });
                }
              }
           }
        }
      }

      [cat1, cat2, cat3].forEach(cat => {
        if(cat && cat.length > 2) {
          const hId = "__hub__" + cat;
          if(!nodesMap.has(hId)) {
              nodesMap.set(hId, { id: hId, label: "", group: 'hub', shape: 'diamond', causa_real: "Tema: " + cat });
          }
          const target = ct || cs || cp || prob;
          if(target) edgesList.push({ from: target, to: hId, dashes: true, color: COLORS.hub, opacity: 0.3 });
        }
      });
    });

    rawNodes = Array.from(nodesMap.values());
    initNetwork(rawNodes, edgesList);
  });

function initNetwork(nodes, edges) {
  nodesDS = new vis.DataSet(nodes.map(n => ({
    ...n, 
    color: { background: COLORS[n.group], border: COLORS[n.group], highlight: { background: COLORS[n.group], border: '#000' } },
    size: SIZES[n.group]
  })));
  
  edgesDS = new vis.DataSet(edges);

  network = new vis.Network(document.getElementById("mynetwork"), { nodes: nodesDS, edges: edgesDS }, {
    physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -100, springLength: 100 }, stabilization: { iterations: 100 } },
    edges: { arrows: { to: { scaleFactor: 0.5 } }, color: '#e2e8f0', smooth: { type: 'continuous' } }
  });

  network.once("stabilizationIterationsDone", () => {
    document.getElementById("loading").style.display = "none";
    setupUI();
  });
  
  network.on("click", p => p.nodes.length && openModal(p.nodes[0]));
}

function setupUI() {
  const eUl = document.getElementById("eixo-list");
  selEixos.forEach(e => {
    const li = document.createElement("li");
    li.className = "flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-1";
    li.innerHTML = `<input type="checkbox" checked class="scale-90"> <span>${EIXO_NOMES[e]||e}</span>`;
    li.onclick = (ev) => {
      const chk = li.querySelector('input');
      if(ev.target !== chk) chk.checked = !chk.checked;
      chk.checked ? selEixos.add(e) : selEixos.delete(e);
      applyFilters();
    };
    eUl.appendChild(li);
  });

  document.querySelectorAll(".prio-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".prio-btn").forEach(b => b.classList.replace("bg-indigo-600", "bg-gray-100"));
      btn.classList.replace("bg-gray-100", "bg-indigo-600");
      minVotos = parseInt(btn.dataset.min);
      applyFilters();
    };
  });

  document.getElementById("search").oninput = applyFilters;
  document.getElementById("toggle-panel").onclick = () => document.getElementById("panel").classList.toggle("min");
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  nodesDS.update(rawNodes.map(n => {
    let show = true;
    if(n.eixo && !selEixos.has(n.eixo)) show = false;
    if(minVotos > 0 && (n.votos || 0) < minVotos && n.group !== 'macro' && n.group !== 'eixo') show = false;
    if(q && !n.causa_real?.toLowerCase().includes(q)) show = false;
    if(n.id === MACRO_ID) show = true;
    return { id: n.id, hidden: !show };
  }));
}

function openModal(id) {
  const n = nodesDS.get(id);
  document.getElementById("m-eixo").textContent = EIXO_NOMES[n.eixo] || "Geral / Transversal";
  document.getElementById("m-causa").textContent = n.causa_real || (n.id === MACRO_ID ? "Baixa aprendizagem na alfabetização" : n.id);
  
  const vWrap = document.getElementById("m-votos");
  if(n.votos > 0) {
      vWrap.classList.remove("hidden");
      vWrap.textContent = `⭐ ${n.votos} voto(s)`;
  } else vWrap.classList.add("hidden");

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}
</script>
</body>
</html>
