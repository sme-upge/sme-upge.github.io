<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore de Problemas — GT de Alfabetização · SME-SP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:"Inter",sans-serif;background:#f0f2f5;}
  #mynetwork{width:100%;height:100vh;background:#f0f2f5;}
  #panel.min{width:52px;height:44px;overflow:hidden;}
  #panel.min #pb{display:none;}
  .tsw{position:relative;display:inline-block;width:36px;height:20px;}
  .tsw input{opacity:0;width:0;height:0;}
  .sl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.2s;}
  .sl:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
  input:checked+.sl{background:#4f46e5;}
  input:checked+.sl:before{transform:translateX(16px);}
  @media(max-width:640px){#legend,#panel{display:none;}}
  .mode-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
</style>
</head>
<body>

<div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
  <div class="animate-spin h-10 w-10 border-4 border-indigo-600 border-t-transparent rounded-full"></div>
  <p class="mt-4 text-lg font-semibold text-gray-700">Carregando a árvore...</p>
</div>

<div id="mynetwork"></div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/50 z-[1050] hidden items-center justify-center p-4">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-xl transform transition-all duration-200 scale-95 opacity-0">
    <div class="p-5 border-b flex justify-between items-start">
      <div>
        <div class="flex items-center gap-2 mb-2">
            <span id="m-nivel" class="px-2 py-0.5 rounded text-xs font-semibold bg-gray-100 text-gray-500 uppercase tracking-wide"></span>
            <span id="m-eixo" class="px-2.5 py-0.5 rounded-full text-xs font-semibold text-white" style="background:#1A2F5E"></span>
        </div>
        <p class="text-xs text-gray-400 font-medium uppercase mb-1">O que o grupo disse</p>
        <h3 id="m-causa" class="text-base font-semibold text-gray-800 leading-snug"></h3>
      </div>
      <button onclick="closeModal()" class="text-gray-300 hover:text-gray-600 text-2xl">&times;</button>
    </div>
    <div id="m-cat-wrap" class="px-5 py-4">
      <p class="text-xs text-gray-400 font-medium uppercase mb-1.5">Conexão Temática</p>
      <div id="m-cat" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium"></div>
    </div>
    <div class="p-4 bg-gray-50 border-t rounded-b-2xl text-right">
      <button onclick="closeModal()" class="px-5 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700">Fechar</button>
    </div>
  </div>
</div>

<!-- Painel Filtros -->
<div id="panel" class="absolute bottom-4 right-4 bg-white/95 rounded-xl shadow-xl border border-gray-200 z-10 w-72 transition-all">
  <button id="toggle-panel" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
  </button>
  
  <div id="pb" class="p-4 space-y-4">
    <div>
      <p class="text-xs font-bold text-gray-500 uppercase mb-2">Modo de Visualização</p>
      <div class="grid grid-cols-1 gap-1">
        <button onclick="changeView('complete')" id="v-complete" class="mode-btn text-left px-3 py-1.5 text-xs rounded-lg border border-gray-200 hover:bg-gray-50 active">🌳 Versão Completa</button>
        <button onclick="changeView('summary')" id="v-summary" class="mode-btn text-left px-3 py-1.5 text-xs rounded-lg border border-gray-200 hover:bg-gray-50">⏱️ Resumo (1 min)</button>
        <button onclick="changeView('transversal')" id="v-transversal" class="mode-btn text-left px-3 py-1.5 text-xs rounded-lg border border-gray-200 hover:bg-gray-50">🔀 Apenas Transversais</button>
      </div>
    </div>

    <input id="search" type="text" placeholder="🔍 Pesquisar na árvore..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-indigo-400 outline-none">

    <div>
        <p class="text-xs font-bold text-gray-500 uppercase mb-2">Priorização ⭐</p>
        <div class="flex gap-1">
            <button onclick="setMinV(0, this)" class="prio-btn flex-1 py-1 text-[10px] rounded bg-indigo-600 text-white">Todas</button>
            <button onclick="setMinV(1, this)" class="prio-btn flex-1 py-1 text-[10px] rounded bg-gray-100 text-gray-600">1+</button>
            <button onclick="setMinV(4, this)" class="prio-btn flex-1 py-1 text-[10px] rounded bg-gray-100 text-gray-600">4+</button>
            <button onclick="setMinV(5, this)" class="prio-btn flex-1 py-1 text-[10px] rounded bg-gray-100 text-gray-600">5+</button>
        </div>
    </div>

    <div>
      <p class="text-xs font-bold text-gray-500 uppercase mb-1">Eixos</p>
      <div class="flex gap-2 mb-2">
          <button onclick="selectAllEixos(true)" class="text-[10px] text-indigo-600 hover:underline">Todos</button>
          <button onclick="selectAllEixos(false)" class="text-[10px] text-gray-500 hover:underline">Nenhum</button>
      </div>
      <ul id="eixo-list" class="space-y-1 max-h-32 overflow-y-auto text-[11px]"></ul>
    </div>
  </div>
</div>

<script>
// DADOS (O G JSON que você já tem)
const G = [COLE_AQUI_O_CONTEUDO_DO_SEU_G_JSON]; // <--- COLE O OBJETO G AQUI

// Lógica de Inicialização
let network, dataNodes, dataEdges;
let currentView = 'complete';
let selectedEixos = new Set();
let minStars = 0;

const GC = {
  macro: {background:"#f43f5e",border:"#be123c"},
  eixo: {background:"#f97316",border:"#c2410c"},
  problema: {background:"#eab308",border:"#a16207"},
  causa1: {background:"#22c55e",border:"#15803d"},
  causa2: {background:"#3b82f6",border:"#1d4ed8"},
  causa3: {background:"#8b5cf6",border:"#6d28d9"},
  hub: {background:"#ffffff",border:"#6366f1"}
};

document.addEventListener("DOMContentLoaded", () => {
  // Preencher eixos inicialmente
  G.eixos.forEach(e => selectedEixos.add(e));
  const eixoUl = document.getElementById("eixo-list");
  G.eixos.forEach(e => {
      const li = document.createElement("li");
      li.innerHTML = `<label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" checked value="${e}" class="eixo-chk"> ${G.eixo_nomes[e]}
      </label>`;
      li.querySelector('input').addEventListener('change', (ev) => {
          ev.target.checked ? selectedEixos.add(e) : selectedEixos.delete(e);
          applyFilters();
      });
      eixoUl.appendChild(li);
  });

  dataNodes = new vis.DataSet(G.nodes);
  dataEdges = new vis.DataSet(G.edges);

  const container = document.getElementById("mynetwork");
  network = new vis.Network(container, {nodes: dataNodes, edges: dataEdges}, {
    nodes: { shape: "dot", font: { face: "Inter" } },
    physics: { barnesHut: { gravitationalConstant: -30000, springLength: 200 } }
  });

  network.once("stabilizationIterationsDone", () => {
    document.getElementById("loading").style.display = "none";
    network.setOptions({ physics: false });
  });

  network.on("click", (params) => { if(params.nodes.length) openModal(params.nodes[0]); });
  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("toggle-panel").addEventListener("click", () => document.getElementById("panel").classList.toggle("min"));
});

function changeView(view) {
    currentView = view;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('v-' + view).classList.add('active');
    applyFilters();
}

function setMinV(val, btn) {
    minStars = val;
    document.querySelectorAll('.prio-btn').forEach(b => {
        b.classList.replace('bg-indigo-600', 'bg-gray-100');
        b.classList.replace('text-white', 'text-gray-600');
    });
    btn.classList.replace('bg-gray-100', 'bg-indigo-600');
    btn.classList.add('text-white');
    applyFilters();
}

function selectAllEixos(state) {
    document.querySelectorAll('.eixo-chk').forEach(c => {
        c.checked = state;
        state ? selectedEixos.add(c.value) : selectedEixos.delete(c.value);
    });
    applyFilters();
}

function applyFilters() {
    const search = document.getElementById("search").value.toLowerCase();
    
    const nodesToUpdate = G.nodes.map(n => {
        let isVisible = true;
        const isHub = G.hubs.includes(n.id);
        const isMacro = n.group === 'macro';

        // 1. Filtro de Visão (Mode)
        if (currentView === 'summary') {
            if (!isHub && !isMacro && n.group !== 'eixo') isVisible = false;
        } else if (currentView === 'transversal') {
            if (!isHub && !isMacro && !n.cat) isVisible = false;
        }

        // 2. Filtro de Eixo
        if (isVisible && n.eixo && !selectedEixos.has(n.eixo)) isVisible = false;

        // 3. Filtro de Estrelas
        if (isVisible && !isHub && !isMacro && (n.votos || 0) < minStars) isVisible = false;

        // 4. Filtro de Busca
        if (isVisible && search && !n.causa_real.toLowerCase().includes(search)) isVisible = false;

        // Sempre mostrar o Macro
        if (isMacro) isVisible = true;

        return {
            id: n.id,
            hidden: !isVisible,
            color: isVisible ? GC[n.group] : { background: "#eee", border: "#ddd" }
        };
    });

    dataNodes.update(nodesToUpdate);

    // Ajustar arestas
    const edgesToUpdate = G.edges.map(e => {
        const fromNode = dataNodes.get(e.from);
        const toNode = dataNodes.get(e.to);
        return {
            id: e.id,
            hidden: fromNode.hidden || toNode.hidden
        };
    });
    dataEdges.update(edgesToUpdate);
}

function openModal(id) {
    const n = G.nodes.find(x => x.id === id);
    if(!n) return;
    document.getElementById("m-nivel").textContent = n.group;
    document.getElementById("m-eixo").textContent = n.eixo_nome || "";
    document.getElementById("m-causa").textContent = n.causa_real;
    const catEl = document.getElementById("m-cat");
    if(n.cat) {
        catEl.textContent = n.cat;
        catEl.parentElement.style.display = "block";
    } else {
        catEl.parentElement.style.display = "none";
    }
    const m = document.getElementById("modal");
    m.classList.remove("hidden"); m.classList.add("flex");
    setTimeout(() => document.getElementById("modal-box").classList.remove("scale-95", "opacity-0"), 10);
}

function closeModal() {
    document.getElementById("modal-box").classList.add("scale-95", "opacity-0");
    setTimeout(() => document.getElementById("modal").classList.add("hidden"), 200);
}
</script>
</body>
</html>
